<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Velada del Año</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎂</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0efe8;
    --muted: #888;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.12);
    --silver: #a0b4c8;
    --silver-dim: rgba(160,180,200,0.12);
    --danger: #ff5f5f;
    --success: #4ecb7e;
    --info: #60b4f0;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 1.5rem;
    border-bottom: 0.5px solid var(--border2);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    padding: 1rem 1.5rem 1rem 0;
    border-right: 0.5px solid var(--border);
    margin-right: 1rem;
    letter-spacing: -0.3px;
  }
  .nav-tabs { display: flex; gap: 0; }
  .nav-tab {
    padding: 1rem 1.25rem;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* PAGES */
  .page { display: none; padding: 1.5rem; max-width: 900px; margin: 0 auto; }
  .page.active { display: block; }

  /* SECTION HEADERS */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  /* RANKING TABLE */
  .ranking { width: 100%; border-collapse: collapse; }
  .ranking th {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 0.5rem 0.75rem;
    border-bottom: 0.5px solid var(--border);
  }
  .ranking td {
    padding: 0.75rem;
    border-bottom: 0.5px solid var(--border);
    vertical-align: middle;
  }
  .ranking tr:last-child td { border-bottom: none; }
  .ranking tr.classifica td { background: rgba(200,240,96,0.04); }
  .ranking tr.classifica td:first-child { border-left: 2px solid var(--accent); }

  .pos-badge {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    background: var(--surface2);
    color: var(--muted);
  }
  .pos-badge.gold { background: var(--gold-dim); color: var(--gold); }
  .pos-badge.silver { background: var(--silver-dim); color: var(--silver); }
  .pos-badge.accent { background: var(--accent-dim); color: var(--accent); }

  .player-name { font-weight: 500; font-size: 14px; }
  .total-pts { font-size: 18px; font-weight: 700; color: var(--accent); }
  .round-pts { font-size: 12px; color: var(--muted); min-width: 28px; text-align: center; }
  .round-pts.win { color: var(--success); font-weight: 600; }
  .round-pts.bonus { color: var(--gold); font-weight: 600; }
  .round-pts.pending { color: var(--border2); }
  .round-pts.bye { color: var(--muted); opacity: 0.5; font-size: 13px; }

  /* Fase 2 usa identidad celeste en vez de lima, para diferenciarse de Fase 1 */
  #page-fase2 .ranking tr.classifica td { background: rgba(96,180,240,0.06); }
  #page-fase2 .ranking tr.classifica td:first-child { border-left: 2px solid var(--info); }
  #page-fase2 .pos-badge.accent { background: rgba(96,180,240,0.12); color: var(--info); }
  #page-fase2 .total-pts { color: var(--info); }
  #page-fase2 .stat-num { color: var(--info); }

  /* FIXTURE */
  .fixture-round {
    margin-bottom: 0.75rem;
  }
  .round-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.5rem 0;
    margin-bottom: 0.5rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .bye-tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: normal;
    text-transform: none;
    color: var(--muted);
    opacity: 0.75;
  }
  .match-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 0.75rem;
    border-radius: var(--radius);
    margin-bottom: 0.25rem;
    cursor: pointer;
    transition: background 0.1s;
  }
  .match-row:hover { background: var(--surface2); }
  .match-row.done { opacity: 0.6; }
  .match-game-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--surface2);
    color: var(--muted);
    white-space: nowrap;
  }
  .match-players {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
  }
  .match-result {
    font-size: 12px;
    color: var(--muted);
    min-width: 60px;
    text-align: right;
  }
  .match-result.set { color: var(--success); }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 1.5rem;
    width: 100%;
    max-width: 480px;
  }
  /* Cuando el modal se abre desde Fase 2, se tiñe celeste para mantener la identidad de fase */
  .modal.f2 { --accent: var(--info); --accent-dim: rgba(96,180,240,0.12); }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 0.25rem; }
  .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 1.25rem; }
  .modal-players {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .modal-player-btn {
    padding: 1rem;
    border-radius: var(--radius);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .modal-player-btn:hover { border-color: var(--accent); }
  .modal-player-btn.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .modal-player-btn.loser.selected { border-color: var(--danger); background: rgba(255,95,95,0.1); color: var(--danger); }
  .modal-bonus-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 0;
    border-top: 0.5px solid var(--border);
  }
  .modal-bonus-label { font-size: 13px; color: var(--muted); }
  .toggle {
    width: 42px; height: 24px;
    border-radius: 99px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }
  .toggle::after {
    content: '';
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--muted);
    position: absolute;
    top: 2px; left: 2px;
    transition: left 0.2s, background 0.2s;
  }
  .toggle.on { background: var(--accent-dim); border-color: var(--accent); }
  .toggle.on::after { left: 20px; background: var(--accent); }
  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
  .btn {
    flex: 1;
    padding: 0.75rem;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #0f0f13; border-color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-danger { background: transparent; color: var(--danger); border-color: rgba(255,95,95,0.3); }
  .empate-btn {
    width: 100%;
    padding: 0.6rem;
    border-radius: var(--radius);
    border: 1px dashed var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 0.5rem;
    transition: border-color 0.15s, color 0.15s;
  }
  .empate-btn:hover { border-color: var(--info); color: var(--info); }
  .empate-btn.selected { border-color: var(--info); color: var(--info); background: rgba(96,180,240,0.08); }

  /* IMPOSTOR */
  .impostor-card {
    border: 1.5px solid rgba(200,240,96,0.2);
  }
  .impostor-result-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.75rem; margin-top: 1rem;
  }
  .impostor-opt {
    padding: 1rem;
    border-radius: var(--radius);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .impostor-opt:hover { border-color: var(--accent); }
  .impostor-opt.selected-a { border-color: var(--accent); background: var(--accent-dim); }
  .impostor-opt.selected-b { border-color: var(--info); background: rgba(96,180,240,0.08); }
  .impostor-opt-icon { font-size: 24px; margin-bottom: 0.25rem; }
  .impostor-opt-label { font-size: 12px; font-weight: 600; }
  .impostor-opt-pts { font-size: 11px; color: var(--muted); }

  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; margin-bottom: 1rem; }
  .stat-card {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 0.875rem;
    text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
  #page-final .stat-num { color: var(--gold); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* FINAL TAB */
  .final-players { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
  .final-player {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.875rem 1rem;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface2);
  }
  .final-player .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }
  .final-player .badge.group { background: rgba(96,180,240,0.1); color: var(--info); }

  /* RONDA ESPECIAL LABEL */
  .especial-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    background: rgba(245,200,66,0.12);
    color: var(--gold);
    font-weight: 600;
  }

  /* TOOLTIP / empty state */
  .empty-state {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--muted);
    font-size: 13px;
  }

  /* scrollable table wrapper */
  .table-wrap { overflow-x: auto; }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    nav { padding: 0 0.75rem; }
    .nav-tab { padding: 1rem 0.75rem; font-size: 12px; }
    .page { padding: 1rem; }
  }

  /* IMPOSTOR GAME STYLES */
  .imp-screen {
    max-width: 500px;
    margin: 0 auto;
    padding: 1.5rem;
  }
  .imp-cat-btn {
    padding: 0.5rem 0.9rem;
    border-radius: 99px;
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 500;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  .imp-cat-btn:hover { border-color: var(--danger); }
  .imp-cat-btn.sel { border-color: var(--danger); background: rgba(255,95,95,0.1); color: var(--danger); }
  .imp-custom-tag {
    display: inline-flex;
    align-items: center;
    padding: 0.4rem 0.7rem;
    border-radius: 99px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    font-size: 12.5px;
    color: var(--text);
  }
  .imp-card-face {
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
    min-height: 200px;
    border-radius: var(--radius-lg);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
    text-align: center;
  }
  .imp-card-back:hover { border-color: var(--danger); background: rgba(255,95,95,0.06); }
  .imp-card-impostor {
    border-color: rgba(255,95,95,0.4);
    background: rgba(255,95,95,0.08);
    color: var(--danger);
    cursor: default;
  }
  .imp-card-word {
    border-color: rgba(200,240,96,0.35);
    background: rgba(200,240,96,0.06);
    color: var(--accent);
    cursor: default;
  }
  .imp-history-card {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .imp-history-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius);
    background: rgba(255,95,95,0.05);
    border-left: 2px solid var(--danger);
    font-size: 12px;
  }
  .imp-history-num { font-weight: 700; color: var(--danger); min-width: 24px; }
  .imp-history-word { font-weight: 600; flex: 1; }
  .imp-history-impostor { color: var(--muted); white-space: nowrap; }
  .imp-history-outcome { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
  .progress-dots {
    display: flex; gap: 6px; justify-content: center; margin: 1rem 0;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border2);
    transition: background 0.2s;
  }
  .dot.done { background: var(--accent); }
  .dot.current { background: var(--muted); }
  .cover-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 300;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 2rem;
    overflow-y: auto;
  }
  .cover-overlay .cover-icon { font-size: 56px; margin-bottom: 1rem; }
  .cover-overlay .cover-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
  .cover-overlay .cover-sub { font-size: 14px; color: var(--muted); margin-bottom: 2rem; }
  .result-vote-grid {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 0.5rem; margin-bottom: 1rem;
  }
  .vote-player-btn {
    padding: 0.75rem 0.5rem;
    border-radius: var(--radius);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .vote-player-btn:hover { border-color: var(--danger); }
  .vote-player-btn.sel { border-color: var(--danger); background: rgba(255,95,95,0.1); color: var(--danger); }

  /* REGLAS */
  .rules-hero {
    background: linear-gradient(135deg, rgba(200,240,96,0.10), rgba(96,180,240,0.05));
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 2rem 1.5rem;
    text-align: center;
    margin-bottom: 1.25rem;
  }
  .rules-hero-icon { font-size: 34px; margin-bottom: 0.6rem; }
  .rules-hero-title { font-size: 21px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
  .rules-hero-sub { font-size: 13px; color: var(--muted); line-height: 1.6; max-width: 460px; margin: 0 auto; }

  .rules-chips { display: flex; gap: 0.5rem; overflow-x: auto; padding: 0.1rem 0 1.5rem; scrollbar-width: none; }
  .rules-chips::-webkit-scrollbar { display: none; }
  .rules-chip {
    flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.5rem 0.95rem;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-size: 12.5px;
    font-weight: 600;
    text-decoration: none;
    white-space: nowrap;
    transition: border-color .15s, color .15s, background .15s;
  }
  .rules-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .rules-chip .dot-indicator { margin-right: 0; }

  .rules-intro { font-size: 13px; color: var(--muted); line-height: 1.65; }

  .dot-indicator { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 7px; vertical-align: middle; flex-shrink: 0; }
  .dot-indicator.general { background: var(--muted); }
  .dot-indicator.fase1 { background: var(--accent); box-shadow: 0 0 8px rgba(200,240,96,0.6); }
  .dot-indicator.fase2 { background: var(--info); box-shadow: 0 0 8px rgba(96,180,240,0.6); }
  .dot-indicator.impostor { background: var(--danger); box-shadow: 0 0 8px rgba(255,95,95,0.6); }
  .dot-indicator.final { background: var(--gold); box-shadow: 0 0 8px rgba(245,200,66,0.6); }

  .anchor-target { scroll-margin-top: 78px; }

  .tiebreak-list { display: flex; flex-direction: column; gap: 0.7rem; }
  .tiebreak-item { display: flex; align-items: flex-start; gap: 0.75rem; font-size: 13px; line-height: 1.55; color: var(--text); }
  .tiebreak-num {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent-dim); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; margin-top: 1px;
  }

  .rule-card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    margin-bottom: 0.7rem;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .rule-card[open] { border-color: var(--border2); }
  .rule-card summary {
    list-style: none;
    cursor: pointer;
    padding: 0.9rem 1.1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
  }
  .rule-card summary::-webkit-details-marker { display: none; }
  .rule-card summary:hover { background: var(--surface2); }
  .rule-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 0.7rem; }
  .rule-icon-badge {
    width: 32px; height: 32px; flex-shrink: 0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    background: var(--surface2);
  }
  .rule-icon-badge.fase1 { background: var(--accent-dim); }
  .rule-icon-badge.fase2 { background: rgba(96,180,240,0.12); }
  .rule-icon-badge.impostor { background: rgba(255,95,95,0.12); }
  .rule-icon-badge.final { background: var(--gold-dim); }
  .rule-chevron { color: var(--muted); font-size: 11px; transition: transform 0.2s; flex-shrink: 0; }
  .rule-card[open] .rule-chevron { transform: rotate(180deg); color: var(--accent); }
  .rule-card[open] summary { border-bottom: 0.5px solid var(--border); }
  .rule-body { padding: 1rem 1.1rem 1.15rem 1.1rem; }
  .rule-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 0.5rem; }
  .rule-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--muted); margin: 0.9rem 0 0.55rem;
  }
  .rule-list { padding-left: 1.15rem; font-size: 13px; line-height: 1.65; color: var(--text); }
  .rule-list li { margin-bottom: 0.4rem; }
  .rule-list li::marker { color: var(--border2); }

  .rule-footer {
    display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem;
    margin-top: 1rem; padding-top: 0.9rem; border-top: 0.5px solid var(--border);
  }
  .score-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 0.32rem 0.7rem;
    border-radius: 99px;
    font-size: 11.5px;
    font-weight: 600;
    white-space: nowrap;
  }
  .score-pill.win { background: rgba(78,203,126,0.12); color: var(--success); }
  .score-pill.bonus { background: var(--gold-dim); color: var(--gold); }
  .score-pill.lose { background: var(--surface2); color: var(--muted); }
  .score-pill.draw { background: rgba(96,180,240,0.12); color: var(--info); }

  /* RULETA */
  .roulette-strip-wrap {
    width: 100%;
    max-width: 340px;
    overflow: hidden;
    position: relative;
    border-radius: var(--radius-lg);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    height: 64px;
    margin: 1.25rem auto;
  }
  .roulette-strip-wrap::before,
  .roulette-strip-wrap::after {
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    width: 60px;
    z-index: 2;
    pointer-events: none;
  }
  .roulette-strip-wrap::before { left: 0; background: linear-gradient(to right, var(--surface2), transparent); }
  .roulette-strip-wrap::after  { right: 0; background: linear-gradient(to left, var(--surface2), transparent); }
  .roulette-strip {
    display: flex;
    align-items: center;
    height: 100%;
    will-change: transform;
  }
  .roulette-item {
    flex-shrink: 0;
    padding: 0 1.25rem;
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
    white-space: nowrap;
    height: 100%;
    display: flex;
    align-items: center;
    border-right: 0.5px solid var(--border);
    transition: color 0.1s, font-size 0.1s;
  }
  .roulette-item.winner {
    color: var(--gold);
    font-size: 17px;
  }
  .roulette-pointer {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    background: var(--gold);
    opacity: 0.8;
    z-index: 3;
    border-radius: 2px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 0.65rem 1.1rem;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    z-index: 500;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    pointer-events: auto;
  }
  .toast.hide {
    opacity: 0;
    transform: translateX(-50%) translateY(8px);
  }
  .toast-icon { font-size: 15px; }
  .toast-undo {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    padding: 0;
    margin-left: 0.25rem;
  }

  /* NAV PROGRESS BAR */
  .nav-progress {
    position: absolute;
    bottom: -1px;
    left: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
    transition: width 0.4s ease;
    pointer-events: none;
  }
  nav { position: relative; }

  /* NAV BADGE */
  .nav-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 700;
    line-height: 1;
    margin-left: 5px;
    background: var(--accent-dim);
    color: var(--accent);
  }
  .nav-tab[data-tab="fase2"] .nav-badge { background: rgba(96,180,240,0.15); color: var(--info); }
  .nav-tab.active .nav-badge { opacity: 0.8; }

  /* PODIUM — v2 */
  .podium-outer {
    background: linear-gradient(160deg, rgba(255,255,255,0.03), rgba(255,255,255,0.0));
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1rem 0;
    margin-bottom: 1.25rem;
    overflow: hidden;
    position: relative;
  }
  .podium-outer::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(245,200,66,0.06), transparent);
    pointer-events: none;
  }
  .podium-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
  }
  .podium-wrap {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 6px;
    padding: 0 4px;
    position: relative;
  }
  .podium-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    position: relative;
  }
  /* Figure area */
  .podium-avatar-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 6px;
  }
  .podium-glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(10px);
    opacity: 0.55;
    width: 32px; height: 32px;
    top: 4px;
    pointer-events: none;
    animation: glowPulse 2.4s ease-in-out infinite;
  }
  .podium-slot:nth-child(1) .podium-glow { background: #a0b4c8; animation-delay: 0.4s; }
  .podium-slot:nth-child(2) .podium-glow { background: #f5c842; width:40px; height:40px; top:2px; }
  .podium-slot:nth-child(3) .podium-glow { background: #cd7f32; animation-delay: 0.8s; }
  @keyframes glowPulse {
    0%,100% { opacity: 0.4; transform: scale(1); }
    50%      { opacity: 0.75; transform: scale(1.25); }
  }
  .podium-figure {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .podium-crown {
    font-size: 13px;
    line-height: 1;
    margin-bottom: -3px;
    animation: crownBob 2s ease-in-out infinite;
    position: relative; z-index: 2;
  }
  @keyframes crownBob {
    0%,100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-3px) rotate(4deg); }
  }
  .podium-name-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-align: center;
    padding: 2px 8px;
    border-radius: 99px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 90px;
    margin-bottom: 4px;
  }
  .podium-slot:nth-child(1) .podium-name-badge {
    background: rgba(160,180,200,0.15);
    color: #c8d8e8;
    border: 1px solid rgba(160,180,200,0.25);
  }
  .podium-slot:nth-child(2) .podium-name-badge {
    background: rgba(245,200,66,0.18);
    color: #f5c842;
    border: 1px solid rgba(245,200,66,0.35);
    font-size: 11px;
    padding: 3px 10px;
  }
  .podium-slot:nth-child(3) .podium-name-badge {
    background: rgba(205,127,50,0.15);
    color: #e09050;
    border: 1px solid rgba(205,127,50,0.25);
  }
  .podium-pts-badge {
    font-size: 9px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 5px;
    letter-spacing: 0.03em;
  }
  /* Platform blocks */
  .podium-block {
    width: 100%;
    border-radius: 6px 6px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 900;
    position: relative;
    overflow: hidden;
  }
  .podium-block::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0.6;
    border-radius: 6px 6px 0 0;
  }
  .podium-block-num {
    position: relative;
    z-index: 1;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .podium-slot:nth-child(1) .podium-block {
    background: linear-gradient(180deg,#9aaab8 0%,#6c7e8e 100%);
    height: 64px;
    box-shadow: 0 -2px 12px rgba(160,180,200,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .podium-slot:nth-child(1) .podium-block::after { background: linear-gradient(90deg,transparent,#c8d8e8,transparent); }
  .podium-slot:nth-child(1) .podium-block-num { color: rgba(255,255,255,0.7); }
  .podium-slot:nth-child(2) .podium-block {
    background: linear-gradient(180deg,#f5c842 0%,#c49020 100%);
    height: 96px;
    box-shadow: 0 -4px 20px rgba(245,200,66,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .podium-slot:nth-child(2) .podium-block::after { background: linear-gradient(90deg,transparent,rgba(255,255,255,0.7),transparent); }
  .podium-slot:nth-child(2) .podium-block-num { color: rgba(100,70,0,0.7); font-size: 18px; }
  .podium-slot:nth-child(3) .podium-block {
    background: linear-gradient(180deg,#d4834a 0%,#8c5020 100%);
    height: 46px;
    box-shadow: 0 -2px 10px rgba(205,127,50,0.2), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .podium-slot:nth-child(3) .podium-block::after { background: linear-gradient(90deg,transparent,rgba(220,160,90,0.6),transparent); }
  .podium-slot:nth-child(3) .podium-block-num { color: rgba(255,255,255,0.6); }
  /* Empty state */
  .podium-empty {
    font-size: 9px;
    color: var(--muted);
    opacity: 0.5;
    font-style: italic;
    margin-bottom: 5px;
    text-align: center;
  }
  /* Enter animations */
  @keyframes podiumRise {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  @keyframes podiumBounceIn {
    0%   { transform: scale(0.5) translateY(20px); opacity: 0; }
    60%  { transform: scale(1.08) translateY(-4px); opacity: 1; }
    100% { transform: scale(1) translateY(0); }
  }
  .podium-enter-1 { animation: podiumRise 0.45s cubic-bezier(.22,1,.36,1) 0.15s both; }
  .podium-enter-2 { animation: podiumBounceIn 0.55s cubic-bezier(.22,1,.36,1) 0s both; }
  .podium-enter-3 { animation: podiumRise 0.45s cubic-bezier(.22,1,.36,1) 0.25s both; }


  /* TV BUTTON */
  #tv-btn {
    margin-left: auto;
    flex-shrink: 0;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  #tv-btn:hover { color: var(--accent) !important; border-color: var(--accent) !important; background: var(--accent-dim) !important; }
  .tv-btn-txt { display: none; }
  @media (min-width: 640px) { .tv-btn-txt { display: inline; } }
  /* CONFETTI */
  #confetti-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9999;
    width: 100%; height: 100%;
  }

  /* MOTES DE LA NOCHE */
  .mote-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.875rem 0;
    border-bottom: 0.5px solid var(--border);
    animation: moteSlideIn 0.35s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes moteSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .mote-item:last-child { border-bottom: none; }
  .mote-emoji { font-size: 22px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
  .mote-body { flex: 1; min-width: 0; }
  .mote-title {
    font-size: 11px; font-weight: 700; color: var(--gold);
    margin-bottom: 2px; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .mote-title.shame    { color: var(--danger); }
  .mote-title.neutral  { color: var(--info); }
  .mote-title.impostor { color: var(--accent); }
  .mote-player { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .mote-reason { font-size: 11px; color: var(--muted); line-height: 1.45; }

  /* ENVELOPE REVEAL OVERLAY */
  .mote-overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,14,0.97);
    z-index: 400;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 2rem 1.5rem;
    touch-action: manipulation;
  }
  .mote-overlay-progress {
    position: absolute;
    top: 1.25rem;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .mote-overlay-skip {
    position: absolute;
    top: 1rem; right: 1.25rem;
    background: none; border: none;
    color: var(--muted); font-size: 12px;
    font-weight: 600; cursor: pointer;
    letter-spacing: 0.05em; text-transform: uppercase;
    padding: 0.4rem 0.6rem;
  }
  /* The envelope */
  .mote-envelope-wrap {
    margin-bottom: 2rem;
    cursor: pointer;
    position: relative;
    width: min(280px, 80vw);
    height: min(190px, 54vw);
  }
  .mote-envelope {
    width: 100%;
    height: 100%;
    position: relative;
  }
  .mote-env-front, .mote-env-back {
    position: absolute; inset: 0;
    border-radius: 14px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.5rem;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .mote-env-front {
    background: var(--surface);
    border: 1.5px solid var(--gold);
    box-shadow: 0 0 32px rgba(245,200,66,0.18), inset 0 1px 0 rgba(255,255,255,0.06);
    opacity: 1;
    transform: scale(1);
    z-index: 2;
  }
  .mote-env-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(160deg, rgba(245,200,66,0.12), transparent);
    border-radius: 14px 14px 0 0;
    clip-path: polygon(0 0, 100% 0, 50% 58%);
    border-bottom: 1.5px solid var(--gold);
  }
  .mote-env-icon { font-size: 36px; position: relative; z-index: 1; }
  .mote-env-label {
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); position: relative; z-index: 1;
  }
  .mote-env-hint {
    font-size: 11px; color: var(--muted);
    position: relative; z-index: 1;
  }
  .mote-env-back {
    background: var(--surface);
    border: 1.5px solid var(--border2);
    padding: 1.25rem;
    opacity: 0;
    transform: scale(0.92);
    z-index: 1;
    pointer-events: none;
  }
  /* Flipped state: fade front out, back in */
  .mote-envelope.flipped .mote-env-front {
    opacity: 0;
    transform: scale(0.92);
    pointer-events: none;
    z-index: 1;
  }
  .mote-envelope.flipped .mote-env-back {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
    z-index: 2;
  }

  /* Content inside the revealed card */
  .mote-reveal-type {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; margin-bottom: 0.35rem;
  }
  .mote-reveal-type.honor    { color: var(--gold); }
  .mote-reveal-type.shame    { color: var(--danger); }
  .mote-reveal-type.neutral  { color: var(--info); }
  .mote-reveal-type.impostor { color: var(--accent); }
  .mote-reveal-emoji { font-size: 40px; line-height: 1; margin-bottom: 0.25rem; }
  .mote-reveal-title { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; color: var(--text); }
  .mote-reveal-player {
    font-size: 22px; font-weight: 800;
    color: var(--gold);
    margin-bottom: 0.2rem;
  }
  .mote-reveal-player.shame   { color: var(--danger); }
  .mote-reveal-player.neutral { color: var(--info); }
  .mote-reveal-player.impostor { color: var(--accent); }
  .mote-reveal-reason {
    font-size: 11px; color: var(--muted); line-height: 1.5;
    max-width: 220px; text-align: center;
  }

  /* Next / done button */
  .mote-overlay-next {
    padding: 0.85rem 2.5rem;
    border-radius: var(--radius);
    border: 1.5px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-top: 0.25rem;
  }
  .mote-overlay-next:hover { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
  .mote-overlay-next.done  { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }

  /* pulse on envelope before flip */
  @keyframes envPulse {
    0%,100% { box-shadow: 0 0 24px rgba(245,200,66,0.18); }
    50%      { box-shadow: 0 0 48px rgba(245,200,66,0.42); }
  }
  .mote-env-front { animation: envPulse 2s ease-in-out infinite; }
  .mote-envelope.flipped .mote-env-front { animation: none; }

  /* ========== FINAL TAB EXTRAS ========== */
  .final-progress-bar-wrap {
    height: 6px; border-radius: 99px;
    background: var(--surface2);
    margin: 0.75rem 0 0.25rem;
    overflow: hidden;
  }
  .final-progress-bar {
    height: 100%; border-radius: 99px;
    background: var(--gold);
    transition: width 0.5s ease;
  }
  .final-progress-label {
    font-size: 11px; color: var(--muted);
    display: flex; justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .final-phase-row {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.6rem 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 13px;
  }
  .final-phase-row:last-child { border-bottom: none; }
  .final-phase-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .final-phase-name { flex: 1; font-weight: 500; }
  .final-phase-count { font-size: 12px; color: var(--muted); }
  .final-phase-pct {
    font-size: 12px; font-weight: 700;
    min-width: 36px; text-align: right;
  }
  .final-pending-list {
    display: flex; flex-direction: column; gap: 0.4rem;
    margin-top: 0.75rem;
  }
  .final-pending-item {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.5rem 0.75rem;
    border-radius: var(--radius);
    background: var(--surface2);
    font-size: 12px; color: var(--muted);
  }
  .final-pending-item .dot-indicator { flex-shrink: 0; }
  .final-clasificado-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; padding: 2px 8px; border-radius: 99px;
    background: rgba(245,200,66,0.15); color: var(--gold);
    font-weight: 700; white-space: nowrap;
  }
  .final-edit-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.6rem 0.875rem;
    background: var(--surface2);
    border: 1px dashed var(--border2);
    border-radius: var(--radius);
    margin-bottom: 0.75rem;
    font-size: 12px; color: var(--muted);
  }
  .final-edit-bar.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .final-edit-toggle {
    padding: 0.35rem 0.85rem; border-radius: 99px;
    border: 1.5px solid var(--border2);
    background: transparent; color: var(--text);
    font-size: 12px; font-weight: 700; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .final-edit-toggle:hover, .final-edit-bar.active .final-edit-toggle { border-color: var(--gold); color: var(--gold); }
  .final-edit-field { display: flex; flex-direction: column; gap: 0.3rem; margin-top: 0.75rem; }
  .final-edit-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
  .final-edit-input, .final-edit-textarea {
    padding: 0.5rem 0.7rem;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text); font-size: 13px; font-family: inherit;
    transition: border-color 0.15s;
  }
  .final-edit-input:focus, .final-edit-textarea:focus { outline: none; border-color: var(--gold); }
  .final-edit-textarea { min-height: 70px; resize: vertical; }
  .final-edit-save {
    margin-top: 0.75rem;
    padding: 0.5rem 1.25rem; border-radius: 99px;
    border: none; background: var(--gold); color: #0f0f13;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: opacity 0.15s;
  }
  .final-edit-save:hover { opacity: 0.85; }

const RULES_DEFAULT = {

    { name: 'Dardos', icon: '🎯', desc: 'Cada jugador dispone de 3 lanzamientos seguidos por ronda. El objetivo es llegar a 15 puntos.', format: 'Mejor de 3 rondas', pts_win: 3, pts_bonus: 1, pts_draw: 1, pts_lose: 0, bonus_label: '2-0', allow_draw: false, rules: ['Centro (círculo más pequeño) → 3 pts','Intermedio → 2 pts','Exterior → 1 pt','Los anillos rojos y verdes NO multiplican: solo vale la zona donde cae el dardo.'] },
    { name: 'UNO', icon: '🃏', desc: 'Juego clásico, con las siguientes variantes de reglas especiales.', format: 'Mejor de 3 partidas', pts_win: 3, pts_bonus: 1, pts_draw: 1, pts_lose: 0, bonus_label: '2-0', allow_draw: false, rules: ['Se puede responder un +2 con un +4.','Se puede responder un +4 con un +2.'] },
    { name: 'Palabras a Tiempo', icon: '⏱️', desc: 'Juego clásico de palabras, con categorías elegidas por el organizador.', format: 'Mejor de 3 partidas', pts_win: 3, pts_bonus: 1, pts_draw: 1, pts_lose: 0, bonus_label: '2-0', allow_draw: false, rules: ['1 categoría por ronda.','Cada jugador puede usar una sola vez un comodín para cambiar la categoría antes de empezar.'] },
    { name: 'Carrera de Mentes', icon: '👑', desc: 'Modo solo preguntas (sin tablero). Se juega al mejor de 3 coronas.', format: '3 coronas', pts_win: 3, pts_bonus: 1, pts_draw: 1, pts_lose: 0, bonus_label: 'Sin coronas rival', allow_draw: false, rules: ['Se hace un sorteo para definir quién empieza. El que gana el sorteo elige el libro.','El jugador que eligió el libro responde primero. Si acierta, el rival responde una pregunta del mismo libro. Si el rival falla, el que eligió se lleva la corona. Si el rival también acierta, se continúa en ese mismo libro alternando preguntas hasta que uno falle: quien falla pierde la corona.','Cada jugador puede usar una sola vez el comodín para cambiar una pregunta ya leída.','Una vez que se gana una corona (sin importar quién), el rival elige el siguiente libro.','El lector no está obligado a decir las opciones si no se las piden.'] },
    { name: 'Spot It', icon: '👀', desc: 'Juego de velocidad visual con las 53 cartas completas. Siempre hay un único símbolo que coincide entre cualquier par de cartas.', format: '1 partida completa', pts_win: 3, pts_bonus: 1, pts_draw: 1, pts_lose: 0, bonus_label: 'Rival con 5+ cartas', allow_draw: false, rules: ['Se mezcla el mazo y se reparten 26 cartas para cada jugador.','Se coloca 1 carta boca arriba en el centro.','Ambos dan vuelta sus cartas al mismo tiempo buscando el símbolo igual.','Al encontrarlo, se descarta la carta diciendo el símbolo en voz alta.','NO SE PUEDE ir cambiando de carta antes de encontrar el símbolo.','Gana quien descarte todas sus cartas primero.'] },
  ],
  f2: [
    { name: 'Mario Party', icon: '🎲', desc: 'Minijuegos rápidos 2v2 en Mario Party Superstars (emulador). Cada equipo compite en una tanda, gana el primero en llegar a 5 victorias de minijuego.', format: 'Primero en ganar 5 minijuegos (máx 15 min)', pts_win: 3, pts_bonus: 1, pts_draw: 0, pts_lose: 0, bonus_label: 'Ganar por 3+ de diferencia (5-2, 5-1 o 5-0)', allow_draw: false, rules: ['Gana el primer equipo en llegar a 5 victorias de minijuego.','Si se acaba el tiempo (15 min) antes, gana quien lleve más victorias.','En caso de empate al acabar el tiempo, se juega un minijuego desempate.','Bonus si ganás por 3 o más de diferencia (5-2, 5-1 o 5-0).','Se juega en Mario Party Superstars con controles Xbox mapeados (B=B, A=A).'] },
    { name: "Time's Up", icon: '⏰', desc: 'Juego de adivinanza por pistas. El equipo intenta adivinar la mayor cantidad de personajes/famosos en 1 minuto.', format: 'Turnos de 1 min', pts_win: 3, pts_bonus: 1, pts_draw: 1, pts_lose: 0, bonus_label: 'Duplicar aciertos del rival', allow_draw: false, rules: ['Si es una celebridad o famoso, NO se puede decir ni el nombre ni ninguna parte del mismo.','Turnos de 1 minuto por equipo.','Gana el equipo que más adivina en su minuto.'] },
    { name: 'Beer Pong', icon: '🍻', desc: 'Formato clásico adaptado. Cada equipo tiene 6 vasos de su lado.', format: 'Hasta vaciar o por tiempo', pts_win: 3, pts_bonus: 1, pts_draw: 1, pts_lose: 0, bonus_label: '3+ vasos en pie', allow_draw: true, rules: ['6 vasos por lado.','Cada jugador tira 1 vez por turno.','Si emboca, se retira el vaso.','Si un equipo emboca dos pelotas seguidas, puede cambiar la posición de un vaso propio o del rival.','Gana el equipo que elimine todos los vasos del rival.','Tiempo máximo: 7 minutos (o hasta que terminen las demás estaciones).'] },
    { name: 'Guess Movie/Song', icon: '🎬', desc: 'Juego de cultura pop. Se muestra una imagen (película) o se reproduce un fragmento de audio (canción). Los equipos usan el multibuzzer del celular para responder.', format: 'Todas las cartas', pts_win: 3, pts_bonus: 1, pts_draw: 1, pts_lose: 0, bonus_label: '5+ pts de diferencia', allow_draw: true, rules: ['El primero en presionar el buzzer tiene derecho a responder.','Solo puede responder el equipo que presionó primero.','Si responde mal: pierde el turno y el otro equipo puede intentarlo.','1 punto por canción o película adivinada.','Tiempo máximo para adivinar: 15 segundos.'] },
    { name: 'El Erudito', icon: '🧠', desc: 'Versión rápida del Erudito, solo con preguntas de aproximación numérica.', format: 'Hasta 7 aciertos o por tiempo', pts_win: 3, pts_bonus: 1, pts_draw: 1, pts_lose: 0, bonus_label: '3+ resp. de ventaja', allow_draw: true, rules: ['Se hacen preguntas de aproximación al mismo tiempo para ambos equipos.','1 minuto para pensar y anotar la respuesta.','Se respeta un ±5% de desvío.','Gana el equipo que acumule 7 respuestas correctas primero, o el que tenga más al terminar las demás estaciones.'] },
    { name: 'Jenga', icon: '🧱', desc: 'Juego clásico de equilibrio. El primero que derrumba la torre pierde.', format: 'Mejor de 3 rondas', pts_win: 3, pts_bonus: 1, pts_draw: 1, pts_lose: 0, bonus_label: '2-0', allow_draw: false, rules: [] },
  ]
};

let RULES_CONFIG = null;

function loadRulesConfig() {
  try {
    const s = localStorage.getItem('ndj_rules');
    if (s) {
      const parsed = JSON.parse(s);
      // Deep merge: keep all default keys, override with saved values
      RULES_CONFIG = JSON.parse(JSON.stringify(RULES_DEFAULT));
      if (parsed.general) Object.assign(RULES_CONFIG.general, parsed.general);
      if (parsed.impostor) Object.assign(RULES_CONFIG.impostor, parsed.impostor);
      // For f1/f2: merge by index (don't override if lengths differ)
      ['f1','f2'].forEach(phase => {
        if (Array.isArray(parsed[phase])) {
          parsed[phase].forEach((saved, i) => {
            if (RULES_CONFIG[phase][i]) Object.assign(RULES_CONFIG[phase][i], saved);
          });
        }
      });
    } else {
      RULES_CONFIG = JSON.parse(JSON.stringify(RULES_DEFAULT));
    }
  } catch(e) {
    RULES_CONFIG = JSON.parse(JSON.stringify(RULES_DEFAULT));
  }
}

function saveRulesConfig() {
  localStorage.setItem('ndj_rules', JSON.stringify(RULES_CONFIG));
  // Sync BONUS_F1, BONUS_F2, EMPATE_ALLOWED_F2 and GAMES_F1/F2 from config
  syncRulestoRuntime();
}

function syncRulestoRuntime() {
  // Sync game names
  RULES_CONFIG.f1.forEach((g, i) => { GAMES_F1[i] = g.name; });
  RULES_CONFIG.f2.forEach((g, i) => { GAMES_F2[i] = g.name; });
  // Sync bonus labels
  RULES_CONFIG.f1.forEach(g => { BONUS_F1[g.name] = g.bonus_label; });
  RULES_CONFIG.f2.forEach(g => { BONUS_F2[g.name] = g.bonus_label; });
  // Sync empate
  EMPATE_ALLOWED_F2.length = 0;
  RULES_CONFIG.f2.forEach(g => { if (g.allow_draw) EMPATE_ALLOWED_F2.push(g.name); });
}

let _rulesEditMode = false;

function toggleRulesEdit() {
  _rulesEditMode = !_rulesEditMode;
  renderReglas();
  // Scroll back to top of section
  const el = document.getElementById('page-reglas');
  if (el) el.scrollTop = 0;
}

function saveRuleCard(phase, idx) {
  const g = RULES_CONFIG[phase][idx];
  const prefix = `rule-edit-${phase}-${idx}`;
  const getName = id => { const el = document.getElementById(id); return el ? el.value.trim() : null; };
  const getNum = id => { const el = document.getElementById(id); return el ? parseFloat(el.value) || 0 : 0; };
  const getBool = id => { const el = document.getElementById(id); return el ? el.checked : false; };

  const newName = getName(prefix+'-name') || g.name;
  const oldName = g.name;
  g.name = newName;
  g.icon = getName(prefix+'-icon') || g.icon;
  g.desc = getName(prefix+'-desc') || g.desc;
  g.format = getName(prefix+'-format') || g.format;
  g.pts_win = getNum(prefix+'-pts_win');
  g.pts_bonus = getNum(prefix+'-pts_bonus');
  g.pts_draw = getNum(prefix+'-pts_draw');
  g.pts_lose = getNum(prefix+'-pts_lose');
  g.bonus_label = getName(prefix+'-bonus_label') || g.bonus_label;
  g.allow_draw = getBool(prefix+'-allow_draw');

  // Rules list
  const rows = document.querySelectorAll(`[data-rule-row="${prefix}"]`);
  g.rules = Array.from(rows).map(inp => inp.value.trim()).filter(Boolean);

  saveRulesConfig();

  // If name changed, update BONUS_F1/F2 references
  if (oldName !== newName) {
    if (phase === 'f1') { delete BONUS_F1[oldName]; }
    if (phase === 'f2') { delete BONUS_F2[oldName]; EMPATE_ALLOWED_F2.splice(EMPATE_ALLOWED_F2.indexOf(oldName),1); }
  }

  showToast('✓', `${newName} guardado`, false);
  renderReglas();
  // Re-open this card
  setTimeout(() => {
    const card = document.querySelector(`[data-rule-card="${phase}-${idx}"]`);
    if (card) card.open = true;
  }, 50);
}

function saveImpostorConfig() {
  const pts_nd = parseFloat(document.getElementById('imp-pts-nd')?.value) || 0;
  const pts_d = parseFloat(document.getElementById('imp-pts-d')?.value) || 0;
  const desc = document.getElementById('imp-desc')?.value?.trim() || RULES_CONFIG.impostor.desc;
  RULES_CONFIG.impostor.pts_noDescubierto = pts_nd;
  RULES_CONFIG.impostor.pts_descubierto = pts_d;
  RULES_CONFIG.impostor.desc = desc;
  saveRulesConfig();
  showToast('✓', 'Impostor guardado', false);
  renderReglas();
  setTimeout(() => { const c = document.getElementById('imp-rule-card'); if(c) c.open=true; }, 50);
}

function addRuleItem(phase, idx) {
  const prefix = `rule-edit-${phase}-${idx}`;
  const container = document.getElementById(prefix+'-rules-container');
  if (!container) return;
  const row = document.createElement('div');
  row.className = 'rule-edit-rule-row';
  row.innerHTML = `<input type="text" data-rule-row="${prefix}" placeholder="Nueva regla..."><button class="rule-edit-rule-remove" onclick="this.parentElement.remove()">×</button>`;
  container.appendChild(row);
}

function saveGeneralConfig() {
  const intro = document.getElementById('gen-intro')?.value?.trim();
  const ptsIntro = document.getElementById('gen-pts-intro')?.value?.trim();
  if (intro) RULES_CONFIG.general.intro = intro;
  if (ptsIntro) RULES_CONFIG.general.pointsIntro = ptsIntro;
  // Tiebreak items
  const rows = document.querySelectorAll('[data-tiebreak-row]');
  RULES_CONFIG.general.tiebreak = Array.from(rows).map(inp => inp.value.trim()).filter(Boolean);
  saveRulesConfig();
  showToast('✓', 'General guardado', false);
  renderReglas();
  setTimeout(() => { const c = document.getElementById('gen-edit-card'); if(c) c.open=true; }, 50);
}

function addTiebreakItem() {
  const container = document.getElementById('gen-tiebreak-container');
  if (!container) return;
  const row = document.createElement('div');
  row.className = 'rule-edit-rule-row';
  row.innerHTML = `<input type="text" data-tiebreak-row="1" placeholder="Criterio de desempate..."><button class="rule-edit-rule-remove" onclick="this.parentElement.remove()">×</button>`;
  container.appendChild(row);
}

function resetRulesConfig() {
  if (!confirm('¿Restaurar todas las reglas a los valores originales? (Los puntajes y cambios se perderán)')) return;
  localStorage.removeItem('ndj_rules');
  RULES_CONFIG = JSON.parse(JSON.stringify(RULES_DEFAULT));
  syncRulestoRuntime();
  _rulesEditMode = false;
  showToast('✓', 'Reglas restauradas', false);
  renderReglas();
}

  ['rgba(78,203,126,0.15)','#3aaa68'],   // 4 El Erudito   — verde

// ============================================================
// GENERACIÓN DINÁMICA DE FIXTURES (se usa al agregar jugadores/equipos)
// ============================================================

// Método del círculo (round-robin clásico). Si n es impar, agrega un sentinel
// (índice n) que representa el descanso. Devuelve hasta (sentinel-1) rondas
// sin parejas repetidas.
function roundRobinPairs(n) {
  const sentinel = n % 2 === 0 ? null : n;
  const total = n % 2 === 0 ? n : n + 1;
  let arr = Array.from({length: total}, (_, i) => i);
  const totalRounds = total - 1;
  const half = total / 2;
  const rounds = [];
  for (let r = 0; r < totalRounds; r++) {
    const pairs = [];
    for (let i = 0; i < half; i++) pairs.push([arr[i], arr[total - 1 - i]]);
    rounds.push(pairs);
    const last = arr.pop();
    arr.splice(1, 0, last);
  }
  return { rounds, sentinel };
}

// Todas las permutaciones ordenadas de tamaño k a partir de un array (sin repetir elementos).
function kPermutations(arr, k) {
  const results = [];
  const used = new Array(arr.length).fill(false);
  const current = [];
  function go() {
    if (current.length === k) { results.push(current.slice()); return; }
    for (let i = 0; i < arr.length; i++) {
      if (used[i]) continue;
      used[i] = true;
      current.push(arr[i]);
      go();
      current.pop();
      used[i] = false;
    }
  }
  go();
  return results;
}

function shuffleArr(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Fixture individual (Fase 1): cada partido simultáneo de una ronda usa un
// juego distinto (un solo "setup" físico por juego), y cada jugador no repite
// juego entre sus rondas, en la medida de lo posible.
function generateF1Fixture(n) {
  const { rounds: rrRounds, sentinel } = roundRobinPairs(n);
  const numRounds = Math.min(6, rrRounds.length);
  const byes = {};
  const realMatchesByRound = [];
  for (let r = 0; r < numRounds; r++) {
    const matches = [];
    rrRounds[r].forEach(([a, b]) => {
      if (a === sentinel) byes[r + 1] = b;
      else if (b === sentinel) byes[r + 1] = a;
      else matches.push([a, b]);
    });
    realMatchesByRound.push(matches);
  }

  const numGames = GAMES_F1.length;
  const playerUsedGames = {};
  const assignment = new Array(numRounds).fill(null);
  let _attempts = 0;
  const MAX_ATTEMPTS = 5000; // hard cap to prevent UI freeze

  function backtrack(idx) {
    if (_attempts++ > MAX_ATTEMPTS) return false;
    if (idx === numRounds) return true;
    const matches = realMatchesByRound[idx];
    const k = matches.length;
    if (k === 0) { assignment[idx] = []; return backtrack(idx + 1); }
    if (k > numGames) return false;
    const perms = shuffleArr(kPermutations(Array.from({length: numGames}, (_, i) => i), k));
    for (const perm of perms) {
      if (_attempts++ > MAX_ATTEMPTS) return false;
      let ok = true;
      for (let i = 0; i < k; i++) {
        const [a, b] = matches[i], g = perm[i];
        if ((playerUsedGames[a] && playerUsedGames[a].has(g)) || (playerUsedGames[b] && playerUsedGames[b].has(g))) { ok = false; break; }
      }
      if (!ok) continue;
      for (let i = 0; i < k; i++) {
        const [a, b] = matches[i], g = perm[i];
        (playerUsedGames[a] = playerUsedGames[a] || new Set()).add(g);
        (playerUsedGames[b] = playerUsedGames[b] || new Set()).add(g);
      }
      assignment[idx] = perm.slice();
      if (backtrack(idx + 1)) return true;
      for (let i = 0; i < k; i++) {
        const [a, b] = matches[i], g = perm[i];
        playerUsedGames[a].delete(g);
        playerUsedGames[b].delete(g);
      }
    }
    return false;
  }

  if (!backtrack(0)) {
    // Fallback de emergencia: garantiza que no se repita juego DENTRO de una
    // misma ronda, aunque no pueda evitar del todo que un jugador repita juego.
    for (let idx = 0; idx < numRounds; idx++) {
      assignment[idx] = realMatchesByRound[idx].map((_, i) => i % numGames);
    }
  }

  const fixture = [];
  for (let idx = 0; idx < numRounds; idx++) {
    const r = idx + 1;
    realMatchesByRound[idx].forEach(([a, b], i) => fixture.push([r, a, b, assignment[idx][i]]));
  }
  return { fixture, byes };
}

// Fixture grupal (Fase 2): 6 rondas, 3 partidos por ronda.
// Cada equipo pasa por los 6 juegos exactamente una vez.
// Ningún cruce de equipos se repite.
// Funciona para exactamente 6 equipos (índices 0-5).
function generateF2Fixture(n) {
  // Si hay exactamente 6 equipos, usar el fixture fijo óptimo
  if (n === 6) {
    const fixture = [
      // NOTA: fixture ajustado para que "Guess Movie/Song" nunca coincida en la
      // misma ronda con "Mario Party" (comparten TV) ni con "El Erudito"
      // (requieren al organizador como árbitro en ambas). Mario Party y El
      // Erudito sí pueden coincidir entre sí. Rondas 1-3-5: Mario Party +
      // Beer Pong + El Erudito. Rondas 2-4-6: Time's Up + Guess Movie/Song + Jenga.
      [1,0,1,0],[1,2,3,4],[1,4,5,2],
      [2,0,2,3],[2,1,4,1],[2,3,5,5],
      [3,0,3,0],[3,1,5,4],[3,2,4,2],
      [4,0,4,3],[4,2,5,1],[4,1,3,5],
      [5,0,5,0],[5,1,2,4],[5,3,4,2],
      [6,1,5,3],[6,2,3,1],[6,0,4,5],
    ];
    return { fixture, byes: {} };
  }
  // Fallback para otros números de equipos: round-robin clásico rotando juego por ronda
  const { rounds: rrRounds, sentinel } = roundRobinPairs(n);
  const period = rrRounds.length || 1;
  const numGames = GAMES_F2.length;
  const numRounds = 6;
  const byes = {};
  const fixture = [];
  for (let idx = 0; idx < numRounds; idx++) {
    const r = idx + 1;
    const pairs = rrRounds[idx % period];
    const g = idx % numGames;
    pairs.forEach(([a, b]) => {
      if (a === sentinel) byes[r] = b;
      else if (b === sentinel) byes[r] = a;
      else fixture.push([r, a, b, g]);
    });
  }
  return { fixture, byes };
}

function regenerateF1Fixture() {
  const { fixture, byes } = generateF1Fixture(PLAYERS.length);
  F1_FIXTURE = fixture;
  F1_BYES = byes;
}

function regenerateF2Fixture() {
  const { fixture, byes } = generateF2Fixture(TEAMS.length);
  F2_FIXTURE = fixture;
  F2_BYES = byes;
}

// Al cargar la página, si en algún momento se agregó gente, se restaura el
// mismo roster y el MISMO fixture ya generado (no se vuelve a sortear de
// nuevo en cada recarga, porque eso desincronizaría los resultados ya cargados).
function restoreRosterAndFixtures() {
  if (Array.isArray(state.playersSnapshot) && state.playersSnapshot.length) {
    PLAYERS.length = 0;
    state.playersSnapshot.forEach(n => PLAYERS.push(n));
  }
  if (Array.isArray(state.teamsSnapshot) && state.teamsSnapshot.length) {
    TEAMS.length = 0;
    state.teamsSnapshot.forEach(n => TEAMS.push(n));
  }
  if (state.f1FixtureSnapshot) {
    F1_FIXTURE = state.f1FixtureSnapshot.fixture;
    F1_BYES = state.f1FixtureSnapshot.byes;
  }
  if (state.f2FixtureSnapshot) {
    F2_FIXTURE = state.f2FixtureSnapshot.fixture;
    F2_BYES = state.f2FixtureSnapshot.byes;
  }
}

function resetRosterAndFixtures() {
  PLAYERS.length = 0; ORIGINAL_PLAYERS.forEach(n => PLAYERS.push(n));
  TEAMS.length = 0; ORIGINAL_TEAMS.forEach(n => TEAMS.push(n));
  F1_FIXTURE = ORIGINAL_F1_FIXTURE.map(m => m.slice());
  F1_BYES = Object.assign({}, ORIGINAL_F1_BYES);
  F2_FIXTURE = ORIGINAL_F2_FIXTURE.map(m => m.slice());
  F2_BYES = Object.assign({}, ORIGINAL_F2_BYES);
  state.playersSnapshot = null;
  state.teamsSnapshot = null;
  state.f1FixtureSnapshot = null;
  state.f2FixtureSnapshot = null;
}

// Load from localStorage
function loadState() {
  try {
    const s = localStorage.getItem('ndj_state');
    if (s) {
      const loaded = JSON.parse(s);
      state = Object.assign({}, state, loaded);
      // Migration: old single-object impostor shape -> rounds array
      if (!state.impostor || !Array.isArray(state.impostor.rounds)) {
        state.impostor = { rounds: [] };
      }
    }
  } catch(e) {}
}
// Canal de sincronización instantánea entre ventanas del mismo origen (misma PC)
window._bc = (() => { try { return new BroadcastChannel('ndj_sync'); } catch(e) { return null; } })();

function saveState() {
  const json = JSON.stringify(state);
  localStorage.setItem('ndj_state', json);
  // Misma PC: mandar directo a la ventana TV si está abierta
  if (window._tvWin && !window._tvWin.closed) {
    try { window._tvWin.postMessage({ type: 'ndj_state', data: json }, '*'); } catch(e) {}
  }
  // Backup BroadcastChannel
  if (window._bc) window._bc.postMessage({ key: 'ndj_state', data: json });
  // Celular → TV: Firebase
  if (window._fbReady) window._fbWrite('state', json);
}

// POINTS CALCULATION
// ============================================================
function getPlayerPoints() {
  const pts = PLAYERS.map(() => ({ rounds: Array(6).fill(null), special: null, total: 0 }));

  // Marcar la ronda de descanso de cada jugador
  for (let r = 1; r <= 6; r++) {
    const byeIdx = F1_BYES[r];
    if (pts[byeIdx]) pts[byeIdx].rounds[r-1] = 'bye';
  }

  F1_FIXTURE.forEach(([r, a, b, g]) => {
    const key = `${r}-${a}-${b}`;
    const res = state.f1[key];
    if (!res) return;
    const ri = r - 1;
    if (res.winner === 'empate') {
      const drawPts = (RULES_CONFIG && g !== undefined && RULES_CONFIG.f1[g]) ? RULES_CONFIG.f1[g].pts_draw : 1;
      if (pts[a]) { pts[a].rounds[ri] = drawPts; }
      if (pts[b]) { pts[b].rounds[ri] = drawPts; }
    } else {
      const w = res.winner;
      const l = w === a ? b : a;
      const gCfg = (RULES_CONFIG && g !== undefined && RULES_CONFIG.f1[g]) ? RULES_CONFIG.f1[g] : null;
      const winPts = gCfg ? gCfg.pts_win : 3;
      const bonusPts = gCfg ? gCfg.pts_bonus : 1;
      const losePts = gCfg ? gCfg.pts_lose : 0;
      let wp = winPts + (res.bonus ? bonusPts : 0);
      if (pts[w]) { pts[w].rounds[ri] = wp; }
      if (pts[l]) { pts[l].rounds[ri] = losePts; }
    }
  });

  // Impostor — acumula puntos de todas las rondas jugadas
  const impRounds = (state.impostor && state.impostor.rounds) || [];
  const impNoPts = (RULES_CONFIG && RULES_CONFIG.impostor) ? RULES_CONFIG.impostor.pts_noDescubierto : 4;
  const impDesPts = (RULES_CONFIG && RULES_CONFIG.impostor) ? RULES_CONFIG.impostor.pts_descubierto : 2;
  impRounds.forEach(rd => {
    if (rd.mode === 'noDescubierto') {
      const idx = PLAYERS.indexOf(rd.impostorName);
      if (idx !== -1) pts[idx].special = (pts[idx].special || 0) + impNoPts;
    } else {
      (rd.players || []).forEach(name => {
        if (name === rd.impostorName) return;
        const idx = PLAYERS.indexOf(name);
        if (idx !== -1) pts[idx].special = (pts[idx].special || 0) + impDesPts;
      });
    }
  });

  // Bonus manual (Kahoot u otras actividades previas)
  const bonusManual = state.bonusManual || {};
  PLAYERS.forEach((name, idx) => {
    const bm = bonusManual[name];
    if (bm && typeof bm.pts === 'number' && bm.pts !== 0) {
      pts[idx].bonusManual = bm.pts;
    }
  });

  pts.forEach(p => {
    p.total = p.rounds.reduce((s,v) => s + (typeof v === 'number' ? v : 0), 0) + (p.special || 0) + (p.bonusManual || 0);
  });
  return pts;
}

function getTeamPoints() {
  const pts = TEAMS.map(() => ({ rounds: Array(6).fill(null), total: 0 }));

  for (let r = 1; r <= 6; r++) {
    const byeIdx = F2_BYES[r];
    if (byeIdx !== undefined && pts[byeIdx]) pts[byeIdx].rounds[r-1] = 'bye';
  }

  F2_FIXTURE.forEach(([r, a, b, g]) => {
    const key = `${r}-${a}-${b}`;
    const res = state.f2[key];
    if (!res) return;
    const ri = r - 1;
    if (res.winner === 'empate') {
      const drawPts = (RULES_CONFIG && g !== undefined && RULES_CONFIG.f2[g]) ? RULES_CONFIG.f2[g].pts_draw : 1;
      pts[a].rounds[ri] = drawPts;
      pts[b].rounds[ri] = drawPts;
    } else {
      const w = res.winner;
      const l = w === a ? b : a;
      const gCfg = (RULES_CONFIG && g !== undefined && RULES_CONFIG.f2[g]) ? RULES_CONFIG.f2[g] : null;
      const winPts = gCfg ? gCfg.pts_win : 3;
      const bonusPts = gCfg ? gCfg.pts_bonus : 1;
      const losePts = gCfg ? gCfg.pts_lose : 0;
      let wp = winPts + (res.bonus ? bonusPts : 0);
      pts[w].rounds[ri] = wp;
      pts[l].rounds[ri] = losePts;
    }
  });

  pts.forEach(p => {
    p.total = p.rounds.reduce((s,v) => s + (typeof v === 'number' ? v : 0), 0);
  });
  return pts;
}

function toggleBonusManualEdit() {
  _bonusManualEditMode = !_bonusManualEditMode;
  renderBonusManualF1();
}

function saveBonusManual() {
  if (!state.bonusManual) state.bonusManual = {};
  PLAYERS.forEach((p, i) => {
    const inp = document.getElementById('bm-pts-' + i);
    if (!inp) return;
    const val = parseInt(inp.value, 10);
    if (!isNaN(val) && val > 0) {
      state.bonusManual[p] = { pts: val };
    } else {
      delete state.bonusManual[p];
    }
  });
  saveState();
  _bonusManualEditMode = false;
  showToast('🎯', 'Puntos de bonus guardados', false);
  renderFase1();
}

        if (res.winner === 'empate') resultText = 'Empate';
        else {

          resultText = `✓ ${w.split(' ')[0]}${res.bonus ? ' +bonus' : ''}`;

    });

// SUDDEN DEATH — Fase 1
// ============================================================
// State for SD matches stored in state.sd: { 'sd-0': {winner, bonus}, ... }
// The SD fixture is a dynamic best-of-3 series between the tied top-2 players.
// Keys use prefix 'sd-' + game index so they never collide with regular f1 keys.

function getSuddenDeathTie() {
  // Returns null if no tie for 1st, else {idxA, idxB, nameA, nameB, pts}
  const f1Done = F1_FIXTURE.filter(([r,a,b]) => state.f1[r+'-'+a+'-'+b]).length;
  if (f1Done < F1_FIXTURE.length) return null; // not all rounds done yet

  const ppts = getPlayerPoints();
  const sorted = PLAYERS.map((n,i) => ({n,i,pts:ppts[i]})).sort((a,b) => b.pts.total - a.pts.total);
  if (sorted.length < 2) return null;
  if (sorted[0].pts.total !== sorted[1].pts.total) return null;

  return {
    idxA:  sorted[0].i,
    idxB:  sorted[1].i,
    nameA: sorted[0].n,
    nameB: sorted[1].n,
    pts:   sorted[0].pts.total,
  };
}

function renderSuddenDeathF1() {
  const root = document.getElementById('sudden-death-f1');
  if (!root) return;

  const tie = getSuddenDeathTie();
  if (!tie) { root.innerHTML = ''; return; }

  if (!state.sd) state.sd = {};

  // SD is best-of-3: use up to 3 games, picking different games from GAMES_F1
  // Determine result so far
  let winsA = 0, winsB = 0;
  const sdGames = []; // [{gameIdx, key, res}]
  const gamePool = [0,1,2,3,4,5]; // indices into GAMES_F1
  for (let i = 0; i < 3; i++) {
    const gameIdx = gamePool[i];
    const key = 'sd-' + i;
    const res = state.sd[key] || null;
    sdGames.push({ gameIdx, key, res });
    if (res) {
      if (res.winner === tie.idxA) winsA++;
      else if (res.winner === tie.idxB) winsB++;
    }
  }

  const winner = winsA >= 2 ? tie.nameA : winsB >= 2 ? tie.nameB : null;
  const seriesDone = !!winner;

  // Only show matches up to the point the series is decided or all played
  const matchesToShow = [];
  let runningA = 0, runningB = 0;
  for (const g of sdGames) {
    matchesToShow.push(g);
    if (g.res) {
      if (g.res.winner === tie.idxA) runningA++;
      else if (g.res.winner === tie.idxB) runningB++;
    }
    if (runningA >= 2 || runningB >= 2) break;
  }

  const matchesHtml = matchesToShow.map(({gameIdx, key, res}) => {
    const game = GAMES_F1[gameIdx];
    const [gbg, gcol] = GAME_COLORS_F1[gameIdx] || ['rgba(245,200,66,0.12)', 'var(--gold)'];
    let resultText = '', resultClass = '';
    if (res) {
      const wName = res.winner === tie.idxA ? tie.nameA : tie.nameB;
      resultText = `⚡ ${wName.split(' ')[0]}${res.bonus ? ' +bonus' : ''}`;
      resultClass = 'set';
    }
    return `<div class="sd-match-row ${res ? 'done' : ''}" onclick="openSuddenDeathModal('${key}','${game}','${tie.nameA}','${tie.nameB}',${tie.idxA},${tie.idxB})">
      <span class="sd-game-badge" style="background:${gbg};color:${gcol}">⚡ ${game}</span>
      <span style="font-size:13px;font-weight:500">${tie.nameA.split(' ')[0]} vs ${tie.nameB.split(' ')[0]}</span>
      <span class="sd-result-text ${resultClass}">${res ? resultText : 'Cargar'}</span>
    </div>`;
  }).join('');

  const scoreHtml = `<span style="font-size:22px;font-weight:800;color:var(--gold)">${winsA}</span>
    <span style="font-size:13px;color:var(--muted);margin:0 0.4rem">–</span>
    <span style="font-size:22px;font-weight:800;color:var(--gold)">${winsB}</span>`;

  const winnerBanner = winner ? `<div style="margin-top:1rem;padding:0.875rem 1rem;border-radius:var(--radius);background:rgba(245,200,66,0.12);border:1px solid rgba(245,200,66,0.4);text-align:center;font-size:14px;font-weight:700;color:var(--gold)">🏆 ${winner.split(' ')[0]} clasifica como 1° de Fase 1</div>` : '';

  root.innerHTML = `
    <div class="sd-card" style="margin-top:1.5rem">
      <div class="sd-title">⚡ Sudden Death — Desempate</div>
      <div class="sd-sub">Fase 1 terminó con empate en el 1° puesto (${tie.pts} pts). Se juega una serie al mejor de 3 con juegos distintos para definir quién clasifica primero.</div>
      <div class="sd-players">
        <div class="sd-player">
          <div class="sd-player-name">${tie.nameA.split(' ')[0]}</div>
          <div class="sd-player-pts">${tie.pts} pts</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
          <div style="display:flex;align-items:center">${scoreHtml}</div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase">serie</div>
        </div>
        <div class="sd-player">
          <div class="sd-player-name">${tie.nameB.split(' ')[0]}</div>
          <div class="sd-player-pts">${tie.pts} pts</div>
        </div>
      </div>
      ${matchesHtml}
      ${winnerBanner}
    </div>
  `;
}

function renderFase2() {
  renderF2RosterAdmin();
  const tpts = getTeamPoints();
  const sorted = TEAMS.map((n,i) => ({n,i,pts:tpts[i]}))
    .sort((a,b) => b.pts.total - a.pts.total);

  const done = F2_FIXTURE.filter(([r,a,b]) => state.f2[`${r}-${a}-${b}`]).length;
  const total = F2_FIXTURE.length;
  document.getElementById('stats-fase2').innerHTML = `
    <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">Duelos jugados</div></div>
    <div class="stat-card"><div class="stat-num">${total - done}</div><div class="stat-label">Pendientes</div></div>
    <div class="stat-card"><div class="stat-num">${sorted[0]?.pts.total || 0}</div><div class="stat-label">Puntaje líder</div></div>
  `;

  const tbody = document.getElementById('tbody-fase2');
  tbody.innerHTML = sorted.map(({n,i,pts}, pos) => {
    const badgeClass = pos === 0 ? 'gold' : pos === 1 ? 'accent' : '';
    const rowClass = pos < 1 ? 'classifica' : '';
    const rounds = pts.rounds.map(v =>
      v === 'bye' ? `<td class="round-pts bye" title="Descansa esta ronda">😴</td>`
      : v === null ? `<td class="round-pts pending">—</td>`
      : v >= 4 ? `<td class="round-pts bonus">${v}</td>`
      : v > 0 ? `<td class="round-pts win">${v}</td>`
      : `<td class="round-pts">${v}</td>`
    ).join('');
    return `<tr class="${rowClass}">
      <td><div class="pos-badge ${badgeClass}">${pos+1}</div></td>
      <td class="player-name" style="font-size:12px">${n}</td>
      ${rounds}
      <td style="text-align:right"><span class="total-pts">${pts.total}</span></td>
    </tr>`;
  }).join('');

  renderFixtureF2();
  renderPodium('podium-fase2', sorted, 'f2');
}

function renderFixtureF2() {
  const container = document.getElementById('fixture-fase2');
  let html = '';
  for (let r = 1; r <= 6; r++) {
    const matches = F2_FIXTURE.filter(m => m[0] === r);
    const byeIdx = F2_BYES[r];
    const byeTag = byeIdx !== undefined ? `<span class="bye-tag">😴 Descansa: ${TEAMS[byeIdx].split('/')[0].trim()}</span>` : '';
    html += `<div class="fixture-round"><div class="round-label">Ronda ${r} ${byeTag}</div>`;
    matches.forEach(([round, a, b, g]) => {
      const key = `${round}-${a}-${b}`;
      const res = state.f2[key];
      const game = GAMES_F2[g];
      const [gbg, gcol] = GAME_COLORS_F2[g] || ['var(--surface2)', 'var(--muted)'];
      const tA = TEAMS[a];
      const tB = TEAMS[b];
      let resultText = '';
      if (res) {
        if (res.winner === 'empate') resultText = 'Empate';
        else {
          const w = TEAMS[res.winner] || '?';
          resultText = `✓ ${w.split('/')[0].trim()}${res.bonus ? ' +bonus' : ''}`;
        }
      }
      html += `<div class="match-row ${res ? 'done' : ''}" onclick="openModal('f2','${key}','${game}','${tA}','${tB}',${a},${b})">
        <span class="match-game-badge" style="background:${gbg};color:${gcol};font-weight:600">${game}</span>
        <span class="match-players" style="font-size:12px">${tA.split('/')[0].trim()} vs ${tB.split('/')[0].trim()}</span>
        <span class="match-result ${res ? 'set' : ''}">${res ? resultText : 'Cargar'}</span>
      </div>`;
    });
    html += '</div>';
  }
  container.innerHTML = html;
}

function openModal(phase, key, game, nameA, nameB, idxA, idxB) {

function selectWinner(idx) {
  modalCtx.winner = idx;

    b.classList.remove('selected','loser');

function selectEmpate() {
  modalCtx.winner = 'empate';
  document.querySelectorAll('.modal-player-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('empate-btn').classList.add('selected');
}

function toggleBonus() {
  modalCtx.bonus = !modalCtx.bonus;
  document.getElementById('bonus-toggle').classList.toggle('on', modalCtx.bonus);
}

let _lastResult = null; // for undo

function saveResult() {
  if (modalCtx.winner === null) {
    showToast('⚠️', 'Seleccioná un ganador primero', false);
    return;
  }

  // ── Sudden Death save ──────────────────────────────────────
  if (modalCtx.phase === 'sd') {
    if (!state.sd) state.sd = {};
    state.sd[modalCtx.key] = { winner: modalCtx.winner, bonus: modalCtx.bonus };
    saveState();
    closeModal();
    playSaveSound();
    renderFase1();
    const wName = modalCtx.winner === modalCtx.idxA ? modalCtx.nameA : modalCtx.nameB;
    showToast('⚡', `SD: ${wName.split(' ')[0]} gana${modalCtx.bonus ? ' +bonus' : ''}`, false);
    return;
  }

  // ── Regular save ───────────────────────────────────────────
  const store = modalCtx.phase === 'f1' ? state.f1 : state.f2;
  // Store previous value for undo
  _lastResult = {
    phase: modalCtx.phase,
    key: modalCtx.key,
    prev: store[modalCtx.key] ? { ...store[modalCtx.key] } : null,
    next: { winner: modalCtx.winner, bonus: modalCtx.bonus },
  };
  store[modalCtx.key] = { winner: modalCtx.winner, bonus: modalCtx.bonus };
  saveState();
  closeModal();
  playSaveSound();
  if (modalCtx.phase === 'f1') renderFase1();
  else renderFase2();
  const winnerName = modalCtx.winner === 'empate'
    ? 'Empate'
    : (modalCtx.phase === 'f1' ? PLAYERS[modalCtx.winner] : TEAMS[modalCtx.winner]).split('/')[0].trim().split(' ')[0];
  showToast('✓', 'Guardado · ' + winnerName + (modalCtx.bonus ? ' +bonus' : ''), true);
  updateNavProgress();
}

function undoLastResult() {
  if (!_lastResult) return;
  const store = _lastResult.phase === 'f1' ? state.f1 : state.f2;
  if (_lastResult.prev === null) {
    delete store[_lastResult.key];
  } else {
    store[_lastResult.key] = _lastResult.prev;
  }
  _lastResult = null;
  saveState();
  playUndoSound();
  const activeTab = document.querySelector('.nav-tab.active')?.dataset.tab;
  if (activeTab === 'fase1') renderFase1();
  else if (activeTab === 'fase2') renderFase2();
  hideToast();
  updateNavProgress();
}

function deleteResult() {
  const store = modalCtx.phase === 'f1' ? state.f1 : state.f2;
  _lastResult = {
    phase: modalCtx.phase,
    key: modalCtx.key,
    prev: store[modalCtx.key] ? { ...store[modalCtx.key] } : null,
    next: null,
  };
  delete store[modalCtx.key];
  saveState();
  closeModal();
  if (modalCtx.phase === 'f1') renderFase1();
  else renderFase2();
  showToast('🗑', 'Resultado eliminado', true);
  updateNavProgress();
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

// Mini confirm modal (reuses the same modal-bg infrastructure)
let _confirmCallback = null;
let _confirmCancelCallback = null;

function showConfirmModal(title, sub, onConfirm, onCancel) {
  _confirmCallback = onConfirm;
  _confirmCancelCallback = onCancel || null;
  const bg = document.getElementById('modal-bg');
  const modal = bg.querySelector('.modal');

  // Temporarily replace modal contents with confirm UI
  modal._savedHTML = modal.innerHTML;
  modal.innerHTML = `
    <div class="modal-title">${title}</div>
    ${sub ? `<div class="modal-sub">${sub}</div>` : ''}
    <div class="modal-actions" style="margin-top:1.5rem">
      <button class="btn btn-ghost" onclick="cancelConfirmModal()">Cancelar</button>
      <button class="btn btn-danger" style="background:rgba(255,95,95,0.12);color:var(--danger);border-color:rgba(255,95,95,0.3)" onclick="doConfirmModal()">Eliminar</button>
    </div>
  `;
  bg.classList.add('open');
}

function doConfirmModal() {
  restoreModalHTML();
  document.getElementById('modal-bg').classList.remove('open');
  if (_confirmCallback) { _confirmCallback(); _confirmCallback = null; }
}

function cancelConfirmModal() {
  restoreModalHTML();
  document.getElementById('modal-bg').classList.remove('open');
  if (_confirmCancelCallback) { _confirmCancelCallback(); _confirmCancelCallback = null; }
}

function restoreModalHTML() {
  const modal = document.querySelector('.modal');
  if (modal && modal._savedHTML !== undefined) {
    modal.innerHTML = modal._savedHTML;
    delete modal._savedHTML;
  }
}

document.getElementById('modal-bg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Detecta la categoría de una palabra custom usando el diccionario
function detectWordCategory(word) {
  const w = word.toLowerCase().trim();
  for (const [cat, words] of Object.entries(WORD_CATEGORY_MAP)) {
    if (words.some(kw => w === kw || w.includes(kw) || kw.includes(w))) {
      return cat;
    }
  }
  // Fallback: buscar en IMP_WORDS directamente
  const TODAS = 'Todas juntas 🎲';
  for (const [cat, words] of Object.entries(IMP_WORDS)) {
    if (cat === TODAS) continue;
    if (words.some(kw => kw.toLowerCase() === w)) return cat;
  }
  return null;
}
