  } else if (TV_PHASE === 'fase2') {
    f1El.style.display = 'none';
    divider.style.display = 'none';
    podiums.style.gridTemplateColumns = '1fr';
    f2El.style.maxWidth = '820px';
    f2El.style.margin = '0 auto';
    f2El.style.width = '100%';
  }
  // 'both' keeps the default two-column layout
})();

function lighten(hex, amt) {
  let c = hex.replace('#','');
  if (c.length===3) c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  const r=Math.min(255,parseInt(c.slice(0,2),16)+Math.round(amt*120));
  const g=Math.min(255,parseInt(c.slice(2,4),16)+Math.round(amt*100));
  const b=Math.min(255,parseInt(c.slice(4,6),16)+Math.round(amt*80));
  return 'rgb('+r+','+g+','+b+')';
}

function miiFigureSVG(color, size, pose, photoDataUrl) {
  const s=size, uid='tv'+Math.random().toString(36).slice(2,8), cx=s/2;
  const headR=s*0.215, headCy=headR+s*0.01, neckT=headCy+headR;
  const torsoT=neckT+s*0.04, torsoH=s*0.22, torsoW=s*0.38;
  const torsoB=torsoT+torsoH, torsoL=cx-torsoW/2, torsoR2=cx+torsoW/2, torsoRad=s*0.07;
  const legW=s*0.12, legH=s*0.22, legGap=s*0.03;
  const legLX=cx-legGap/2-legW, legRX=cx+legGap/2, legT=torsoB-s*0.03, legB=legT+legH, legRad=s*0.05;
  const armW=s*0.10, armH=s*0.20, armRad=s*0.05, armShY=torsoT+s*0.03;
  const light=lighten(color,0.28), dark=lighten(color,-0.12);
  const skinBase='#f5c8a0', skinDark='#e8a878';
  const neckW=s*0.09, neckH=s*0.05;
  let aL,aR;
  if(pose==='victory'){
    aL='<rect x="'+(torsoL-armW-s*0.03)+'" y="'+(armShY-armH*0.85)+'" width="'+armW+'" height="'+armH+'" rx="'+armRad+'" fill="'+light+'" transform="rotate(-38,'+(torsoL-s*0.03+armW/2)+','+armShY+')"/>';
    aR='<rect x="'+(torsoR2-s*0.01)+'" y="'+(armShY-armH*0.85)+'" width="'+armW+'" height="'+armH+'" rx="'+armRad+'" fill="'+light+'" transform="rotate(38,'+(torsoR2-s*0.01+armW/2)+','+armShY+')"/>';
  } else if(pose==='side'){
    aL='<rect x="'+(torsoL-armW-s*0.01)+'" y="'+armShY+'" width="'+armW+'" height="'+armH+'" rx="'+armRad+'" fill="'+light+'" transform="rotate(12,'+(torsoL-armW/2-s*0.01)+','+armShY+')"/>';
    aR='<rect x="'+(torsoR2+s*0.01)+'" y="'+armShY+'" width="'+armW+'" height="'+armH+'" rx="'+armRad+'" fill="'+light+'" transform="rotate(-12,'+(torsoR2+s*0.01+armW/2)+','+armShY+')"/>';
  } else {
    aL='<rect x="'+(torsoL-armW)+'" y="'+armShY+'" width="'+armW+'" height="'+armH+'" rx="'+armRad+'" fill="'+light+'" transform="rotate(22,'+(torsoL-armW/2)+','+armShY+')"/>';
    aR='<rect x="'+torsoR2+'" y="'+armShY+'" width="'+armW+'" height="'+armH+'" rx="'+armRad+'" fill="'+light+'" transform="rotate(-22,'+(torsoR2+armW/2)+','+armShY+')"/>';
  }
  const torsoEl='<rect x="'+torsoL+'" y="'+torsoT+'" width="'+torsoW+'" height="'+torsoH+'" rx="'+torsoRad+'" fill="'+color+'"/><rect x="'+torsoL+'" y="'+torsoT+'" width="'+torsoW+'" height="'+(torsoH*0.45)+'" rx="'+torsoRad+'" fill="'+light+'" opacity="0.25"/>';
  const legLEl='<rect x="'+legLX+'" y="'+legT+'" width="'+legW+'" height="'+legH+'" rx="'+legRad+'" fill="'+dark+'"/>';
  const legREl='<rect x="'+legRX+'" y="'+legT+'" width="'+legW+'" height="'+legH+'" rx="'+legRad+'" fill="'+dark+'"/>';
  const shoeW=legW+s*0.04, shoeH=s*0.06;
  const sL='<rect x="'+(legLX-s*0.02)+'" y="'+(legB-shoeH*0.5)+'" width="'+shoeW+'" height="'+shoeH+'" rx="'+(shoeH/2)+'" fill="'+lighten(dark,-0.15)+'"/>';
  const sR='<rect x="'+(legRX-s*0.02)+'" y="'+(legB-shoeH*0.5)+'" width="'+shoeW+'" height="'+shoeH+'" rx="'+(shoeH/2)+'" fill="'+lighten(dark,-0.15)+'"/>';
  const neckEl='<rect x="'+(cx-neckW/2)+'" y="'+(neckT-s*0.01)+'" width="'+neckW+'" height="'+(neckH+s*0.01)+'" rx="'+(neckW*0.3)+'" fill="'+skinDark+'"/>';
  let headEl;
  if(photoDataUrl){
    headEl='<defs><clipPath id="hcp'+uid+'"><circle cx="'+cx+'" cy="'+headCy+'" r="'+headR+'"/></clipPath><radialGradient id="hrim'+uid+'" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="rgba(255,255,255,0.25)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient></defs><circle cx="'+cx+'" cy="'+headCy+'" r="'+headR+'" fill="'+skinBase+'"/><image href="'+photoDataUrl+'" x="'+(cx-headR)+'" y="'+(headCy-headR)+'" width="'+(headR*2)+'" height="'+(headR*2)+'" clip-path="url(#hcp'+uid+')" preserveAspectRatio="xMidYMid slice"/><circle cx="'+cx+'" cy="'+headCy+'" r="'+headR+'" fill="url(#hrim'+uid+')"/><circle cx="'+cx+'" cy="'+headCy+'" r="'+headR+'" fill="none" stroke="'+light+'" stroke-width="'+(s*0.02)+'"/>';
  } else {
    const eRx=headR*0.115,eRy=headR*0.14,eY=headCy-headR*0.05,eOff=headR*0.3,smR=headR*0.28;
    headEl='<defs><radialGradient id="hg'+uid+'" cx="40%" cy="30%" r="65%"><stop offset="0%" stop-color="'+skinBase+'"/><stop offset="100%" stop-color="'+skinDark+'"/></radialGradient></defs><circle cx="'+cx+'" cy="'+headCy+'" r="'+headR+'" fill="url(#hg'+uid+')" stroke="'+light+'" stroke-width="'+(s*0.02)+'"/><ellipse cx="'+(cx-eOff)+'" cy="'+eY+'" rx="'+eRx+'" ry="'+eRy+'" fill="#2a1f14"/><ellipse cx="'+(cx+eOff)+'" cy="'+eY+'" rx="'+eRx+'" ry="'+eRy+'" fill="#2a1f14"/><circle cx="'+(cx-eOff+eRx*0.4)+'" cy="'+(eY-eRy*0.35)+'" r="'+(eRx*0.38)+'" fill="rgba(255,255,255,0.75)"/><circle cx="'+(cx+eOff+eRx*0.4)+'" cy="'+(eY-eRy*0.35)+'" r="'+(eRx*0.38)+'" fill="rgba(255,255,255,0.75)"/><path d="M'+(cx-smR)+','+(headCy+headR*0.22)+' Q'+cx+','+(headCy+headR*0.52)+' '+(cx+smR)+','+(headCy+headR*0.22)+'" stroke="#2a1f14" stroke-width="'+(s*0.025)+'" fill="none" stroke-linecap="round"/>';

}

function getPoints(type, state, PLAYERS, TEAMS) {
  // Load RULES_CONFIG from localStorage (TV window has no access to main window's variables)
  let RC = null;
  try {
    const rStr = localStorage.getItem('ndj_rules');
    if (rStr) RC = JSON.parse(rStr);
  } catch(e) {}

  if(type==='f1'){
    const pts=PLAYERS.map(()=>({total:0}));
    F1_FIXTURE.forEach(([r,a,b,g])=>{
      const res=state.f1[r+'-'+a+'-'+b];
      if(!res)return;
      const gCfg=(RC&&g!==undefined&&RC.f1&&RC.f1[g])?RC.f1[g]:null;
      const winPts=gCfg?gCfg.pts_win:3;
      const bonusPts=gCfg?gCfg.pts_bonus:1;
      const drawPts=gCfg?gCfg.pts_draw:1;
      if(res.winner==='empate'){pts[a].total+=drawPts;pts[b].total+=drawPts;}
      else{pts[res.winner].total+=winPts+(res.bonus?bonusPts:0);}
    });
    const impNoPts=(RC&&RC.impostor)?RC.impostor.pts_noDescubierto:4;
    const impDesPts=(RC&&RC.impostor)?RC.impostor.pts_descubierto:2;
    if(state.impostor&&Array.isArray(state.impostor.rounds)){
      state.impostor.rounds.forEach(rd=>{
        const idx=PLAYERS.indexOf(rd.impostorName);
        if(idx<0)return;
        if(rd.mode==='noDescubierto')pts[idx].total+=impNoPts;
        else if(rd.mode==='descubierto'){const vi=PLAYERS.indexOf(rd.accusedName);if(vi>=0)pts[vi].total+=impDesPts;}
      });
    }
    return pts;
  } else {
    const pts=TEAMS.map(()=>({total:0}));
    F2_FIXTURE.forEach(([r,a,b,g])=>{
      const res=state.f2[r+'-'+a+'-'+b];
      if(!res)return;
      const gCfg=(RC&&g!==undefined&&RC.f2&&RC.f2[g])?RC.f2[g]:null;
      const winPts=gCfg?gCfg.pts_win:3;
      const bonusPts=gCfg?gCfg.pts_bonus:1;
      const drawPts=gCfg?gCfg.pts_draw:1;
      if(res.winner==='empate'){pts[a].total+=drawPts;pts[b].total+=drawPts;}
      else{pts[res.winner].total+=winPts+(res.bonus?bonusPts:0);}
    });
    return pts;
  }
}

const COLORS=['#a0b4c8','#f5c842','#cd7f32'];
const POSES=['side','victory','slump'];
const POS_LABELS=['2°','1°','3°'];
const ORDER=[1,0,2]; // display: 2nd left, 1st center, 3rd right
// figsize scales with viewport — bigger in single-phase mode
function figSize(slotIdx){
  const single = TV_PHASE !== 'both';
  const base = single ? [0.10,0.13,0.085] : [0.07,0.09,0.06];
  return Math.round(Math.min(window.innerWidth,window.innerHeight)*base[slotIdx]);
}

let _prevKeys={f1:'',f2:''};
let _tvCachedState = null; // estado recibido por postMessage (más fresco que localStorage)

function renderTV() {
  let state={f1:{},f2:{},impostor:{rounds:[]}};
  let photos={};
  let PLAYERS=PLAYERS_INIT.slice();
  let TEAMS=TEAMS_INIT.slice();
  try{
    // Prioridad: estado recibido por postMessage > localStorage
    const s = _tvCachedState || localStorage.getItem('ndj_state');
    if(s) state=Object.assign({f1:{},f2:{},impostor:{rounds:[]}},JSON.parse(s));
    const p=localStorage.getItem('ndj_photos');
    if(p) photos=JSON.parse(p);
    // Restore roster if saved
    if(state.playersSnapshot) PLAYERS=state.playersSnapshot.slice();
    if(state.teamsSnapshot)   TEAMS=state.teamsSnapshot.slice();
  }catch(e){}

  // Only render the phases that are shown
  const phasesToRender = TV_PHASE === 'fase1' ? ['f1'] : TV_PHASE === 'fase2' ? ['f2'] : ['f1','f2'];

  phasesToRender.forEach(phase=>{
    const isF1=phase==='f1';

    const key=sorted.slice(0,3).map(s=>s.n+':'+s.pts.total).join('|');

      const entry=sorted[pos];

      const color=COLORS[slotIdx];

      const ptsHtml=entry?'<div class="podium-pts">'+pts+' pts</div>':'';
      const animCls=changed?'enter-'+slotIdx:'';
      return '<div class="podium-slot slot-'+slotIdx+' '+animCls+'"><div class="podium-avatar-wrap">'+crown+'<div style="position:relative;z-index:1">'+figHtml+'</div></div>'+nameHtml+ptsHtml+'<div class="podium-block"><span class="podium-block-num">'+POS_LABELS[slotIdx]+'</span></div></div>';
    });
    podiumEl.innerHTML=slots.join('');

    // Rank list (4th+)
    const rankEl=document.getElementById('tv-rank-'+phase);
    const rest=sorted.slice(3);
    rankEl.innerHTML=rest.length?rest.map((e,i)=>'<div class="tv-rank-row"><span class="tv-rank-pos">'+(i+4)+'°</span><span class="tv-rank-name">'+e.n+'</span><span class="tv-rank-pts'+(isF1?'':' f2')+'">'+e.pts.total+' pts</span></div>').join(''):'';
  });

  document.getElementById('tv-footer').textContent='🔴 En vivo · ' + new Date().toLocaleTimeString('es-AR');
  renderTicker(state, PLAYERS, TEAMS);
  renderEstado(state);
}

}

let _tickerAnim = null;
let _tickerPos = 0;
let _tickerWidth = 0;
let _tickerSpeed = 60; // px/s

function buildTickerItems(state, PLAYERS, TEAMS) {
  const items = [];

  // Collect f1 results (most recent first via Object.entries order)
  const f1Entries = Object.entries(state.f1 || {});
  const f2Entries = Object.entries(state.f2 || {});

  // Helpers
  function f1Item(key, res) {
    const [r, a, b] = key.split('-').map(Number);
    const game = (() => {
      const match = F1_FIXTURE.find(m => m[0]===r && m[1]===a && m[2]===b);
      if (!match) return '?';
      let RC = null; try { const s = localStorage.getItem('ndj_rules'); if(s) RC=JSON.parse(s); } catch(e){}
      if (RC && RC.f1 && RC.f1[match[3]]) return RC.f1[match[3]].name;
      const G = ['Curling','Dardos','UNO','Palabras a Tiempo','Carrera de Mentes','Spot It'];
      return G[match[3]] || '?';
    })();
    const nameA = (PLAYERS[a] || '?').split(' ')[0];
    const nameB = (PLAYERS[b] || '?').split(' ')[0];
    if (res.winner === 'empate') {
      return '<span class="tv-ticker-item"><span class="tk-icon">🤝</span><span class="tk-vs">' + nameA + ' vs ' + nameB + '</span><span class="tk-game">' + game + ' · Empate</span></span>';
    }
    const winner = (PLAYERS[res.winner] || '?').split(' ')[0];
    const loser  = res.winner === a ? nameB : nameA;
    return '<span class="tv-ticker-item"><span class="tk-icon">⚡</span><span class="tk-winner">' + winner + '</span><span class="tk-vs">venció a ' + loser + '</span><span class="tk-game">' + game + '</span>' + (res.bonus ? '<span class="tk-bonus">+bonus</span>' : '') + '</span>';
  }

  function f2Item(key, res) {
    const [r, a, b] = key.split('-').map(Number);
    const game = (() => {
      const match = F2_FIXTURE.find(m => m[0]===r && m[1]===a && m[2]===b);
      if (!match) return '?';
      let RC = null; try { const s = localStorage.getItem('ndj_rules'); if(s) RC=JSON.parse(s); } catch(e){}
      if (RC && RC.f2 && RC.f2[match[3]]) return RC.f2[match[3]].name;
      const G = ["Keep Talking","Time's Up","Beer Pong","Guess Movie/Song","El Erudito","Jenga"];
      return G[match[3]] || '?';
    })();
    const nameA = (TEAMS[a] || '?').split('/')[0].trim().split(' ')[0];
    const nameB = (TEAMS[b] || '?').split('/')[0].trim().split(' ')[0];
    if (res.winner === 'empate') {
      return '<span class="tv-ticker-item f2"><span class="tk-icon">🤝</span><span class="tk-vs">' + nameA + ' vs ' + nameB + '</span><span class="tk-game">' + game + ' · Empate</span></span>';
    }
    const winner = (TEAMS[res.winner] || '?').split('/')[0].trim().split(' ')[0];
    const loser  = res.winner === a ? nameB : nameA;
    return '<span class="tv-ticker-item f2"><span class="tk-icon">⚡</span><span class="tk-winner">' + winner + '</span><span class="tk-vs">venció a ' + loser + '</span><span class="tk-game">' + game + '</span>' + (res.bonus ? '<span class="tk-bonus">+bonus</span>' : '') + '</span>';
  }

  f1Entries.forEach(([k,v]) => items.push(f1Item(k,v)));
  f2Entries.forEach(([k,v]) => items.push(f2Item(k,v)));

  return items;
}

function renderTicker(state, PLAYERS, TEAMS) {
  const inner = document.getElementById('tv-ticker-inner');
  const track = document.getElementById('tv-ticker-track');
  if (!inner) return;

  // Reset any previous animation before touching the DOM
  if (_tickerAnim) { cancelAnimationFrame(_tickerAnim); _tickerAnim = null; }
  _tickerPos = 0;
  inner.style.transform = 'translateX(0)';

  const items = buildTickerItems(state, PLAYERS, TEAMS);
  if (!items.length) {
    inner.innerHTML = '<span class="tv-ticker-item" style="color:var(--muted);font-style:italic">Esperando resultados...</span>';
    return;
  }

  // Render a single copy first. Only duplicate it (for the seamless
  // scroll-loop trick) if the content actually overflows the track —
  // otherwise, with few results, both copies fit on screen at once and
  // every result visibly appears "duplicated".
  inner.innerHTML = items.join('');
  if (!track) return;

  requestAnimationFrame(() => {
    const singleWidth = inner.scrollWidth;
    const trackWidth  = track.clientWidth;

    if (singleWidth <= trackWidth) return; // fits — show once, no scroll needed

    // Doesn't fit — duplicate exactly once so the loop is seamless
    inner.innerHTML = items.join('') + items.join('');

    requestAnimationFrame(() => {
      _tickerWidth = inner.scrollWidth / 2; // half-width (one copy of items)
      if (_tickerWidth <= 0) return;
      let last = null;
      function step(ts) {
        if (last === null) last = ts;
        const dt = (ts - last) / 1000;
        last = ts;
        _tickerPos += _tickerSpeed * dt;
        if (_tickerPos >= _tickerWidth) _tickerPos -= _tickerWidth;
        inner.style.transform = 'translateX(-' + _tickerPos + 'px)';
        _tickerAnim = requestAnimationFrame(step);
      }
      _tickerAnim = requestAnimationFrame(step);
    });
  });
}

// ── Live sync ───────────────────────────────────────────────
// Mecanismos en orden de prioridad:
// 1. BroadcastChannel: INSTANTÁNEO, funciona en misma PC (misma ventana que escribe).
//    El evento 'storage' NO se dispara en la ventana que escribe, pero BroadcastChannel sí.
// 2. storage event: backup para otras pestañas/ventanas del mismo origen.
// 3. Firebase onSnapshot: para celular → TV (distinto dispositivo).
// 4. Polling cada 2s: último recurso si Firebase no conecta.
(function startSync() {
  let fbActive = false;
  let pollId = null;

  function startPolling() {
    if (pollId) return;
    pollId = setInterval(renderTV, 2000);
  }
  function stopPolling() {
    if (pollId) { clearInterval(pollId); pollId = null; }
  }

  // ── 0. postMessage directo (misma PC, MÁS CONFIABLE) ─────
  // La ventana principal tiene referencia a esta ventana y le manda
  // los datos directamente. No depende de localStorage ni de eventos.
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'ndj_state') {
      _tvCachedState = e.data.data; // string JSON, renderTV lo parsea
      renderTV();
    }
  });

  // ── 1. BroadcastChannel (misma PC, instantáneo) ──────────
  try {
    const bc = new BroadcastChannel('ndj_sync');
    bc.onmessage = (e) => {
      if (e.data && e.data.key === 'ndj_state') {
        try { localStorage.setItem('ndj_state', e.data.data); } catch(err) {}
        renderTV();
      }
    };
  } catch(e) { console.warn('BroadcastChannel no disponible:', e); }

  // ── 2. storage event (otras pestañas, mismo origen) ──────
  window.addEventListener('storage', (e) => {
    if (!e.key || e.key === 'ndj_state' || e.key === 'ndj_rules' || e.key === 'ndj_photos') {
      renderTV();
    }
  });

  // Safety net: if any timer got throttled while this window was hidden
  // or unfocused, force a fresh render the moment it's visible again.
  document.addEventListener('visibilitychange', () => { if (!document.hidden) renderTV(); });
  window.addEventListener('focus', renderTV);
  window.addEventListener('pageshow', renderTV);

  try {
    // Dynamically import Firebase (same CDN, no bundler needed)
    import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js').then(({initializeApp}) => {
      import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(({getFirestore, doc, onSnapshot}) => {
        const app = initializeApp({
          apiKey: "AIzaSyB-1B426OH2ZYKHT1n8VVzmv0h_10186Zo",
          authDomain: "cumple-598e7.firebaseapp.com",
          projectId: "cumple-598e7",
          storageBucket: "cumple-598e7.firebasestorage.app",
          messagingSenderId: "92890914103",
          appId: "1:92890914103:web:ab78f983eee410e6eb8eb2"
        }, 'tv');
        const db = getFirestore(app);

        onSnapshot(doc(db, 'ndj', 'state'), (snap) => {
          if (!snap.exists()) return;
          const raw = snap.data().data;
          if (raw) {
            try { localStorage.setItem('ndj_state', raw); } catch(e) {}
          }
          stopPolling();
          renderTV();
        }, (err) => {
          console.warn('Firebase onSnapshot error, falling back to polling:', err);
          fbActive = false;
          startPolling();
        });

        fbActive = true;
        stopPolling();
        document.getElementById('tv-footer').textContent = '🔴 En vivo · esperando datos...';
      });
    }).catch(err => {
      console.warn('Firebase load failed, using polling:', err);
      startPolling();
    });
  } catch(e) {
    console.warn('Firebase import failed, using polling:', e);
    startPolling();
  }

  // Fallback: if Firebase doesn't connect in 5s, start polling anyway
  setTimeout(() => { if (!fbActive) startPolling(); }, 5000);
})();

document.addEventListener('keydown', function(e) {
  // No disparar atajos si el foco está en un input, textarea o select
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

  const modalOpen = document.getElementById('modal-bg')?.classList.contains('open');

  if (modalOpen) {
    // ─── Atajos dentro del modal ───────────────────────────
    if (e.key === 'Escape') {
      e.preventDefault();
      // Si hay un confirm modal activo (tiene _savedHTML), cancelarlo; si no, cerrar modal normal
      const modal = document.querySelector('.modal');
      if (modal && modal._savedHTML) {
        cancelConfirmModal();
      } else {
        closeModal();
      }
    } else if (e.key === 'Enter') {
      e.preventDefault();
      // Si hay confirm modal activo, ejecutar la acción
      const modal = document.querySelector('.modal');
      if (modal && modal._savedHTML) {
        doConfirmModal();
      } else {
        saveResult();
      }
    } else if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') {
      // Seleccionar jugador A (izquierda)
      if (modalCtx && modalCtx.idxA !== undefined) {
        e.preventDefault();
        selectWinner(modalCtx.idxA);
      }
    } else if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') {
      // Seleccionar jugador B (derecha)
      if (modalCtx && modalCtx.idxB !== undefined) {
        e.preventDefault();
        selectWinner(modalCtx.idxB);
      }
    } else if (e.key.toLowerCase() === 'e') {
      // Empate (solo si está disponible)
      e.preventDefault();
      const empateBtn = document.getElementById('empate-btn');
      if (empateBtn && empateBtn.style.display !== 'none') selectEmpate();
    } else if (e.key.toLowerCase() === 'b') {
      // Toggle bonus
      e.preventDefault();
      toggleBonus();
    } else if (e.key.toLowerCase() === 'x') {
      // Eliminar resultado (solo si existe)
      e.preventDefault();
      const delBtn = document.getElementById('delete-btn');
      if (delBtn) deleteResult();
    }
  } else {
    // ─── Atajos fuera del modal ────────────────────────────
    if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
      // Ctrl+Z / Cmd+Z → deshacer último resultado
      e.preventDefault();
      undoLastResult();
    }
  }
});
