<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Velada del Año</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎂</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0efe8;
    --muted: #888;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.12);
    --silver: #a0b4c8;
    --silver-dim: rgba(160,180,200,0.12);
    --danger: #ff5f5f;
    --success: #4ecb7e;
    --info: #60b4f0;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 1.5rem;
    border-bottom: 0.5px solid var(--border2);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    padding: 1rem 1.5rem 1rem 0;
    border-right: 0.5px solid var(--border);
    margin-right: 1rem;
    letter-spacing: -0.3px;
  }
  .nav-tabs { display: flex; gap: 0; }
  .nav-tab {
    padding: 1rem 1.25rem;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* PAGES */
  .page { display: none; padding: 1.5rem; max-width: 900px; margin: 0 auto; }
  .page.active { display: block; }

  /* SECTION HEADERS */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  /* RANKING TABLE */
  .ranking { width: 100%; border-collapse: collapse; }
  .ranking th {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 0.5rem 0.75rem;
    border-bottom: 0.5px solid var(--border);
  }
  .ranking td {
    padding: 0.75rem;
    border-bottom: 0.5px solid var(--border);
    vertical-align: middle;
  }
  .ranking tr:last-child td { border-bottom: none; }
  .ranking tr.classifica td { background: rgba(200,240,96,0.04); }
  .ranking tr.classifica td:first-child { border-left: 2px solid var(--accent); }

  .pos-badge {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    background: var(--surface2);
    color: var(--muted);
  }
  .pos-badge.gold { background: var(--gold-dim); color: var(--gold); }
  .pos-badge.silver { background: var(--silver-dim); color: var(--silver); }
  .pos-badge.accent { background: var(--accent-dim); color: var(--accent); }

  .player-name { font-weight: 500; font-size: 14px; }
  .total-pts { font-size: 18px; font-weight: 700; color: var(--accent); }
  .round-pts { font-size: 12px; color: var(--muted); min-width: 28px; text-align: center; }
  .round-pts.win { color: var(--success); font-weight: 600; }
  .round-pts.bonus { color: var(--gold); font-weight: 600; }
  .round-pts.pending { color: var(--border2); }
  .round-pts.bye { color: var(--muted); opacity: 0.5; font-size: 13px; }

  /* Fase 2 usa identidad celeste en vez de lima, para diferenciarse de Fase 1 */
  #page-fase2 .ranking tr.classifica td { background: rgba(96,180,240,0.06); }
  #page-fase2 .ranking tr.classifica td:first-child { border-left: 2px solid var(--info); }
  #page-fase2 .pos-badge.accent { background: rgba(96,180,240,0.12); color: var(--info); }
  #page-fase2 .total-pts { color: var(--info); }
  #page-fase2 .stat-num { color: var(--info); }

  /* FIXTURE */
  .fixture-round {
    margin-bottom: 0.75rem;
  }
  .round-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.5rem 0;
    margin-bottom: 0.5rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .bye-tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: normal;
    text-transform: none;
    color: var(--muted);
    opacity: 0.75;
  }
  .match-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 0.75rem;
    border-radius: var(--radius);
    margin-bottom: 0.25rem;
    cursor: pointer;
    transition: background 0.1s;
  }
  .match-row:hover { background: var(--surface2); }
  .match-row.done { opacity: 0.6; }
  .match-game-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--surface2);
    color: var(--muted);
    white-space: nowrap;
  }
  .match-players {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
  }
  .match-result {
    font-size: 12px;
    color: var(--muted);
    min-width: 60px;
    text-align: right;
  }
  .match-result.set { color: var(--success); }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 1.5rem;
    width: 100%;
    max-width: 480px;
  }
  /* Cuando el modal se abre desde Fase 2, se tiñe celeste para mantener la identidad de fase */
  .modal.f2 { --accent: var(--info); --accent-dim: rgba(96,180,240,0.12); }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 0.25rem; }
  .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 1.25rem; }
  .modal-players {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .modal-player-btn {
    padding: 1rem;
    border-radius: var(--radius);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .modal-player-btn:hover { border-color: var(--accent); }
  .modal-player-btn.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .modal-player-btn.loser.selected { border-color: var(--danger); background: rgba(255,95,95,0.1); color: var(--danger); }
  .modal-bonus-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 0;
    border-top: 0.5px solid var(--border);
  }
  .modal-bonus-label { font-size: 13px; color: var(--muted); }
  .toggle {
    width: 42px; height: 24px;
    border-radius: 99px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }
  .toggle::after {
    content: '';
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--muted);
    position: absolute;
    top: 2px; left: 2px;
    transition: left 0.2s, background 0.2s;
  }
  .toggle.on { background: var(--accent-dim); border-color: var(--accent); }
  .toggle.on::after { left: 20px; background: var(--accent); }
  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
  .btn {
    flex: 1;
    padding: 0.75rem;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #0f0f13; border-color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-danger { background: transparent; color: var(--danger); border-color: rgba(255,95,95,0.3); }
  .empate-btn {
    width: 100%;
    padding: 0.6rem;
    border-radius: var(--radius);
    border: 1px dashed var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 0.5rem;
    transition: border-color 0.15s, color 0.15s;
  }
  .empate-btn:hover { border-color: var(--info); color: var(--info); }
  .empate-btn.selected { border-color: var(--info); color: var(--info); background: rgba(96,180,240,0.08); }

  /* IMPOSTOR */
  .impostor-card {
    border: 1.5px solid rgba(200,240,96,0.2);
  }
  .impostor-result-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.75rem; margin-top: 1rem;
  }
  .impostor-opt {
    padding: 1rem;
    border-radius: var(--radius);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .impostor-opt:hover { border-color: var(--accent); }
  .impostor-opt.selected-a { border-color: var(--accent); background: var(--accent-dim); }
  .impostor-opt.selected-b { border-color: var(--info); background: rgba(96,180,240,0.08); }
  .impostor-opt-icon { font-size: 24px; margin-bottom: 0.25rem; }
  .impostor-opt-label { font-size: 12px; font-weight: 600; }
  .impostor-opt-pts { font-size: 11px; color: var(--muted); }

  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; margin-bottom: 1rem; }
  .stat-card {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 0.875rem;
    text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
  #page-final .stat-num { color: var(--gold); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* FINAL TAB */
  .final-players { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
  .final-player {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.875rem 1rem;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface2);
  }
  .final-player .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }
  .final-player .badge.group { background: rgba(96,180,240,0.1); color: var(--info); }

  /* RONDA ESPECIAL LABEL */
  .especial-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    background: rgba(245,200,66,0.12);
    color: var(--gold);
    font-weight: 600;
  }

  /* TOOLTIP / empty state */
  .empty-state {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--muted);
    font-size: 13px;
  }

  /* scrollable table wrapper */
  .table-wrap { overflow-x: auto; }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    nav { padding: 0 0.75rem; }
    .nav-tab { padding: 1rem 0.75rem; font-size: 12px; }
    .page { padding: 1rem; }
  }

  /* IMPOSTOR GAME STYLES */
  .imp-screen {
    max-width: 500px;
    margin: 0 auto;
    padding: 1.5rem;
  }
  .imp-cat-btn {
    padding: 0.5rem 0.9rem;
    border-radius: 99px;
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 500;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  .imp-cat-btn:hover { border-color: var(--danger); }
  .imp-cat-btn.sel { border-color: var(--danger); background: rgba(255,95,95,0.1); color: var(--danger); }
  .imp-custom-tag {
    display: inline-flex;
    align-items: center;
    padding: 0.4rem 0.7rem;
    border-radius: 99px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    font-size: 12.5px;
    color: var(--text);
  }
  .imp-card-face {
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
    min-height: 200px;
    border-radius: var(--radius-lg);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
    text-align: center;
  }
  .imp-card-back:hover { border-color: var(--danger); background: rgba(255,95,95,0.06); }
  .imp-card-impostor {
    border-color: rgba(255,95,95,0.4);
    background: rgba(255,95,95,0.08);
    color: var(--danger);
    cursor: default;
  }
  .imp-card-word {
    border-color: rgba(200,240,96,0.35);
    background: rgba(200,240,96,0.06);
    color: var(--accent);
    cursor: default;
  }
  .imp-history-card {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .imp-history-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius);
    background: rgba(255,95,95,0.05);
    border-left: 2px solid var(--danger);
    font-size: 12px;
  }
  .imp-history-num { font-weight: 700; color: var(--danger); min-width: 24px; }
  .imp-history-word { font-weight: 600; flex: 1; }
  .imp-history-impostor { color: var(--muted); white-space: nowrap; }
  .imp-history-outcome { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
  .progress-dots {
    display: flex; gap: 6px; justify-content: center; margin: 1rem 0;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border2);
    transition: background 0.2s;
  }
  .dot.done { background: var(--accent); }
  .dot.current { background: var(--muted); }
  .cover-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 300;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 2rem;
    overflow-y: auto;
  }
  .cover-overlay .cover-icon { font-size: 56px; margin-bottom: 1rem; }
  .cover-overlay .cover-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
  .cover-overlay .cover-sub { font-size: 14px; color: var(--muted); margin-bottom: 2rem; }
  .result-vote-grid {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 0.5rem; margin-bottom: 1rem;
  }
  .vote-player-btn {
    padding: 0.75rem 0.5rem;
    border-radius: var(--radius);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .vote-player-btn:hover { border-color: var(--danger); }
  .vote-player-btn.sel { border-color: var(--danger); background: rgba(255,95,95,0.1); color: var(--danger); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">⚔️ LA VELADA</div>
  <div class="nav-tabs" id="navTabs"></div>
  <button id="tv-btn" class="nav-tab" title="Modo TV">
    <span class="tv-btn-txt">📺 TV</span>
    <span style="display:none">📺</span>
  </button>
</nav>

<div id="pages"></div>

<!-- Modal para resultados -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>

<!-- Canvas para confeti -->
<canvas id="confetti-canvas"></canvas>

<script>
// ============================================================================
// TV MODE SYNC - MAIN WINDOW GETTER & MESSAGING
// ============================================================================

/**
 * Expone el estado actual de forma segura para que la ventana TV pueda leerlo
 * directamente. Usa structuredClone si está disponible, fallback a JSON clone.
 */
window.__NDJ_getState = () => {
  try {
    return (typeof structuredClone === 'function') 
      ? structuredClone(ndj_state) 
      : JSON.parse(JSON.stringify(ndj_state));
  } catch (e) {
    console.warn('[NDJ] Error al obtener estado para TV:', e);
    return null;
  }
};

/**
 * Abre la ventana TV con reintentos automáticos hasta recibir ACK.
 * Evita problemas de timing cuando la TV aún está cargando.
 */
function openTVWindow(blobUrl) {
  const tvWin = window.open(blobUrl, 'ndj_tv');
  if (!tvWin) {
    console.warn('[NDJ] No se pudo abrir la ventana TV');
    return null;
  }

  let acked = false;
  const onAck = (e) => {
    if (e.source === tvWin && e.data && e.data.type === 'NDJ_TV_ACK') {
      acked = true;
      window.removeEventListener('message', onAck);
      console.log('[NDJ] TV handshake confirmado');
    }
  };
  window.addEventListener('message', onAck);

  // Reintenta enviar estado hasta recibir ACK (máx ~3seg)
  const sendOnce = () => {
    try {
      tvWin.postMessage({ 
        type: 'NDJ_STATE', 
        state: window.__NDJ_getState() 
      }, '*');
    } catch (err) {
      // ignore si tvWin no está aún disponible
    }
  };

  const interval = setInterval(() => {
    if (acked || tvWin.closed) {
      clearInterval(interval);
      return;
    }
    sendOnce();
  }, 250);

  sendOnce();
  return tvWin;
}

/**
 * Notifica cambios de estado a la ventana TV (si está abierta).
 * Llamar esto después de saveState() o cuando el estado cambie.
 */
function notifyTVIfOpen(_tvWin) {
  if (!_tvWin || _tvWin.closed) return;
  try {
    _tvWin.postMessage({ 
      type: 'NDJ_STATE', 
      state: window.__NDJ_getState() 
    }, '*');
  } catch (err) {
    // ignore si no hay acceso
  }
}

// ============================================================================
// [RESTO DE TU CÓDIGO AQUÍ - Reemplaza todo lo que esté más abajo]
// ============================================================================

</script>
</body>
</html>
