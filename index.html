<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0e;--surface:#14141c;--surface2:#1e1e2a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f0efe8;--muted:#666;
  --accent:#c8f060;--accent-dim:rgba(200,240,96,.12);
  --gold:#f5c842;--gold-dim:rgba(245,200,66,.14);
  --red:#ff5f5f;--red-dim:rgba(255,95,95,.13);
  --blue:#60b4f0;--blue-dim:rgba(96,180,240,.13);
  --green:#4cdb7a;--green-dim:rgba(76,219,122,.14);
  --purple:#c060e8;--purple-dim:rgba(192,96,232,.15);
  --radius:14px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none}

/* ── SCREENS ── */
.screen{display:none;min-height:100dvh;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;gap:1.5rem;text-align:center}
.screen.active{display:flex}

/* ── BACK BUTTON ── */
.back-btn{position:absolute;top:max(1rem,env(safe-area-inset-top));left:1rem;display:flex;align-items:center;gap:.4rem;padding:.5rem .85rem;border-radius:99px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.back-btn:active{opacity:.7}

/* ── GAME SELECT ── */
.velada-label{font-size:11px;font-weight:700;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);opacity:.8}
.velada-title{font-size:2.4rem;font-weight:900;letter-spacing:-.03em;line-height:1}
.velada-sub{font-size:13px;color:var(--muted);font-weight:600}
.game-list{display:flex;flex-direction:column;gap:.75rem;width:100%;max-width:320px}
.game-btn{padding:1.1rem 1.25rem;border-radius:var(--radius);border:2px solid;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;transition:opacity .15s,transform .12s;display:flex;align-items:center;gap:.75rem;text-align:left}
.game-btn:active{opacity:.85;transform:scale(.97)}
.game-btn-icon{font-size:26px;line-height:1;flex-shrink:0}
.game-btn-info{display:flex;flex-direction:column;gap:.1rem}
.game-btn-name{font-size:15px;font-weight:800}
.game-btn-sub{font-size:11px;opacity:.65;font-weight:600}
.game-movies{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.game-arg{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}

/* ── TEAM SELECT ── */
.game-header{display:flex;flex-direction:column;align-items:center;gap:.3rem}
.game-icon{font-size:3rem;line-height:1}
.game-name{font-size:1.4rem;font-weight:900;letter-spacing:-.02em}
.section-label{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.team-list{display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:300px}
.team-btn{padding:1.1rem;border-radius:var(--radius);border:2px solid;font-family:inherit;font-size:17px;font-weight:800;cursor:pointer;transition:opacity .15s,transform .12s;letter-spacing:-.01em}
.team-btn:active{transform:scale(.97);opacity:.85}
.team-a{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.team-b{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}

/* ── BUZZ SCREEN ── */
#buzz-screen{position:relative}
.bz-game-tag{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);position:absolute;top:max(1rem,env(safe-area-inset-top));right:1rem}
.bz-team-name{font-size:1.1rem;font-weight:800;margin-bottom:.25rem}
.bz-status{font-size:14px;color:var(--muted);font-weight:600;min-height:1.4em;transition:color .2s}
.bz-status.open{color:var(--accent)}
.bz-status.won{color:var(--green);font-size:17px;font-weight:900}
.bz-status.lost{color:var(--muted)}

.bz-buzz-btn{width:min(280px,74vw);height:min(280px,74vw);border-radius:50%;border:3px solid;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;transition:transform .1s,box-shadow .2s;-webkit-tap-highlight-color:transparent;margin:.5rem 0}
.bz-buzz-btn:active{transform:scale(.91)}
.bz-buzz-btn.locked{opacity:.25;cursor:default;pointer-events:none}
.bz-buzz-btn.team-a{border-color:var(--blue);background:var(--blue-dim);color:var(--blue);box-shadow:0 0 0 1px rgba(96,180,240,.3),0 12px 40px rgba(96,180,240,.15)}
.bz-buzz-btn.team-b{border-color:var(--gold);background:var(--gold-dim);color:var(--gold);box-shadow:0 0 0 1px rgba(245,200,66,.3),0 12px 40px rgba(245,200,66,.15)}
.bz-buzz-btn.open.team-a{box-shadow:0 0 0 1px rgba(96,180,240,.8),0 12px 60px rgba(96,180,240,.4)}
.bz-buzz-btn.open.team-b{box-shadow:0 0 0 1px rgba(245,200,66,.8),0 12px 60px rgba(245,200,66,.4)}
.bz-buzz-btn.won-me{animation:bzPulseWin .6s ease}
@keyframes bzPulseWin{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
.bz-buzz-icon{font-size:56px;line-height:1;pointer-events:none}
.bz-buzz-text{font-size:24px;font-weight:900;letter-spacing:-.02em;pointer-events:none}

/* ── RESULT OVERLAY ── */
.bz-result{display:flex;flex-direction:column;align-items:center;gap:.6rem;animation:resultIn .4s cubic-bezier(.22,1,.36,1)}
@keyframes resultIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.bz-result-icon{font-size:5rem;line-height:1}
.bz-result-title{font-size:1.8rem;font-weight:900;letter-spacing:-.02em}
.bz-result-sub{font-size:14px;color:var(--muted);font-weight:600}
.bz-result.won .bz-result-title{color:var(--green)}
.bz-result.lost .bz-result-title{color:var(--muted)}

/* ── CONNECTING ── */
.connecting-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);animation:connPulse 1s ease-in-out infinite}
@keyframes connPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
.connecting-text{font-size:14px;color:var(--muted);font-weight:600}

/* ── ERROR ── */
.error-box{background:var(--red-dim);border:1.5px solid var(--red);border-radius:var(--radius);padding:1rem 1.25rem;max-width:300px;font-size:13px;color:var(--red);font-weight:700;display:none}
.error-box.show{display:block}
</style>
</head>
<body>

  <div class="game-list">

      <div class="game-btn-info">

<!-- ② SELECCIÓN DE EQUIPO -->
<div class="screen" id="team-select-screen" style="position:relative">
  <button class="back-btn" onclick="goBack('game')">← Volver</button>
  <div class="game-header">
    <div class="game-icon" id="ts-icon">🎬</div>
    <div class="game-name" id="ts-name">Guess Movies &amp; Songs</div>
  </div>
  <div class="section-label">¿Cuál es tu equipo?</div>

<!-- ③ PANTALLA DE BUZZER -->
<div class="screen" id="buzz-screen" style="position:relative">
  <button class="back-btn" onclick="goBack('team')">← Cambiar equipo</button>

  <button class="bz-buzz-btn locked team-a" id="bz-buzz-btn" onclick="doBuzz()">
    <span class="bz-buzz-icon">🔔</span>
    <span class="bz-buzz-text">¡BUZZ!</span>

<script>
// ── FIREBASE CONFIG ──────────────────────────────────────────────
const FB_CFG = {
  apiKey:"AIzaSyB37WkRQqBWVYkZ84AE2u17pAOs_9ZCgCg",
  authDomain:"guessmovie-905e2.firebaseapp.com",
  databaseURL:"https://guessmovie-905e2-default-rtdb.firebaseio.com",
  projectId:"guessmovie-905e2",
  storageBucket:"guessmovie-905e2.firebasestorage.app",
  messagingSenderId:"313601369235",
  appId:"1:313601369235:web:f8b28a2ec187a934fa1966"
};

// Ruta en Firebase según el juego
const GAME_PATHS = {
  movies:     'velada/buzzer',
  argentinos: 'argentinos/buzzer'
};

const GAME_META = {
  movies:     { icon:'🎬', name:'Guess Movies & Songs' },
  argentinos: { icon:'🎤', name:'100 Argentinos Dicen' }
};

// ── STATE ────────────────────────────────────────────────────────
let fbDb = null, fbRef = null, fbInited = false;
let currentGame = null;   // 'movies' | 'argentinos'
let bzTeam = null;        // 'a' | 'b'
let bzListener = null;
let nameA = 'Equipo 1', nameB = 'Equipo 2';

// ── HELPERS ─────────────────────────────────────────────────────
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function showError(msg){ const b=document.getElementById('error-box'); b.textContent=msg; b.classList.add('show'); }
function hideError(){ document.getElementById('error-box').classList.remove('show'); }
// Si Firebase falló antes de que showError existiera, mostrarlo ahora
if(window._fbError) showError(window._fbError);

// ── FIREBASE ─────────────────────────────────────────────────────
function initFirebase(cb){
  if(fbInited){ cb(); return; }
  if(!window._fbScriptsDone){ window._fbReadyCb=()=>initFirebase(cb); return; }
  if(typeof firebase==='undefined'){ showError('Firebase no disponible. Verificá tu conexión.'); return; }
  try{
    if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
    fbDb = firebase.database();
    fbInited = true;
    cb();
  } catch(e){ showError('Error al conectar: '+e.message); }
}

// ── NAVIGATION ───────────────────────────────────────────────────
function selectGame(gameId){
  hideError();
  currentGame = gameId;
  const meta = GAME_META[gameId];

  // Actualizar UI de selección de equipo
  document.getElementById('ts-icon').textContent = meta.icon;
  document.getElementById('ts-name').textContent = meta.name;

  // Mostrar "conectando" mientras Firebase inicia
  document.getElementById('connecting-dot').style.display = '';
  document.getElementById('connecting-text').style.display = '';
  document.getElementById('connecting-text').textContent = 'Conectando a Firebase…';

  show('team-select-screen');

  initFirebase(()=>{
    // Conectar al nodo del juego para leer nombres de equipos
    if(bzListener){ fbRef && fbRef.off('value', bzListener); bzListener=null; }
    fbRef = fbDb.ref(GAME_PATHS[gameId]);
    fbRef.once('value', snap=>{
      const d = snap.val()||{};
      if(d.names){
        if(d.names.a){ nameA=d.names.a; document.getElementById('ts-na').textContent=nameA; }
        if(d.names.b){ nameB=d.names.b; document.getElementById('ts-nb').textContent=nameB; }
      }
      document.getElementById('connecting-dot').style.display = 'none';
      document.getElementById('connecting-text').style.display = 'none';
    }, ()=>{
      document.getElementById('connecting-dot').style.display = 'none';
      document.getElementById('connecting-text').textContent = '⚠️ Sin conexión — podés seguir igual';
    });
  });
}

function selectTeam(team){
  bzTeam = team;
  const tName = team==='a' ? nameA : nameB;
  const teamColor = team==='a' ? '🔵' : '🟡';

  // Actualizar pantalla de buzzer
  document.getElementById('bz-game-tag').textContent = GAME_META[currentGame].name;
  document.getElementById('bz-team-name').textContent = teamColor + ' ' + tName;

  const btn = document.getElementById('bz-buzz-btn');
  btn.className = 'bz-buzz-btn locked team-' + team;
  document.getElementById('bz-status').textContent = 'Esperando al conductor…';
  document.getElementById('bz-status').className = 'bz-status';

  show('buzz-screen');
  startBuzzListener();
}

function goBack(to){
  // Detener listener activo
  if(bzListener && fbRef){ fbRef.off('value', bzListener); bzListener=null; }

  if(to==='game'){
    bzTeam=null; currentGame=null;
    show('game-select-screen');
  } else if(to==='team'){
    bzTeam=null;
    // Restaurar nombres en selección de equipo
    document.getElementById('ts-na').textContent = nameA;
    document.getElementById('ts-nb').textContent = nameB;
    show('team-select-screen');
    // Re-arrancar listener de nombres
    if(fbRef) fbRef.once('value', snap=>{
      const d=snap.val()||{};
      if(d.names){
        if(d.names.a){ nameA=d.names.a; document.getElementById('ts-na').textContent=nameA; }
        if(d.names.b){ nameB=d.names.b; document.getElementById('ts-nb').textContent=nameB; }
      }
    });
  }
}

// ── BUZZER LISTENER ──────────────────────────────────────────────
function startBuzzListener(){
  if(!fbRef) return;
  bzListener = fbRef.on('value', snap=>{
    const d = snap.val()||{};
    const state = d.state||'locked';

    // Sync nombres en caso de que el conductor los haya cambiado
    if(d.names){
      if(d.names.a) nameA=d.names.a;
      if(d.names.b) nameB=d.names.b;
    }

    const btn = document.getElementById('bz-buzz-btn');
    const statusEl = document.getElementById('bz-status');

    if(d.winner){
      const wonByMe = d.winner.team === bzTeam;
      const winnerName = d.winner.name || (d.winner.team==='a'?nameA:nameB);
      btn.classList.add('locked');
      btn.classList.remove('open');
      if(wonByMe){
        btn.classList.add('won-me');
        statusEl.textContent = '🏆 ¡Buzzaste primero!';
        statusEl.className = 'bz-status won';
        if(navigator.vibrate) navigator.vibrate([80,40,80,40,80]);
      } else {
        statusEl.textContent = winnerName + ' fue más rápido';
        statusEl.className = 'bz-status lost';
      }
    } else if(state==='open'){
      btn.classList.remove('locked','won-me');
      btn.classList.add('open');
      statusEl.textContent = '¡Tocá cuando sepas la respuesta!';
      statusEl.className = 'bz-status open';
      if(navigator.vibrate) navigator.vibrate(30);
    } else {
      btn.classList.add('locked');
      btn.classList.remove('open','won-me');
      statusEl.textContent = 'Esperando al conductor…';
      statusEl.className = 'bz-status';
    }
  });
}

// ── BUZZ ACTION ──────────────────────────────────────────────────
// ── SFX: "tin" corto al ganar el buzz ──
let _buzzAudio=null;
function _bac(){ try{ if(!_buzzAudio) _buzzAudio=new (window.AudioContext||window.webkitAudioContext)(); if(_buzzAudio.state==='suspended') _buzzAudio.resume(); return _buzzAudio; }catch(e){ return null; } }
document.addEventListener('pointerdown',()=>{ _bac(); },{once:true});
function sfxTin(){ const ctx=_bac(); if(!ctx) return; try{ const now=ctx.currentTime; [[988,0],[1319,0.07]].forEach(([f,t])=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.type='triangle'; o.frequency.value=f; o.connect(g); g.connect(ctx.destination); const s=now+t; g.gain.setValueAtTime(0.0001,s); g.gain.exponentialRampToValueAtTime(0.6,s+0.01); g.gain.exponentialRampToValueAtTime(0.0001,s+0.45); o.start(s); o.stop(s+0.5); }); }catch(e){} }

function doBuzz(){
  if(!fbRef || !bzTeam) return;
  const tName = bzTeam==='a' ? nameA : nameB;
  if(navigator.vibrate) navigator.vibrate(60);

  // Transacción atómica — solo gana el primero en llegar
  fbRef.transaction(current=>{
    if(!current) return;
    // Movies & Songs usa { state:'open', winner:null }
    // 100 Argentinos usa { state:'open', winner:null } también
    if(current.state==='open' && !current.winner){
      return Object.assign({}, current, {
        winner: { team:bzTeam, name:tName },
        state: 'won'
      });
    }
    return; // abort — ya hay ganador o está bloqueado
  }, (err, committed)=>{
    if(!err && committed) sfxTin(); // sonó solo si este celular ganó
  });
}

// ── URL PARAMS (deep link opcional) ─────────────────────────────
// Permite enlace directo: buzzer.html?game=movies&team=a
(function(){
  const p = new URLSearchParams(window.location.search);
  const g = p.get('game'), t = p.get('team');
  if(g && GAME_PATHS[g]){
    selectGame(g);
    if(t==='a'||t==='b') setTimeout(()=>selectTeam(t), 800);
  }
})();
