function defaultImpGame() {
  return {
    phase: 'setup',           // 'setup' | 'cards' | 'result'
    players: [...PLAYERS],    // editable roster just for the Impostor mini-game (puede incluir invitados extra)
    activeCategory: null,
    customWords: [],
    usedWordIndices: [],
    selectedWord: null,
    roundPlayers: [],         // foto del roster al arrancar el ciclo de palabra actual (no cambia entre rondas fallidas del mismo ciclo)
    doubleMode: false,        // modo doble impostor (requiere 6+ jugadores)
    impostorIdxs: [],         // índices dentro de roundPlayers — 1 normalmente, 2 en modo doble
    caughtIdxs: [],           // impostores ya descubiertos dentro del ciclo de palabra actual
    currentCardStep: 0,
    accusedIdx: null,
    failedVotes: 0,
  };
}

let impGame = defaultImpGame();

// Vuelca los campos relevantes de impGame en state para que persistan en localStorage
function saveImpGame() {
  state.impGame = {
    phase: impGame.phase,
    players: impGame.players,
    activeCategory: impGame.activeCategory,
    customWords: impGame.customWords,
    usedWordIndices: impGame.usedWordIndices,
    selectedWord: impGame.selectedWord,
    roundPlayers: impGame.roundPlayers,
    doubleMode: impGame.doubleMode,
    impostorIdxs: impGame.impostorIdxs,
    caughtIdxs: impGame.caughtIdxs,
    currentCardStep: impGame.currentCardStep,
    accusedIdx: impGame.accusedIdx,
    failedVotes: impGame.failedVotes || 0,
  };
  saveState();
}

// Llamado una vez al cargar la página, después de loadState(), para retomar
// el juego del Impostor exactamente donde quedó (incluye fase en curso).
function restoreImpGame() {
  if (state.impGame) {
    impGame = Object.assign(defaultImpGame(), state.impGame);
    // Migración: el formato viejo guardaba un único impostorIdx (number) en vez
    // de impostorIdxs (array). Si no hay impostorIdxs pero sí el campo viejo, migramos.
    if (!Array.isArray(impGame.impostorIdxs) || !impGame.impostorIdxs.length) {
      if (typeof state.impGame.impostorIdx === 'number') {
        impGame.impostorIdxs = [state.impGame.impostorIdx];
      } else {
        impGame.impostorIdxs = [];
      }
    }
    if (!Array.isArray(impGame.caughtIdxs)) impGame.caughtIdxs = [];
    // Los jugadores base siempre son los de PLAYERS (Fase 1), mas los invitados
    // extra agregados manualmente (los que no figuran en PLAYERS).
    const extras = Array.isArray(impGame.players)
      ? impGame.players.filter(n => !PLAYERS.includes(n))
      : [];
    impGame.players = [...PLAYERS, ...extras];
    if (!['setup','cards','result'].includes(impGame.phase)) impGame.phase = 'setup';
    if (typeof impGame.failedVotes !== 'number') impGame.failedVotes = 0;
  }
}

function renderImpostor() {
  if (impGame.phase === 'cards') renderImpCards();
  else if (impGame.phase === 'result') renderImpResult();
  else renderImpSetup();
}

function impRoot(html) {
  document.getElementById('imp-root').innerHTML = html;
}

function allImpWords() {
  let list = impGame.activeCategory ? [...IMP_WORDS[impGame.activeCategory]] : [];
  return [...list, ...impGame.customWords];
}

function pickRandomWord() {
  const pool = allImpWords();
  if (!pool.length) return null;
  const available = pool.filter((_,i) => !impGame.usedWordIndices.includes(i));
  const from = available.length ? available : pool;
  const idx = pool.indexOf(from[Math.floor(Math.random() * from.length)]);
  impGame.usedWordIndices.push(idx);
  return pool[idx];
}

// Puntaje acumulado de TODOS los participantes del Impostor (incluye invitados
// extra que no están en PLAYERS, para que también se vean reflejados en algún lado).
function getImpostorScoreboard() {
  const scores = {};
  const impNoPts = (RULES_CONFIG && RULES_CONFIG.impostor) ? RULES_CONFIG.impostor.pts_noDescubierto : 4;
  const impDesPts = (RULES_CONFIG && RULES_CONFIG.impostor) ? RULES_CONFIG.impostor.pts_descubierto : 2;
  state.impostor.rounds.forEach(rd => {
    (rd.players || []).forEach(name => { if (!(name in scores)) scores[name] = 0; });
    if (rd.mode === 'doble') {
      const impostorNames = rd.impostorNames || [];
      const caughtNames = rd.caughtNames || [];
      const escapedNames = rd.escapedNames || impostorNames.filter(n => !caughtNames.includes(n));
      const total = impostorNames.length || 1;
      escapedNames.forEach(n => { scores[n] = (scores[n] || 0) + impNoPts; });
      const crewPts = Math.round(impDesPts * caughtNames.length / total);
      if (crewPts > 0) {
        (rd.players || []).forEach(name => {
          if (!impostorNames.includes(name)) scores[name] = (scores[name] || 0) + crewPts;
        });
      }
    } else if (rd.mode === 'noDescubierto') {
      scores[rd.impostorName] = (scores[rd.impostorName] || 0) + impNoPts;
    } else {
      (rd.players || []).forEach(name => {
        if (name !== rd.impostorName) scores[name] = (scores[name] || 0) + impDesPts;
      });
    }
  });
  return scores;
}

function renderImpHistoryHtml() {
  const rounds = state.impostor.rounds;
  if (!rounds.length) return '';
  const rows = rounds.map((rd, i) => {
    let outcome, impostorLabel;
    if (rd.mode === 'doble') {
      const caughtNames = rd.caughtNames || [];
      const total = (rd.impostorNames || []).length;
      outcome = caughtNames.length === total
        ? `<span style="color:var(--success)">ambos descubiertos</span>`
        : caughtNames.length === 0
          ? `<span style="color:var(--danger)">ninguno descubierto</span>`
          : `<span style="color:var(--gold)">${caughtNames.length}/${total} descubiertos</span>`;
      impostorLabel = `🕵️🕵️ ${(rd.impostorNames || []).join(' y ')}`;
    } else {
      outcome = rd.mode === 'descubierto'
        ? `<span style="color:var(--success)">descubierto</span>`
        : `<span style="color:var(--danger)">no descubierto</span>`;
      impostorLabel = `🕵️ ${rd.impostorName}`;
    }
    return `<div class="imp-history-row">
      <span class="imp-history-num">R${i+1}</span>
      <span class="imp-history-word">${rd.word}</span>
      <span class="imp-history-impostor">${impostorLabel}</span>
      <span class="imp-history-outcome">${outcome}</span>
    </div>`;
  }).join('');

  const scores = getImpostorScoreboard();
  const names = Object.keys(scores).sort((a,b) => scores[b] - scores[a]);
  const scoreRows = names.map(n => `
    <div class="imp-history-row" style="border-left-color:var(--gold)">
      <span style="flex:1;font-weight:500">${n}</span>
      <span style="font-weight:700;color:var(--gold)">${scores[n]}</span>
    </div>`).join('');

  return `
    <div class="section-header" style="margin-top:1.5rem">
      <span class="section-title"><span class="dot-indicator impostor"></span>Historial de rondas</span>
    </div>
    <div class="imp-history-card">${rows}</div>
    <div class="section-header" style="margin-top:1.25rem">
      <span class="section-title"><span class="dot-indicator impostor"></span>Puntaje acumulado — Impostor</span>
    </div>
    <div class="imp-history-card">${scoreRows}</div>
  `;
}

      ${impGame.customWords.length ? `<div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem">${customHtml}</div>` : ''}

      <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem;background:var(--surface2);border-radius:var(--radius);margin-bottom:1.5rem">
        <div>
          <div style="font-size:13px;font-weight:500">Banco de palabras</div>
          <div style="font-size:12px;color:var(--muted)">${wordCount} palabras disponibles</div>
        </div>
        <div style="font-size:22px;font-weight:700;color:${wordCount>0?'var(--accent)':'var(--muted)'}">${wordCount}</div>
      </div>

      <div style="font-size:11px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:0.75rem">Jugadores (se puede sumar invitados de último momento)</div>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem">
        <input id="imp-player-input" type="text" placeholder="Nombre del jugador..." style="flex:1;padding:0.6rem 0.75rem;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13px" onkeydown="if(event.key==='Enter')addImpPlayer()">
        <button class="btn" style="padding:0.6rem 1rem" onclick="addImpPlayer()">Agregar</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.5rem">${playerHtml}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:1.5rem">${impGame.players.length} jugadores (mínimo 3)</div>

      ${doubleToggleHtml}

      <button class="btn btn-primary" style="width:100%;padding:0.875rem;font-size:15px" onclick="startImpGame()" ${canStart?'':'disabled'}>
        ${canStart ? (impGame.doubleMode && canDouble ? 'Repartir cartas (2 impostores 🕵️🕵️)' : 'Repartir cartas') : (impGame.players.length < 3 ? 'Necesitás al menos 3 jugadores' : 'Elegí una categoría primero')}
      </button>

      ${renderImpHistoryHtml()}
    </div>
  `);
}

function toggleCat(btn, cat) {
  impGame.activeCategory = impGame.activeCategory === cat ? null : cat;
  saveImpGame();
  renderImpSetup();
}

function addCustomWord() {
  const inp = document.getElementById('imp-custom-input');
  const val = inp.value.trim();
  if (!val) return;
  if (!impGame.customWords.includes(val)) {
    impGame.customWords.push(val);
    // Detectar categoría y mostrar toast
    const cat = detectWordCategory(val);
    if (cat) {
      showToast('🏷️', `"${val}" → ${cat}`, false);
    } else {
      showToast('✓', `"${val}" agregada (categoría desconocida)`, false);
    }
  }
  inp.value = '';
  saveImpGame();
  renderImpSetup();
}

function removeCustomWord(i) {
  impGame.customWords.splice(i, 1);
  saveImpGame();
  renderImpSetup();
}

function addImpPlayer() {
  const inp = document.getElementById('imp-player-input');
  const val = inp.value.trim();
  if (val && !impGame.players.includes(val)) {
    impGame.players.push(val);
  }
  inp.value = '';
  saveImpGame();
  renderImpSetup();
}

function removeImpPlayer(i) {
  if (impGame.players.length <= 3) {
    alert('Necesitás al menos 3 jugadores para jugar al Impostor.');
    return;
  }
  impGame.players.splice(i, 1);
  if (impGame.players.length < 6) impGame.doubleMode = false;
  saveImpGame();
  renderImpSetup();
}

function toggleDoubleMode() {
  if (impGame.players.length < 6) return;
  impGame.doubleMode = !impGame.doubleMode;
  saveImpGame();
  renderImpSetup();
}

// Arranca un ciclo nuevo: foto del roster actual, palabra nueva, impostor(es) nuevo(s).
function beginWordCycle() {
  const pool = allImpWords();
  if (!pool.length) return false;
  impGame.roundPlayers = [...impGame.players];
  impGame.selectedWord = pickRandomWord();
  const n = impGame.roundPlayers.length;
  const useDouble = !!impGame.doubleMode && n >= 6;
  const impostorCount = useDouble ? 2 : 1;
  impGame.impostorIdxs = shuffleArr([...Array(n).keys()]).slice(0, impostorCount);
  impGame.caughtIdxs = [];
  impGame.failedVotes = 0;
  impGame.currentCardStep = 0;
  impGame.accusedIdx = null;
  impGame.phase = 'cards';
  return true;
}

function startImpGame() {
  if (impGame.players.length < 3) return;
  if (!beginWordCycle()) return;
  saveImpGame();
  renderImpCards();
}

// "Nueva ronda (nueva palabra)": se usa tanto si el impostor fue descubierto
// como si el organizador prefiere arrancar de cero en vez de repetir la misma palabra.
// "Seguir ronda sin revelar": cierra la pantalla de decisión y vuelve a la
// votación con la misma palabra e impostor, sin develar nada todavía.
// Sigue siendo posible votar las veces que haga falta antes de terminar.
function continueSameRound() {
  document.querySelectorAll('.cover-overlay').forEach(e => e.remove());
  impGame.accusedIdx = null;
  impGame.phase = 'result';
  saveImpGame();
  renderImpResult();
}

function goToImpSetup() {
  document.querySelectorAll('.cover-overlay').forEach(e => e.remove());
  impGame.phase = 'setup';
  saveImpGame();
  renderImpSetup();
}

// ---- CARDS ----
function renderImpCards() {
  const step = impGame.currentCardStep;
  const total = impGame.roundPlayers.length;

  const dots = Array.from({length: total}, (_,i) =>
    `<div class="dot ${i < step ? 'done' : i === step ? 'current' : ''}"></div>`
  ).join('');

  impRoot(`
    <div style="max-width:400px;margin:0 auto;padding:0.5rem 0;text-align:center">
      <div style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem">Carta ${step+1} de ${total}</div>
      <div class="progress-dots" style="justify-content:center;flex-wrap:wrap">${dots}</div>
      <div style="font-size:14px;color:var(--muted);margin:1.25rem 0 0.5rem">Pasá el dispositivo a <b style="color:var(--text)">${impGame.roundPlayers[step]}</b></div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:2rem">Mirá tu carta en privado, sin que nadie vea</div>

      <div id="imp-card-area">
        <div class="imp-card-face imp-card-back" onclick="flipCard()" id="imp-card-back">
          <div style="font-size:48px;margin-bottom:0.75rem">🃏</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:0.25rem">Tu carta</div>
          <div style="font-size:12px;color:var(--muted)">Tocá para revelar</div>
        </div>
      </div>

      <div id="imp-card-next" style="display:none;margin-top:1.5rem">
        ${step < total - 1
          ? `<button class="btn btn-primary" style="width:100%;padding:0.875rem;font-size:14px" onclick="nextCard()">Siguiente jugador</button>`
          : `<button class="btn btn-primary" style="width:100%;padding:0.875rem;font-size:14px;background:var(--gold);border-color:var(--gold);color:#111" onclick="goToVoting()">¡Arrancar el juego!</button>`
        }
      </div>
    </div>
  `);
}

function flipCard() {
  const step = impGame.currentCardStep;
  const isImpostor = impGame.impostorIdxs.includes(step);
  const isDouble = impGame.impostorIdxs.length > 1;
  const word = impGame.selectedWord;

  const cardEl = document.getElementById('imp-card-back');
  if (!cardEl) return;

  const impostorDesc = isDouble
    ? 'Sos uno de los 2 impostores. No sabés la palabra ni quién es el otro. Escuchá, camuflate y que no los descubran a los dos.'
    : 'No sabés la palabra. Escuchá, camuflate y no te descubran.';

  const areaEl = document.getElementById('imp-card-area');
  areaEl.innerHTML = `
    <div class="imp-card-face ${isImpostor ? 'imp-card-impostor' : 'imp-card-word'}">
      <div style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.75rem;opacity:0.7">${isImpostor ? 'Tu rol' : 'Palabra secreta'}</div>
      <div style="font-size:${isImpostor ? '28px' : '36px'};font-weight:800;letter-spacing:-0.5px;margin-bottom:0.5rem">${isImpostor ? 'IMPOSTOR' : word}</div>
      <div style="font-size:12px;opacity:0.65;line-height:1.5">${isImpostor ? impostorDesc : 'Esta es tu palabra. Dá pistas sin decirla directamente.'}</div>
    </div>
  `;
  document.getElementById('imp-card-next').style.display = '';
}

function nextCard() {
  impGame.currentCardStep++;
  saveImpGame();
  renderImpCards();
}

function goToVoting() {
  impGame.phase = 'result';
  saveImpGame();
  const players = impGame.roundPlayers;
  const winnerIdx = Math.floor(Math.random() * players.length);

  const cover = document.createElement('div');
  cover.className = 'cover-overlay';
  cover.innerHTML = `
    <div class="cover-icon">🎲</div>
    <div class="cover-title">¡Todos tienen su carta!</div>
    <div class="cover-sub" style="margin-bottom:0.4rem">¿Quién arranca con la primera pista?</div>
    ${(() => {
      const w = impGame.selectedWord;
      const TODAS = 'Todas juntas 🎲';
      let hint = (impGame.activeCategory && impGame.activeCategory !== TODAS) ? impGame.activeCategory : null;
      if (!hint && w) {
        // Buscar en IMP_WORDS primero
        for (const [cat, words] of Object.entries(IMP_WORDS)) {
          if (cat === TODAS) continue;
          if (words.includes(w)) { hint = cat; break; }
        }
        // Fallback al diccionario amplio
        if (!hint) hint = detectWordCategory(w);
      }
      return hint
        ? `<div style="font-size:12px;color:var(--muted);margin-bottom:0.9rem">Categoría: <b style="color:var(--info)">${hint}</b></div>`
        : '<div style="margin-bottom:0.9rem"></div>';
    })()}
    <div class="roulette-strip-wrap" id="roulette-wrap">
      <div class="roulette-pointer"></div>
      <div class="roulette-strip" id="roulette-strip"></div>
    </div>
    <div id="roulette-result" style="font-size:22px;font-weight:700;color:var(--gold);margin:1rem 0 0.25rem;min-height:34px;letter-spacing:-0.5px"></div>
    <div id="roulette-sub" style="font-size:13px;color:var(--muted);margin-bottom:1.75rem;min-height:20px"></div>
    <button class="btn btn-primary" id="roulette-btn" style="padding:0.875rem 2.5rem;font-size:15px;opacity:0;transition:opacity 0.4s" disabled onclick="this.parentElement.remove();renderImpResult()">Ir a la votación →</button>
  `;
  document.body.appendChild(cover);

  requestAnimationFrame(() => {
    const strip = document.getElementById('roulette-strip');
    const wrap  = document.getElementById('roulette-wrap');
    if (!strip || !wrap) return;

    const COPIES = 28;
    for (let c = 0; c < COPIES; c++) {
      players.forEach((p, i) => {
        const el = document.createElement('div');
        el.className = 'roulette-item';
        el.textContent = p.split(' ')[0];
        el.dataset.playerIdx = i;
        strip.appendChild(el);
      });
    }

    requestAnimationFrame(() => {
      const allItems = Array.from(strip.children);
      if (!allItems.length) return;

      // Measure each item's actual width and compute cumulative offsets
      const itemWidths = allItems.map(el => el.getBoundingClientRect().width);
      const offsets = []; // left edge of each item relative to strip start
      let acc = 0;
      for (let i = 0; i < itemWidths.length; i++) {
        offsets.push(acc);
        acc += itemWidths[i];
      }

      const wrapRect = wrap.getBoundingClientRect();
      const wrapCenter = wrapRect.width / 2;

      // Per-copy width (sum of one full set of players)
      const copyW = players.reduce((s, _, i) => s + itemWidths[i], 0);

      // Target: winner item in copy (COPIES - 3)
      const targetCopy = COPIES - 3;
      const targetAbsIdx = targetCopy * players.length + winnerIdx;
      const targetItemLeft = offsets[targetAbsIdx];
      const targetItemW = itemWidths[targetAbsIdx];
      // translateX so item center aligns with wrap center
      const targetX = -(targetItemLeft + targetItemW / 2 - wrapCenter);

      // Start: winner in copy 2 (off-screen enough to build speed)
      const startCopy = 2;
      const startAbsIdx = startCopy * players.length + winnerIdx;
      const startItemLeft = offsets[startAbsIdx];
      const startItemW = itemWidths[startAbsIdx];
      const startX = -(startItemLeft + startItemW / 2 - wrapCenter);

      strip.style.transform = 'translateX(' + startX + 'px)';

      const duration = 3400;
      let startTime = null;

      function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }

      function tick(ts) {
        if (!startTime) startTime = ts;
        const elapsed = ts - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = easeOutQuart(progress);
        const currentX = startX + (targetX - startX) * eased;
        strip.style.transform = 'translateX(' + currentX + 'px)';

        // Highlight item whose center is closest to wrap center
        const wrapLeft = wrap.getBoundingClientRect().left;
        const centerAbs = wrapLeft + wrapCenter;
        allItems.forEach(el => {
          const r = el.getBoundingClientRect();
          const elCenter = r.left + r.width / 2;
          el.classList.toggle('winner', Math.abs(elCenter - centerAbs) < r.width / 2);
        });

        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          // Read winner from the item actually centered under the pointer
          const wrapL = wrap.getBoundingClientRect().left;
          const cAbs = wrapL + wrapCenter;
          let centeredEl = null, minDist = Infinity;
          allItems.forEach(el => {
            const r = el.getBoundingClientRect();
            const dist = Math.abs(r.left + r.width / 2 - cAbs);
            if (dist < minDist) { minDist = dist; centeredEl = el; }
          });
          const actualWinner = centeredEl ? centeredEl.textContent : players[winnerIdx].split(' ')[0];

          const resultEl = document.getElementById('roulette-result');
          const subEl    = document.getElementById('roulette-sub');
          const btn      = document.getElementById('roulette-btn');
          if (resultEl) resultEl.textContent = actualWinner + ' arranca primero 🎙️';
          if (subEl)    subEl.textContent    = 'Que dé la primera pista sin decir la palabra';
          if (btn)      { btn.style.opacity = '1'; btn.disabled = false; }
        }
      }

      setTimeout(() => requestAnimationFrame(tick), 250);
    });
  });
}

// ---- RESULT / VOTING ----
function renderImpResult() {
  impGame.phase = 'result';
  saveImpGame();
  const acc = impGame.accusedIdx;
  const caught = impGame.caughtIdxs || [];
  const totalImpostors = impGame.impostorIdxs.length;

  const btnHtml = impGame.roundPlayers.map((n,i) => {
    if (caught.includes(i)) return '';
    return `<button class="vote-player-btn ${acc===i?'sel':''}" onclick="accuseCardPlayer(${i})">${n.split(' ')[0]}</button>`;
  }).join('');

  const maxVotes = Math.ceil(impGame.roundPlayers.length / 2);
  const usedVotes = impGame.failedVotes || 0;
  const remainingVotes = maxVotes - usedVotes;
  const votesNote = `<div style="font-size:12px;color:${remainingVotes<=1?'var(--danger)':'var(--gold)'};margin-bottom:0.75rem">🎯 ${remainingVotes} oportunidad${remainingVotes===1?'':'es'} restante${remainingVotes===1?'':'s'} de ${maxVotes}</div>`;
  const caughtNote = caught.length
    ? `<div style="font-size:12px;color:var(--success);margin-bottom:0.75rem">✅ Ya descubrieron a ${caught.map(i=>impGame.roundPlayers[i].split(' ')[0]).join(' y ')}. ${totalImpostors - caught.length === 1 ? 'Queda 1 impostor más escondido.' : `Quedan ${totalImpostors - caught.length} más escondidos.`}</div>`
    : '';
  const doubleNote = (totalImpostors > 1 && !caught.length)
    ? `<div style="font-size:12px;color:var(--gold);margin-bottom:0.75rem">🕵️🕵️ Modo doble impostor — hay 2 escondidos</div>`
    : '';

  impRoot(`
    <div style="max-width:480px;margin:0 auto;padding:0.5rem 0">
      <div style="font-size:20px;font-weight:700;letter-spacing:-0.5px;margin-bottom:0.25rem">Votación 🗳️</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:0.5rem">¿Quién creen que es el impostor?</div>
      ${votesNote}${doubleNote}${caughtNote}
      <div class="result-vote-grid">${btnHtml}</div>
      <button class="btn btn-primary" style="width:100%;padding:0.875rem;font-size:15px;margin-top:0.75rem" onclick="confirmVote()" ${acc!==null?'':'disabled'}>
        ✅ Confirmar elección
      </button>
      <button class="btn" style="width:100%;margin-top:0.5rem;color:var(--muted);font-size:12px" onclick="finalizeImpGame('noDescubierto')">🏳️ Rendirse — el impostor gana</button>
    </div>
  `);
}

function accuseCardPlayer(i) {
  impGame.accusedIdx = i;
  saveImpGame();
  renderImpResult();
}

// Confirmar votación: revela directamente el resultado.
// Si erraron, descuenta una oportunidad y sigue la ronda.
// Las oportunidades = ceil(jugadores / 2).
function confirmVote() {
  if (impGame.accusedIdx === null) return;
  revealImpResult();
}

// Ya no se usa externamente, se mantiene por compatibilidad
function keepPlaying() {
  document.querySelectorAll('.cover-overlay').forEach(e => e.remove());
  impGame.accusedIdx = null;
  saveImpGame();
  renderImpResult();
}

function revealImpResult() {
  document.querySelectorAll('.cover-overlay').forEach(e => e.remove());
  if (impGame.accusedIdx === null) return;
  const acc = impGame.accusedIdx;
  const word = impGame.selectedWord;
  const accName = impGame.roundPlayers[acc];
  const isImpostor = impGame.impostorIdxs.includes(acc);
  const totalImpostors = impGame.impostorIdxs.length;

  if (isImpostor) {
    if (!impGame.caughtIdxs.includes(acc)) impGame.caughtIdxs.push(acc);
    const remaining = impGame.impostorIdxs.filter(i => !impGame.caughtIdxs.includes(i));
    saveImpGame();

    if (remaining.length === 0) {
      // todos los impostores fueron descubiertos
      const cover = document.createElement('div');
      cover.className = 'cover-overlay';
      cover.innerHTML = `
        <div class="cover-icon">🎉</div>
        <div class="cover-title">¡${totalImpostors>1 ? 'Impostores descubiertos' : 'Impostor descubierto'}!</div>
        <div class="cover-sub"><b>${accName}</b> era ${totalImpostors>1?'uno de los impostores':'el impostor'}.</div>
        <div style="font-size:14px;color:var(--muted);margin:0.5rem 0 2rem">La palabra era <b style="color:var(--accent);font-size:18px">${word}</b></div>
        <button class="btn btn-primary" style="padding:0.875rem 1.75rem;font-size:14px" onclick="finalizeImpGame('descubierto')">
          Registrar → ${RULES_CONFIG.impostor.pts_descubierto} pts para cada jugador (excepto ${totalImpostors>1?'los impostores':'el impostor'})
        </button>
      `;
      document.body.appendChild(cover);
    } else {
      // descubrieron a uno, pero todavía queda otro escondido (modo doble)
      const cover = document.createElement('div');
      cover.className = 'cover-overlay';
      cover.innerHTML = `
        <div class="cover-icon">🕵️‍♂️</div>
        <div class="cover-title">¡Encontraron a un impostor!</div>
        <div class="cover-sub"><b>${accName}</b> era impostor. Pero todavía queda ${remaining.length === 1 ? '1 impostor más' : remaining.length + ' impostores más'} escondido${remaining.length>1?'s':''}.</div>
        <button class="btn btn-primary" style="padding:0.875rem 1.75rem;font-size:14px" onclick="document.querySelectorAll('.cover-overlay').forEach(e=>e.remove());impGame.accusedIdx=null;saveImpGame();goToVoting();">🎲 Nueva ruleta — seguir buscando</button>
        <button class="btn" style="margin-top:0.6rem;color:var(--muted);font-size:12px" onclick="finalizeImpGame()">🏁 Terminar la ronda acá</button>
      `;
      document.body.appendChild(cover);
    }
  } else {
    // Voto fallido — descontar oportunidad
    impGame.failedVotes = (impGame.failedVotes || 0) + 1;
    const maxVotes = Math.ceil(impGame.roundPlayers.length / 2);
    const remaining = maxVotes - impGame.failedVotes;
    const realNames = impGame.impostorIdxs.filter(i => !impGame.caughtIdxs.includes(i)).map(i => impGame.roundPlayers[i]);
    saveImpGame();

    if (remaining <= 0) {
      // Sin oportunidades — gana el impostor
      const cover = document.createElement('div');
      cover.className = 'cover-overlay';
      cover.innerHTML = `
        <div class="cover-icon">🕵️</div>
        <div class="cover-title">¡${realNames.length>1?'Los impostores ganaron':'El impostor ganó'}!</div>
        <div class="cover-sub">Se acabaron las oportunidades. <b>${accName}</b> no era impostor.</div>
        <div style="font-size:13px;color:var(--muted);margin-top:0.25rem">${realNames.length>1?'Los impostores eran':'El impostor era'} <b style="color:var(--danger)">${realNames.join(' y ')}</b>.</div>
        <div style="font-size:14px;color:var(--muted);margin:0.5rem 0 1.5rem">La palabra era <b style="color:var(--accent);font-size:18px">${word}</b></div>
        <button class="btn btn-primary" style="padding:0.875rem 1.75rem;font-size:14px;background:var(--danger);border-color:var(--danger)" onclick="finalizeImpGame('noDescubierto')">
          Registrar → ${RULES_CONFIG.impostor.pts_noDescubierto} pts ${realNames.length>1?'a cada impostor':'al impostor'}
        </button>
      `;
      document.body.appendChild(cover);
    } else {
      // Quedan oportunidades — sigue la ronda
      const cover = document.createElement('div');
      cover.className = 'cover-overlay';
      cover.innerHTML = `
        <div class="cover-icon">❌</div>
        <div class="cover-title"><b>${accName}</b> no era impostor</div>
        <div class="cover-sub" style="margin-bottom:0.5rem">El impostor sigue escondido. Sigan debatiendo.</div>
        <div style="font-size:13px;color:var(--gold);font-weight:600;margin-bottom:1.75rem">${remaining} oportunidad${remaining===1?'':'es'} restante${remaining===1?'':'s'}</div>
        <button class="btn btn-primary" style="padding:0.875rem 1.75rem;font-size:14px" onclick="document.querySelectorAll('.cover-overlay').forEach(e=>e.remove());impGame.accusedIdx=null;saveImpGame();renderImpResult();">
          🔍 Seguir buscando
        </button>
        <button class="btn" style="margin-top:0.6rem;color:var(--muted);font-size:12px" onclick="finalizeImpGame('noDescubierto')">
          🏳️ Rendirse — el impostor gana
        </button>
      `;
      document.body.appendChild(cover);
    }
  }
}

function finalizeImpGame(legacyMode) {
  document.querySelectorAll('.cover-overlay').forEach(e => e.remove());
  let rd;
  if (impGame.impostorIdxs.length <= 1) {
    // Ronda normal (1 impostor) — mantiene el formato de siempre para no romper historial viejo.
    const impostorName = impGame.roundPlayers[impGame.impostorIdxs[0]];
    const accusedName = impGame.roundPlayers[impGame.accusedIdx];
    rd = {
      word: impGame.selectedWord,
      impostorName,
      mode: legacyMode,
      accusedName,
      players: [...impGame.roundPlayers],
    };
  } else {
    // Ronda con doble impostor — formato nuevo, soporta captura total o parcial.
    const impostorNames = impGame.impostorIdxs.map(i => impGame.roundPlayers[i]);
    const caughtNames = impGame.caughtIdxs.map(i => impGame.roundPlayers[i]);
    const escapedNames = impostorNames.filter(n => !caughtNames.includes(n));
    rd = {
      word: impGame.selectedWord,
      mode: 'doble',
      impostorNames,
      caughtNames,
      escapedNames,
      players: [...impGame.roundPlayers],
    };
  }
  state.impostor.rounds.push(rd);
  saveState();
  saveImpGame();
  renderImpRoundDone(rd);
}

function renderImpRoundDone(rd) {
  const roundNum = state.impostor.rounds.length;
  const ndPts = (RULES_CONFIG && RULES_CONFIG.impostor) ? RULES_CONFIG.impostor.pts_noDescubierto : 4;
  const dPts  = (RULES_CONFIG && RULES_CONFIG.impostor) ? RULES_CONFIG.impostor.pts_descubierto : 2;

  let icon, title, sub, ptsHtml;

  if (rd.mode === 'doble') {
    const impostorNames = rd.impostorNames || [];
    const caughtNames = rd.caughtNames || [];
    const escapedNames = rd.escapedNames || impostorNames.filter(n => !caughtNames.includes(n));
    const total = impostorNames.length || 1;
    const crewPts = Math.round(dPts * caughtNames.length / total);

    ptsHtml = rd.players.map(name => {
      const isImp = impostorNames.includes(name);
      const pts = isImp ? (caughtNames.includes(name) ? 0 : ndPts) : crewPts;
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;border-bottom:0.5px solid var(--border)">
        <span style="font-size:13px">${name}${isImp ? (caughtNames.includes(name) ? ' 🕵️✅' : ' 🕵️') : ''}</span>
        <span style="font-size:13px;font-weight:600;color:${pts > 0 ? 'var(--success)' : 'var(--muted)'}">${pts > 0 ? '+' + pts : '—'}</span>
      </div>`;
    }).join('');

    icon = caughtNames.length === total ? '🎉' : caughtNames.length === 0 ? '🕵️' : '🕵️‍♂️';
    title = caughtNames.length === total
      ? `Ronda ${roundNum} — ambos impostores descubiertos`
      : caughtNames.length === 0
        ? `Ronda ${roundNum} — impostores libres`
        : `Ronda ${roundNum} — ${caughtNames.length} de ${total} descubiertos`;
    sub = caughtNames.length === total
      ? `<b style="color:var(--success)">${impostorNames.join(' y ')}</b> eran los impostores. La palabra era <b style="color:var(--accent)">${rd.word}</b>.`
      : caughtNames.length === 0
        ? `<b style="color:var(--danger)">${impostorNames.join(' y ')}</b> se salvaron. La palabra era <b style="color:var(--accent)">${rd.word}</b>.`
        : `Atraparon a <b style="color:var(--success)">${caughtNames.join(' y ')}</b>, pero <b style="color:var(--danger)">${escapedNames.join(' y ')}</b> se salvó${escapedNames.length>1?'ron':''}. La palabra era <b style="color:var(--accent)">${rd.word}</b>.`;
  } else {
    ptsHtml = rd.players.map(name => {
      let pts = 0;
      if (rd.mode === 'noDescubierto') pts = name === rd.impostorName ? ndPts : 0;
      else pts = name === rd.impostorName ? 0 : dPts;
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;border-bottom:0.5px solid var(--border)">
        <span style="font-size:13px">${name}${name === rd.impostorName ? ' 🕵️' : ''}</span>
        <span style="font-size:13px;font-weight:600;color:${pts > 0 ? 'var(--success)' : 'var(--muted)'}">${pts > 0 ? '+' + pts : '—'}</span>
      </div>`;
    }).join('');

    icon   = rd.mode === 'noDescubierto' ? '🕵️' : '🎉';
    title  = rd.mode === 'noDescubierto'
      ? `Ronda ${roundNum} — impostor libre`
      : `Ronda ${roundNum} — descubierto`;
    sub    = rd.mode === 'noDescubierto'
      ? `<b style="color:var(--danger)">${rd.impostorName}</b> se salvó. La palabra era <b style="color:var(--accent)">${rd.word}</b>.`
      : `<b style="color:var(--success)">${rd.impostorName}</b> era el impostor. La palabra era <b style="color:var(--accent)">${rd.word}</b>.`;
  }

  const cover = document.createElement('div');
  cover.className = 'cover-overlay';
  cover.innerHTML = `
    <div class="cover-icon">${icon}</div>
    <div class="cover-title">${title}</div>
    <div class="cover-sub">${sub}</div>
    <div class="card" style="padding:0.75rem 1rem;margin:1rem 0;max-width:380px;width:100%;text-align:left">${ptsHtml}</div>
    <button class="btn btn-primary" style="padding:0.875rem 1.75rem;font-size:14px;background:var(--gold);border-color:var(--gold);color:#111" onclick="goToImpSetup()">Nueva ronda →</button>
  `;
  document.body.appendChild(cover);
}

function triggerPhotoUpload(entityName, phase) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.onchange = function() {
    const file = inp.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = 120; canvas.height = 120;
        const ctx = canvas.getContext('2d');
        const minDim = Math.min(img.width, img.height);
        const sx = (img.width - minDim) / 2;
        const sy = (img.height - minDim) / 2;
        ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, 120, 120);
        setPlayerPhoto(entityName, canvas.toDataURL('image/jpeg', 0.82));
        if (phase === 'f2') { renderF2RosterAdmin(); renderFase2(); }
        else { renderF1RosterAdmin(); renderFase1(); }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function miiFigureSVG(color, size, pose, photoDataUrl) {
  const s = size;
  const uid = 'mii' + Math.random().toString(36).slice(2,8);
  const cx = s / 2;

  // Proportions (all relative to s)
  const headR   = s * 0.215;     // head radius — big like Mii
  const headCy  = headR + s * 0.01; // head center Y
  const neckT   = headCy + headR; // neck top
  const torsoT  = neckT + s * 0.04;
  const torsoH  = s * 0.22;
  const torsoW  = s * 0.38;
  const torsoB  = torsoT + torsoH; // torso bottom
  const torsoL  = cx - torsoW / 2;
  const torsoR  = cx + torsoW / 2;
  const torsoRad = s * 0.07;

  // Legs
  const legW    = s * 0.12;
  const legH    = s * 0.22;
  const legGap  = s * 0.03;
  const legLX   = cx - legGap/2 - legW;
  const legRX   = cx + legGap/2;
  const legT    = torsoB - s * 0.03;
  const legB    = legT + legH;
  const legRad  = s * 0.05;

  // Arms — shape changes per pose
  const armW    = s * 0.10;
  const armH    = s * 0.20;
  const armRad  = s * 0.05;
  const armShoulderY = torsoT + s * 0.03;

  // Color helpers
  const light  = lighten(color, 0.28);
  const dark   = lighten(color, -0.12);
  const skinBase = '#f5c8a0';
  const skinDark = '#e8a878';

  // Neck
  const neckW = s * 0.09;
  const neckH = s * 0.05;

  // --- BUILD SVG ELEMENTS in correct painter order ---
  // 1. Arms (behind torso)
  // 2. Torso
  // 3. Legs
  // 4. Neck
  // 5. Head (always on top)

  let armLeftEl, armRightEl;

  if (pose === 'victory') {
    // Both arms raised in V
    const alx = torsoL - armW + s*0.01;
    const arx = torsoR - s*0.01;
    // left arm: raised, tilted left
    armLeftEl = `
      <rect x="${alx - s*0.04}" y="${armShoulderY - armH*0.85}" width="${armW}" height="${armH}"
        rx="${armRad}" fill="${light}"
        transform="rotate(-38,${alx - s*0.04 + armW/2},${armShoulderY})"/>`;
    armRightEl = `
      <rect x="${arx}" y="${armShoulderY - armH*0.85}" width="${armW}" height="${armH}"
        rx="${armRad}" fill="${light}"
        transform="rotate(38,${arx + armW/2},${armShoulderY})"/>`;
  } else if (pose === 'side') {
    // Arms slightly out to sides, relaxed
    const alx = torsoL - armW + s*0.01;
    const arx = torsoR - s*0.01;
    armLeftEl = `
      <rect x="${alx - s*0.01}" y="${armShoulderY}" width="${armW}" height="${armH}"
        rx="${armRad}" fill="${light}"
        transform="rotate(12,${alx + armW/2},${armShoulderY})"/>`;
    armRightEl = `
      <rect x="${arx + s*0.01}" y="${armShoulderY}" width="${armW}" height="${armH}"
        rx="${armRad}" fill="${light}"
        transform="rotate(-12,${arx + armW/2},${armShoulderY})"/>`;
  } else {
    // slump — arms drooping down
    const alx = torsoL - armW + s*0.01;
    const arx = torsoR - s*0.01;
    armLeftEl = `
      <rect x="${alx}" y="${armShoulderY}" width="${armW}" height="${armH}"
        rx="${armRad}" fill="${light}"
        transform="rotate(22,${alx + armW/2},${armShoulderY})"/>`;
    armRightEl = `
      <rect x="${arx}" y="${armShoulderY}" width="${armW}" height="${armH}"
        rx="${armRad}" fill="${light}"
        transform="rotate(-22,${arx + armW/2},${armShoulderY})"/>`;
  }

  // Torso
  const torsoEl = `<rect x="${torsoL}" y="${torsoT}" width="${torsoW}" height="${torsoH}" rx="${torsoRad}" fill="${color}"/>
    <rect x="${torsoL}" y="${torsoT}" width="${torsoW}" height="${torsoH*0.45}" rx="${torsoRad}" fill="${light}" opacity="0.25"/>`;

  // Legs
  const legLEl = `<rect x="${legLX}" y="${legT}" width="${legW}" height="${legH}" rx="${legRad}" fill="${dark}"/>`;
  const legREl = `<rect x="${legRX}" y="${legT}" width="${legW}" height="${legH}" rx="${legRad}" fill="${dark}"/>`;

  // Shoes (small rounded rect at bottom of each leg)
  const shoeW = legW + s*0.04;
  const shoeH = s*0.06;
  const shoeLEl = `<rect x="${legLX - s*0.02}" y="${legB - shoeH*0.5}" width="${shoeW}" height="${shoeH}" rx="${shoeH/2}" fill="${lighten(dark,-0.15)}"/>`;
  const shoeREl = `<rect x="${legRX - s*0.02}" y="${legB - shoeH*0.5}" width="${shoeW}" height="${shoeH}" rx="${shoeH/2}" fill="${lighten(dark,-0.15)}"/>`;

  // Neck
  const neckEl = `<rect x="${cx - neckW/2}" y="${neckT - s*0.01}" width="${neckW}" height="${neckH + s*0.01}" rx="${neckW*0.3}" fill="${skinDark}"/>`;

  // Head — drawn LAST so it's always on top
  let headEl;
  if (photoDataUrl) {
    headEl = `
      <defs>
        <clipPath id="hcp${uid}"><circle cx="${cx}" cy="${headCy}" r="${headR}"/></clipPath>
        <radialGradient id="hrim${uid}" cx="50%" cy="30%" r="70%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
      </defs>
      <circle cx="${cx}" cy="${headCy}" r="${headR}" fill="${skinBase}"/>
      <image href="${photoDataUrl}" x="${cx-headR}" y="${headCy-headR}" width="${headR*2}" height="${headR*2}"
        clip-path="url(#hcp${uid})" preserveAspectRatio="xMidYMid slice"/>
      <circle cx="${cx}" cy="${headCy}" r="${headR}" fill="url(#hrim${uid})"/>
      <circle cx="${cx}" cy="${headCy}" r="${headR}" fill="none" stroke="${light}" stroke-width="${s*0.02}"/>`;
  } else {
    // Blank Mii-style face: skin tone, two oval eyes, simple smile
    const eyeRx = headR * 0.115;
    const eyeRy = headR * 0.14;
    const eyeY  = headCy - headR * 0.05;
    const eyeOff = headR * 0.3;
    const smileR = headR * 0.28;
    headEl = `
      <defs>
        <radialGradient id="hg${uid}" cx="40%" cy="30%" r="65%">
          <stop offset="0%" stop-color="${skinBase}"/>
          <stop offset="100%" stop-color="${skinDark}"/>
        </radialGradient>
      </defs>
      <circle cx="${cx}" cy="${headCy}" r="${headR}" fill="url(#hg${uid})" stroke="${light}" stroke-width="${s*0.02}"/>
      <!-- eyes -->
      <ellipse cx="${cx - eyeOff}" cy="${eyeY}" rx="${eyeRx}" ry="${eyeRy}" fill="#2a1f14"/>
      <ellipse cx="${cx + eyeOff}" cy="${eyeY}" rx="${eyeRx}" ry="${eyeRy}" fill="#2a1f14"/>
      <!-- eye shine -->
      <circle cx="${cx - eyeOff + eyeRx*0.4}" cy="${eyeY - eyeRy*0.35}" r="${eyeRx*0.38}" fill="rgba(255,255,255,0.75)"/>
      <circle cx="${cx + eyeOff + eyeRx*0.4}" cy="${eyeY - eyeRy*0.35}" r="${eyeRx*0.38}" fill="rgba(255,255,255,0.75)"/>
      <!-- smile -->
      <path d="M${cx - smileR},${headCy + headR*0.22} Q${cx},${headCy + headR*0.52} ${cx + smileR},${headCy + headR*0.22}"
        stroke="#2a1f14" stroke-width="${s*0.025}" fill="none" stroke-linecap="round"/>`;
  }

  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    ${armLeftEl}
    ${armRightEl}
    ${torsoEl}
    ${legLEl}
    ${legREl}
    ${shoeLEl}
    ${shoeREl}
    ${neckEl}
    ${headEl}
  </svg>`;
}

function lighten(hex, amt) {
  // simple hex lighten
  let c = hex.replace('#','');
  if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  const r = Math.min(255, parseInt(c.slice(0,2),16) + Math.round(amt*120));
  const g = Math.min(255, parseInt(c.slice(2,4),16) + Math.round(amt*100));
  const b = Math.min(255, parseInt(c.slice(4,6),16) + Math.round(amt*80));
  return `rgb(${r},${g},${b})`;
}

let _prevPodiumTop3F1 = '';
let _prevPodiumTop3F2 = '';

function renderPodium(containerId, sorted, phase) {
  const el = document.getElementById(containerId);
  if (!el) return;

  // Display order: 2nd (left) | 1st (center) | 3rd (right)
  const order     = [1, 0, 2];
  const poses     = ['side', 'victory', 'slump'];
  const colors    = ['#a0b4c8', '#f5c842', '#cd7f32'];
  const figSizes  = [64, 82, 54];
  const enterCls  = ['podium-enter-1','podium-enter-2','podium-enter-3'];
  const posLabels = ['2°','1°','3°'];

  const top3Key = sorted.slice(0,3).map(s => `${s.n}:${s.pts.total}`).join('|');
  const prevKey = phase === 'f1' ? _prevPodiumTop3F1 : _prevPodiumTop3F2;
  const changed = top3Key !== prevKey;
  if (phase === 'f1') _prevPodiumTop3F1 = top3Key;
  else _prevPodiumTop3F2 = top3Key;

  const phaseColor = phase === 'f1' ? 'var(--accent)' : 'var(--info)';
  const phaseDot   = phase === 'f1' ? 'fase1' : 'fase2';

  const slots = order.map((pos, slotIdx) => {
    const entry = sorted[pos];
    const name  = entry ? entry.n.split(' ')[0] : null;
    const pts   = entry ? entry.pts.total : 0;
    const color = colors[slotIdx];
    const photo = entry ? getPlayerPhoto(entry.n) : null;
    const fig   = entry ? miiFigureSVG(color, figSizes[slotIdx], poses[slotIdx], photo) : '';
    const isFirst = slotIdx === 1;
    const animCls = changed ? enterCls[slotIdx] : '';

    const crown    = isFirst && entry ? `<div class="podium-crown">👑</div>` : '';
    const figHtml  = entry
      ? `<div class="podium-glow"></div>${fig}`
      : `<div style="height:${figSizes[slotIdx]}px;display:flex;align-items:center;justify-content:center"><span style="font-size:${figSizes[slotIdx]*0.5}px;opacity:0.2">?</span></div>`;

    const nameHtml = entry
      ? `<div class="podium-name-badge">${name}</div>`
      : `<div class="podium-empty">${posLabels[slotIdx]}</div>`;

    const ptsHtml = entry
      ? `<div class="podium-pts-badge">${pts} pts</div>`
      : '';

    return `<div class="podium-slot ${animCls}">
      <div class="podium-avatar-wrap">
        ${crown}
        <div class="podium-figure">${figHtml}</div>
      </div>
      ${nameHtml}
      ${ptsHtml}
      <div class="podium-block">
        <span class="podium-block-num">${posLabels[slotIdx]}</span>
      </div>
    </div>`;
  });

  el.innerHTML = `
    <div class="podium-outer">
      <div class="podium-label">
        <span class="dot-indicator ${phaseDot}"></span>
        Podio en vivo
      </div>
      <div class="podium-wrap">${slots.join('')}</div>
    </div>
  `;

  if (changed && sorted[0]?.pts.total > 0) {
    playPodiumSound();
    if (sorted[0]?.pts.total >= 6) launchConfetti(phase);
  }
}

let _confettiAF = null;
let _confettiPieces = [];
let _confettiPhase = null;

function launchConfetti(phase) {
  if (_confettiPhase === phase) return; // no re-lanzar si ya está activo para la misma fase
  _confettiPhase = phase;
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = phase === 'f1'
    ? ['#c8f060','#f5c842','#a0b4c8','#cd7f32','#4ecb7e','#60b4f0']
    : ['#60b4f0','#f5c842','#a0b4c8','#cd7f32','#c8f060','#ff5f5f'];

  _confettiPieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height * 0.5,
    w: 6 + Math.random() * 8,
    h: 10 + Math.random() * 8,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 3,
    vy: 2 + Math.random() * 4,
    rot: Math.random() * Math.PI * 2,
    vrot: (Math.random() - 0.5) * 0.15,
    opacity: 1,
  }));

  if (_confettiAF) cancelAnimationFrame(_confettiAF);
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = 0;
    _confettiPieces.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.rot += p.vrot;
      if (p.y > canvas.height * 0.85) p.opacity -= 0.025;
      if (p.opacity > 0) {
        alive++;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      }
    });
    frame++;
    if (alive > 0 && frame < 300) {
      _confettiAF = requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      _confettiPhase = null;
    }
  }
  draw();
}

let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

function playTone(freq, type, duration, vol, delay) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime + (delay||0));
    gain.gain.setValueAtTime(vol||0.2, ctx.currentTime + (delay||0));
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (delay||0) + duration);
    osc.start(ctx.currentTime + (delay||0));
    osc.stop(ctx.currentTime + (delay||0) + duration);
  } catch(e) {}
}

function playPodiumSound() {
  // Fanfarria ligera: Do-Mi-Sol-Do
  [[523,0],[659,0.13],[784,0.26],[1046,0.4]].forEach(([f,d]) => playTone(f,'triangle',0.35,0.18,d));
}

function playSaveSound() {
  playTone(880, 'sine', 0.12, 0.1, 0);
  playTone(1100, 'sine', 0.10, 0.08, 0.1);
}

function playUndoSound() {
  playTone(440, 'sine', 0.12, 0.1, 0);
  playTone(330, 'sine', 0.10, 0.08, 0.1);
}

    const s = localStorage.getItem('ndj_final_config');
    if (s) FINAL_CONFIG = Object.assign({}, FINAL_CONFIG_DEFAULT, JSON.parse(s));
    else FINAL_CONFIG = Object.assign({}, FINAL_CONFIG_DEFAULT);
  } catch(e) { FINAL_CONFIG = Object.assign({}, FINAL_CONFIG_DEFAULT); }
}

function saveFinalConfig() {
  localStorage.setItem('ndj_final_config', JSON.stringify(FINAL_CONFIG));
}

function toggleFinalEdit() {
  _finalEditMode = !_finalEditMode;
  renderFinal();
}

function saveReglasFinalEdits() {
  const intro  = document.getElementById('reglas-final-edit-intro')?.value?.trim();
  const juego   = document.getElementById('reglas-final-edit-juego')?.value?.trim();
  const formato = document.getElementById('reglas-final-edit-formato')?.value?.trim();
  const puntos  = document.getElementById('reglas-final-edit-puntos')?.value?.trim();
  const nota    = document.getElementById('reglas-final-edit-nota')?.value?.trim();
  if (intro !== undefined)  FINAL_CONFIG.intro  = intro;
  if (juego !== undefined)  FINAL_CONFIG.juego  = juego;
  if (formato) FINAL_CONFIG.formato = formato;
  if (puntos)  FINAL_CONFIG.puntos  = puntos;
  if (nota)    FINAL_CONFIG.nota    = nota;
  saveFinalConfig();
  showToast('✓', 'Fase Final guardada', false);
  renderReglas();
  // Scroll back to the final section
  setTimeout(() => {
    const el = document.getElementById('reglas-final');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 80);
}

function saveFinalEdits() {
  const juego  = document.getElementById('final-edit-juego')?.value?.trim();
  const formato = document.getElementById('final-edit-formato')?.value?.trim();
  const puntos = document.getElementById('final-edit-puntos')?.value?.trim();
  const nota = document.getElementById('final-edit-nota')?.value?.trim();
  if (juego !== undefined) FINAL_CONFIG.juego = juego;
  if (formato) FINAL_CONFIG.formato = formato;
  if (puntos) FINAL_CONFIG.puntos = puntos;
  if (nota) FINAL_CONFIG.nota = nota;
  saveFinalConfig();
  _finalEditMode = false;
  showToast('✓', 'Final guardada', false);
  renderFinal();
}

function renderFinal() {
  const root = document.getElementById('final-root');
  if (!root) return;

  const ppts = getPlayerPoints();
  const tpts = getTeamPoints();

  const sortedP = PLAYERS.map((n,i) => ({n,i,pts:ppts[i]})).sort((a,b) => b.pts.total - a.pts.total);
  const sortedT = TEAMS.map((n,i) => ({n,i,pts:tpts[i]})).sort((a,b) => b.pts.total - a.pts.total);

  const f1Total = F1_FIXTURE.length;
  const f2Total = F2_FIXTURE.length;
  const f1Done = F1_FIXTURE.filter(([r,a,b]) => state.f1[`${r}-${a}-${b}`]).length;
  const f2Done = F2_FIXTURE.filter(([r,a,b]) => state.f2[`${r}-${a}-${b}`]).length;
  const impDone = (state.impostor.rounds || []).length > 0;
  const totalDone = f1Done + f2Done + (impDone ? 1 : 0);
  const totalAll = f1Total + f2Total + 1; // +1 for impostor
  const pct = Math.round((totalDone / totalAll) * 100);

  const f1Pend = f1Total - f1Done;
  const f2Pend = f2Total - f2Done;

  // Determine "classification status" per phase
  // Fase 1: 1st place is locked when all f1 matches done
  // Fase 2: 1st team is locked when all f2 matches done
  const f1Locked = f1Done === f1Total;
  const f2Locked = f2Done === f2Total;

  // ---- PROGRESS SECTION ----
  const overallStatus = pct >= 100
    ? `<span style="color:var(--gold);font-weight:700">✓ Todo completado — ¡a jugar la final!</span>`
    : `Progreso de la noche · <b>${pct}%</b> completado`;

  // Pending matches breakdown
  let pendingHtml = '';
  if (pct < 100) {
    const pendItems = [];
    if (f1Pend > 0) pendItems.push(`<div class="final-pending-item"><span class="dot-indicator fase1"></span>Fase 1: faltan <b style="color:var(--text);margin:0 3px">${f1Pend}</b> partido${f1Pend>1?'s':''}</div>`);
    if (!impDone) pendItems.push(`<div class="final-pending-item"><span class="dot-indicator impostor"></span>Ronda Impostor: pendiente</div>`);
    if (f2Pend > 0) pendItems.push(`<div class="final-pending-item"><span class="dot-indicator fase2"></span>Fase 2: faltan <b style="color:var(--text);margin:0 3px">${f2Pend}</b> partido${f2Pend>1?'s':''}</div>`);
    if (pendItems.length) pendingHtml = `<div class="final-pending-list">${pendItems.join('')}</div>`;
  }

  // Per-phase progress rows
  const f1Pct = f1Total ? Math.round((f1Done/f1Total)*100) : 0;
  const f2Pct = f2Total ? Math.round((f2Done/f2Total)*100) : 0;
  const impPct = impDone ? 100 : 0;

  const phaseRows = `
    <div class="final-phase-row">
      <span class="final-phase-dot" style="background:var(--accent)"></span>
      <span class="final-phase-name">Fase 1 — Individual</span>
      <span class="final-phase-count">${f1Done}/${f1Total} partidos</span>
      <span class="final-phase-pct" style="color:${f1Locked?'var(--success)':'var(--muted)'}">${f1Pct}%</span>
    </div>
    <div class="final-phase-row">
      <span class="final-phase-dot" style="background:var(--danger)"></span>
      <span class="final-phase-name">Ronda Impostor</span>
      <span class="final-phase-count">${impDone ? '1 ronda' : 'pendiente'}</span>
      <span class="final-phase-pct" style="color:${impDone?'var(--success)':'var(--muted)'}">${impPct}%</span>
    </div>
    <div class="final-phase-row">
      <span class="final-phase-dot" style="background:var(--info)"></span>
      <span class="final-phase-name">Fase 2 — Grupal</span>
      <span class="final-phase-count">${f2Done}/${f2Total} partidos</span>
      <span class="final-phase-pct" style="color:${f2Locked?'var(--success)':'var(--muted)'}">${f2Pct}%</span>
    </div>
  `;

  // ---- CLASIFICADOS ----
  function playerCard(p, pos, phase) {
    const locked = phase === 'f1' ? f1Locked : f2Locked;
    const badge = locked
      ? `<span class="final-clasificado-tag">✓ Clasificado</span>`
      : `<span style="font-size:11px;color:var(--muted);font-style:italic">provisorio</span>`;
    const posClass = pos === 0 ? 'gold' : 'accent';
    const label = phase === 'f1' ? 'Fase individual' : 'Fase grupal';
    const badgeClass = phase === 'f1' ? 'badge' : 'badge group';
    return `<div class="final-player">
      <div class="pos-badge ${posClass}">${pos+1}</div>
      <div style="flex:1">
        <div style="font-weight:500;font-size:${phase==='f2'?'13px':'14px'}">${p.n}</div>
        <div style="font-size:11px;color:var(--muted)">${label}</div>
      </div>
      ${badge}
      <span class="${badgeClass}">${p.pts.total} pts</span>
    </div>`;
  }

  const clasificadosHtml = [
    ...sortedP.slice(0,1).map((p,i) => playerCard(p, i, 'f1')),
    ...sortedT.slice(0,1).map((t,i) => playerCard(t, i, 'f2')),
  ].join('') || `<div class="final-clasificado-none">Aún no hay datos suficientes.</div>`;

  // ---- EDIT MODE ----
  const fc = FINAL_CONFIG;
  const editBar = _finalEditMode
    ? `<div class="final-edit-bar active"><span>✏️ Modo edición activo</span><button class="final-edit-toggle" onclick="toggleFinalEdit()">Terminar</button></div>`
    : `<div class="final-edit-bar"><span>⚙️ Podés editar el juego, formato y descripción de la final</span><button class="final-edit-toggle" onclick="toggleFinalEdit()">Editar</button></div>`;

  const juegoDisplay = fc.juego
    ? `<span class="match-game-badge" style="font-size:12px;padding:3px 10px;border-radius:99px;background:var(--gold-dim);color:var(--gold);font-weight:600">🏆 ${fc.juego}</span>`
    : `<span style="font-size:12px;color:var(--muted);font-style:italic">Sin definir — editá para agregar el juego</span>`;

  const formatoSection = _finalEditMode ? `
    <div class="final-edit-field">
      <label class="final-edit-label">Juego de la final</label>
      <input class="final-edit-input" id="final-edit-juego" placeholder="ej: Carrera de Mentes, Kahoot, Trivia…" value="${(fc.juego||'').replace(/"/g,'&quot;')}">
    </div>
    <div class="final-edit-field">
      <label class="final-edit-label">Formato de la final</label>
      <textarea class="final-edit-textarea" id="final-edit-formato">${fc.formato}</textarea>
    </div>
    <div class="final-edit-field">
      <label class="final-edit-label">Sistema de puntos</label>
      <textarea class="final-edit-textarea" id="final-edit-puntos">${fc.puntos}</textarea>
    </div>
    <div class="final-edit-field">
      <label class="final-edit-label">Nota al pie (debajo de clasificados)</label>
      <input class="final-edit-input" id="final-edit-nota" value="${fc.nota.replace(/"/g,'&quot;')}">
    </div>
    <button class="final-edit-save" onclick="saveFinalEdits()">Guardar cambios</button>
  ` : `
    <div class="rule-label" style="margin-top:0">Juego</div>
    <div style="margin-bottom:0.9rem">${juegoDisplay}</div>
    <div class="rule-label">Formato</div>
    <p style="font-size:13px;line-height:1.6;color:var(--text);margin-bottom:0.9rem">${fc.formato}</p>
    <div class="rule-label">Puntos</div>
    <p style="font-size:13px;line-height:1.6;color:var(--text)">${fc.puntos}</p>
  `;

  // ---- MOTES (keep using existing system) ----
  const motes = computeMotes();
  const motesHtml = motes.length === 0 ? '' : `
    <div class="card" id="motes-card">
      <div style="font-size:15px;font-weight:600;margin-bottom:0.25rem"><span class="dot-indicator final"></span>Motes de la noche</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:1rem">Títulos ganados esta noche. Algunos son un honor. Otros, no tanto.</div>
      <button id="motes-reveal-btn" onclick="startMotesReveal()" style="width:100%;padding:1rem;border-radius:var(--radius);border:1.5px dashed var(--gold);background:var(--gold-dim);color:var(--gold);cursor:pointer;font-size:14px;font-weight:700;letter-spacing:-0.01em;display:flex;align-items:center;justify-content:center;gap:0.5rem">
        ✉️ Revelar motes uno por uno
      </button>
      <div id="motes-list" style="display:none">${motes.map((m,i) => `
        <div class="mote-item" style="animation-delay:${i*0.06}s">
          <div class="mote-emoji">${m.emoji}</div>
          <div class="mote-body">
            <div class="mote-title ${m.type==='shame'?'shame':m.type==='neutral'?'neutral':m.type==='impostor'?'impostor':''}">${m.title}</div>
            <div class="mote-player">${m.player}</div>
            <div class="mote-reason">${m.reason}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;

  // ---- RESUMEN ----
  const resumenHtml = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
      <div class="stat-card"><div class="stat-num">${f1Done}/${f1Total}</div><div class="stat-label">Duelos Fase 1</div></div>
      <div class="stat-card"><div class="stat-num">${f2Done}/${f2Total}</div><div class="stat-label">Duelos Fase 2</div></div>
      <div class="stat-card"><div class="stat-num">${(state.impostor.rounds||[]).length ? '✓' : '—'}</div><div class="stat-label">Ronda Impostor</div></div>
      <div class="stat-card"><div class="stat-num">${f1Done + f2Done}</div><div class="stat-label">Total jugados</div></div>
    </div>`;

  root.innerHTML = `
    <!-- PROGRESO -->
    <div class="card">
      <div style="font-size:15px;font-weight:600;margin-bottom:0.75rem"><span class="dot-indicator final"></span>Estado de la noche</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:0.5rem">${overallStatus}</div>
      <div class="final-progress-bar-wrap">
        <div class="final-progress-bar" style="width:${pct}%"></div>
      </div>
      <div class="final-progress-label"><span>${totalDone} de ${totalAll} completados</span><span>${pct}%</span></div>
      ${phaseRows}
      ${pendingHtml}
    </div>

    <!-- CLASIFICADOS -->
    <div class="card">
      <div style="font-size:15px;font-weight:600;margin-bottom:${fc.juego ? '0.5rem' : '1rem'}"><span class="dot-indicator final"></span>Clasificados a la final</div>
      ${fc.juego ? `<div style="margin-bottom:1rem"><span class="match-game-badge" style="font-size:12px;padding:3px 10px;border-radius:99px;background:var(--gold-dim);color:var(--gold);font-weight:600">🏆 ${fc.juego}</span></div>` : ''}
      <div class="final-players">${clasificadosHtml}</div>
      <div style="font-size:12px;color:var(--muted);padding-top:0.75rem;border-top:0.5px solid var(--border)">${fc.nota}</div>
    </div>

    <!-- FORMATO Y PUNTOS (editable) -->
    <div class="card">
      ${editBar}
      ${formatoSection}
    </div>

    <!-- MOTES -->
    ${motesHtml}

    <!-- RESUMEN -->
    <div class="card">
      <div class="section-title" style="margin-bottom:0.75rem"><span class="dot-indicator final"></span>Resumen de la noche</div>
      ${resumenHtml}
    </div>
  `;

  // Store motes for reveal
  window._motesData = motes;
}


// ============================================================
// MOTES DE LA NOCHE
// ============================================================
function computeMotes() {
  const ppts   = getPlayerPoints();
  const impRounds = (state.impostor && state.impostor.rounds) || [];

  // -- Per-player stats from Fase 1 --
  const stats = PLAYERS.map((name, idx) => {
    const rounds = ppts[idx].rounds; // array of 6: null | 'bye' | 0 | 1 | 3 | 4
    let wins = 0, losses = 0, draws = 0, bonusWins = 0, byeCount = 0;
    let lastPlayedResult = null; // result of the last non-bye/null round
    let firstRoundWin = false;

    // Walk rounds in order
    rounds.forEach((v, ri) => {
      if (v === 'bye' || v === null) { if (v === 'bye') byeCount++; return; }
      if (v === 1)  { draws++;  lastPlayedResult = 'draw';  }
      if (v === 0)  { losses++; lastPlayedResult = 'loss';  }
      if (v === 3)  { wins++;   lastPlayedResult = 'win';   if (ri === 0) firstRoundWin = true; }
      if (v === 4)  { wins++; bonusWins++; lastPlayedResult = 'win'; if (ri === 0) firstRoundWin = true; }
    });

    // Impostor stats
    let timesImpostor = 0, timesNotCaught = 0, timesCaught = 0;
    let timesAccused = 0, timesCorrectDetective = 0;
    impRounds.forEach(rd => {
      if (rd.impostorName === name) {
        timesImpostor++;
        if (rd.mode === 'noDescubierto') timesNotCaught++;
        else timesCaught++;
      }
      // Was accused (but wasn't the impostor)
      if (rd.accusedName === name && rd.impostorName !== name) timesAccused++;
      // Was the one who caught the impostor (mode=descubierto and accusedName === impostorName)
      if (rd.mode === 'descubierto' && rd.accusedName === rd.impostorName) {
        // We don't store who accused — skip detective for now (handled below)
      }
    });

    return {
      name, idx,
      wins, losses, draws, bonusWins, byeCount,
      lastPlayedResult, firstRoundWin,
      timesImpostor, timesNotCaught, timesCaught, timesAccused,
      total: ppts[idx].total,
    };
  });

  const totalPlayers = stats.length;
  const motes = [];

  // Helper: pick stat leader (max), returns array of leaders (ties included)
  function leader(fn) { const mx = Math.max(...stats.map(fn)); return stats.filter(s => fn(s) === mx && mx > 0); }
  function loser(fn)  { const mn = Math.min(...stats.map(fn)); return stats.filter(s => fn(s) === mn); }

  // ── HONOR ────────────────────────────────────────────────────
  // "La Máquina" — más victorias totales
  const machines = leader(s => s.wins);
  if (machines.length === 1) motes.push({
    emoji: '⚙️', type: 'honor', title: 'La Máquina',
    player: machines[0].name,
    reason: `${machines[0].wins} victorias en Fase 1. Imparable.`,
  });

  // "El Aplastador" — más victorias con bonus (2-0)
  const crushers = leader(s => s.bonusWins);
  if (crushers.length === 1) motes.push({
    emoji: '💥', type: 'honor', title: 'El Aplastador',
    player: crushers[0].name,
    reason: `${crushers[0].bonusWins} victorias con bonus. No dejó ni migas.`,
  });

  // "El Quemador de Rondas" — ganó su ÚLTIMO partido jugado
  const hotEnders = stats.filter(s => s.lastPlayedResult === 'win');
  if (hotEnders.length === 1) motes.push({
    emoji: '🔥', type: 'honor', title: 'El Quemador de Rondas',
    player: hotEnders[0].name,
    reason: 'Cerró su fase ganando. Llegó caliente a la final.',
  });

  // "El Arranque Lento" — perdió la primera ronda pero terminó 1° o 2°
  const sortedByPts = [...stats].sort((a,b) => b.total - a.total);
  const top2Idx = new Set(sortedByPts.slice(0, 2).map(s => s.idx));
  const slowStarters = stats.filter(s => {
    const firstPlayed = ppts[s.idx].rounds.find(v => v !== null && v !== 'bye');
    return firstPlayed === 0 && top2Idx.has(s.idx);
  });
  if (slowStarters.length === 1) motes.push({
    emoji: '🐢', type: 'honor', title: 'El Arranque Lento',
    player: slowStarters[0].name,
    reason: 'Perdió la primera, clasificó igual. Remontada épica.',
  });

  // "El Punto a Punto" — más empates (al menos 2)
  const drawKings = leader(s => s.draws);
  if (drawKings.length === 1 && drawKings[0].draws >= 2) motes.push({
    emoji: '🤝', type: 'neutral', title: 'El Punto a Punto',
    player: drawKings[0].name,
    reason: `${drawKings[0].draws} empates. No gana, no pierde, existe.`,
  });

  // ── VERGÜENZA ─────────────────────────────────────────────────
  // "El Teórico" — último lugar en Fase 1
  const lastPlace = sortedByPts[sortedByPts.length - 1];
  // only if there are at least 3 players
  if (totalPlayers >= 3) motes.push({
    emoji: '📚', type: 'shame', title: 'El Teórico',
    player: lastPlace.name,
    reason: `${lastPlace.total} pts. Sabe perfectamente cómo se juega.`,
  });

  // "El Generoso" — más derrotas
  const generous = leader(s => s.losses);
  if (generous.length === 1 && generous[0].losses >= 2) motes.push({
    emoji: '🎁', type: 'shame', title: 'El Generoso',
    player: generous[0].name,
    reason: `${generous[0].losses} derrotas. Regaló puntos a todos por igual.`,
  });

  // "El Fantasma" — más byes (no jugó muchas rondas)
  const ghosts = leader(s => s.byeCount);
  if (ghosts.length === 1 && ghosts[0].byeCount >= 2) motes.push({
    emoji: '👻', type: 'shame', title: 'El Fantasma',
    player: ghosts[0].name,
    reason: `${ghosts[0].byeCount} rondas de descanso. Descansó más que jugó.`,
  });

  // "El Eterno Segundo" — 2° lugar exacto en Fase 1
  if (sortedByPts.length >= 2) {
    const silver = sortedByPts[1];
    // Only meaningful if gap to 1st is small
    const gap = sortedByPts[0].total - silver.total;
    if (gap <= 3) motes.push({
      emoji: '🥈', type: 'shame', title: 'El Eterno Segundo',
      player: silver.name,
      reason: `A ${gap} punto${gap===1?'':'s'} del primero. Tan cerca, tan lejos.`,
    });
  }

  // "El Constante" — todos sus partidos jugados terminaron igual (todos win / todos loss)
  stats.forEach(s => {
    const played = ppts[s.idx].rounds.filter(v => typeof v === 'number');
    if (played.length < 3) return;
    const allWin  = played.every(v => v >= 3);
    const allLoss = played.every(v => v === 0);
    if (allWin) motes.push({
      emoji: '📐', type: 'honor', title: 'El Constante',
      player: s.name,
      reason: `Ganó todos sus partidos jugados (${played.length}). Sin oscilaciones.`,
    });
    if (allLoss) motes.push({
      emoji: '📉', type: 'shame', title: 'El Constante (versión trágica)',
      player: s.name,
      reason: `Perdió todos sus partidos jugados (${played.length}). Consistente, al menos.`,
    });
  });

  // ── IMPOSTOR ─────────────────────────────────────────────────
  if (impRounds.length > 0) {
    // "El Cara de Piedra" — más veces impostor sin ser descubierto
    const stoneFaces = leader(s => s.timesNotCaught);
    if (stoneFaces.length === 1) motes.push({
      emoji: '🪨', type: 'impostor', title: 'El Cara de Piedra',
      player: stoneFaces[0].name,
      reason: `${stoneFaces[0].timesNotCaught} vez/veces impostor sin ser descubierto. Actorcito.`,
    });

    // "El Obvio" — fue descubierto todas las veces que fue impostor (al menos 2)
    const obvious = stats.filter(s => s.timesImpostor >= 2 && s.timesCaught === s.timesImpostor);
    if (obvious.length === 1) motes.push({
      emoji: '🔦', type: 'impostor', title: 'El Obvio',
      player: obvious[0].name,
      reason: `Descubierto ${obvious[0].timesCaught}/${obvious[0].timesImpostor} veces. Cara de impostor.`,
    });

    // "El Chivo Expiatorio" — fue acusado siendo inocente más veces
    const goats = leader(s => s.timesAccused);
    if (goats.length === 1 && goats[0].timesAccused >= 1) motes.push({
      emoji: '🐐', type: 'impostor', title: 'El Chivo Expiatorio',
      player: goats[0].name,
      reason: `Acusado ${goats[0].timesAccused} vez/veces siendo inocente. Cara de culpable.`,
    });

    // "El Impostor Maestro" — más veces impostor en total
    const masterImpostors = leader(s => s.timesImpostor);
    if (masterImpostors.length === 1 && masterImpostors[0].timesImpostor >= 2) motes.push({
      emoji: '🕵️', type: 'impostor', title: 'El Impostor Maestro',
      player: masterImpostors[0].name,
      reason: `Le tocó ser impostor ${masterImpostors[0].timesImpostor} veces. El destino lo eligió.`,
    });
  }

  // ── ESPECIALES ────────────────────────────────────────────────
  // "El Sin Bonus" — 0 bonus en toda la fase (si jugó al menos 2 partidos y ganó al menos 1)
  stats.forEach(s => {
    const played = ppts[s.idx].rounds.filter(v => typeof v === 'number');
    if (played.length >= 2 && s.wins >= 1 && s.bonusWins === 0) motes.push({
      emoji: '😤', type: 'neutral', title: 'El Sin Bonus',
      player: s.name,
      reason: `Ganó ${s.wins} partido${s.wins>1?'s':''} pero nunca con diferencia. Siempre justo.`,
    });
  });

  // Dedup: si un jugador ya tiene un mote de honor/shame, no acumular más de 2 motes del mismo tipo
  // (dejamos todos igual — más gracioso)
  return motes;
}

function renderMotes() {
  const motes = computeMotes();
  const card  = document.getElementById('motes-card');
  const btn   = document.getElementById('motes-reveal-btn');
  const list  = document.getElementById('motes-list');
  if (!card) return;
  if (motes.length === 0) { card.style.display = 'none'; return; }
  card.style.display = '';
  // Render the summary list (hidden until reveal is done or skipped)
  list.innerHTML = motes.map((m, i) => `
    <div class="mote-item" style="animation-delay:${i*0.06}s">
      <div class="mote-emoji">${m.emoji}</div>
      <div class="mote-body">
        <div class="mote-title ${m.type === 'shame' ? 'shame' : m.type === 'neutral' ? 'neutral' : m.type === 'impostor' ? 'impostor' : ''}">${m.title}</div>
        <div class="mote-player">${m.player}</div>
        <div class="mote-reason">${m.reason}</div>
      </div>
    </div>
  `).join('');
  // Store motes for reveal sequence
  window._motesData = motes;
}

let _moteRevealIdx = 0;
let _moteFlipped = false;

function startMotesReveal() {
  const motes = window._motesData;
  if (!motes || motes.length === 0) return;
  _moteRevealIdx = 0;
  _moteFlipped = false;
  showMoteOverlay(motes, 0);
}

function showMoteOverlay(motes, idx) {
  document.querySelectorAll('.mote-overlay').forEach(e => e.remove());
  const m = motes[idx];
  const isLast = idx === motes.length - 1;
  const typeLabel = m.type === 'honor' ? '🏆 Honor' : m.type === 'shame' ? '😬 Vergüenza' : m.type === 'impostor' ? '🕵️ Impostor' : '🎲 Especial';

  const overlay = document.createElement('div');
  overlay.className = 'mote-overlay';
  overlay.innerHTML = `
    <div class="mote-overlay-progress">${idx + 1} de ${motes.length}</div>
    <button class="mote-overlay-skip" onclick="finishMotesReveal()">Saltar todo</button>

    <div class="mote-envelope-wrap" onclick="handleMoteEnvelopeClick()" id="mote-env-wrap">
      <div class="mote-envelope" id="mote-envelope">
        <div class="mote-env-front">
          <div class="mote-env-icon">✉️</div>
          <div class="mote-env-label">Mote de la noche</div>
          <div class="mote-env-hint">Tocá para revelar</div>
        </div>
        <div class="mote-env-back">
          <div class="mote-reveal-type ${m.type}">${typeLabel}</div>
          <div class="mote-reveal-emoji">${m.emoji}</div>
          <div class="mote-reveal-title">${m.title}</div>
          <div class="mote-reveal-player ${m.type}">${m.player}</div>
          <div class="mote-reveal-reason">${m.reason}</div>
        </div>
      </div>
    </div>

    <button class="mote-overlay-next ${isLast ? 'done' : ''}" id="mote-next-btn" onclick="handleMoteNext()" style="opacity:0;pointer-events:none">
      ${isLast ? '✓ Ver todos los motes' : 'Siguiente →'}
    </button>
  `;
  document.body.appendChild(overlay);
  _moteFlipped = false;
}

function handleMoteEnvelopeClick() {
  if (_moteFlipped) return;
  _moteFlipped = true;
  const env = document.getElementById('mote-envelope');
  const btn = document.getElementById('mote-next-btn');
  if (env) env.classList.add('flipped');
  // Play a soft reveal sound
  try {
    const ctx = getAudioCtx();
    [[523,0],[659,0.1],[784,0.22]].forEach(([f,d]) => playTone(f,'sine',0.2,0.12,d));
  } catch(e) {}
  // Show next button after flip animation
  setTimeout(() => {
    if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = ''; }
  }, 480);
}

function handleMoteNext() {
  const motes = window._motesData;
  if (!motes) return;
  _moteRevealIdx++;
  if (_moteRevealIdx >= motes.length) {
    finishMotesReveal();
  } else {
    showMoteOverlay(motes, _moteRevealIdx);
  }
}

function finishMotesReveal() {
  document.querySelectorAll('.mote-overlay').forEach(e => e.remove());
  const btn  = document.getElementById('motes-reveal-btn');
  const list = document.getElementById('motes-list');
  if (btn)  btn.style.display = 'none';
  if (list) list.style.display = '';
}

<script>
// ============================================================
// CRONÓMETRO
// ============================================================
let _timerTotal    = 0;   // segundos totales del preset
let _timerLeft     = 0;   // segundos restantes
let _timerRunning  = false;
let _timerInterval = null;
const CIRCUMFERENCE = 2 * Math.PI * 20; // r=20 → 125.66

function timerFmt(s) {
  if (s < 0) s = 0;
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function timerSetPreset(secs) {
  timerStop();
  _timerTotal = secs;
  _timerLeft  = secs;
  timerUpdateUI();
  // Mark active preset
  document.querySelectorAll('.tv-preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function timerAskCustom() {
  const raw = prompt('Tiempo personalizado (minutos):');
  if (!raw) return;
  const mins = parseFloat(raw.replace(',','.'));
  if (!isFinite(mins) || mins <= 0) return;
  timerStop();
  _timerTotal = Math.round(mins * 60);
  _timerLeft  = _timerTotal;
  document.querySelectorAll('.tv-preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('timer-custom-btn').classList.add('active');
  timerUpdateUI();
}

function timerPlayPause() {
  if (_timerTotal === 0) return; // nothing set
  if (_timerRunning) {
    timerStop();
  } else {
    if (_timerLeft <= 0) { _timerLeft = _timerTotal; } // restart if done
    timerStart();
  }
}

function timerStart() {
  if (_timerInterval) clearInterval(_timerInterval);
  _timerRunning = true;
  document.getElementById('timer-play-btn').textContent = '⏸';
  document.getElementById('timer-play-btn').classList.replace('play','pause');
  _timerInterval = setInterval(() => {
    _timerLeft--;
    timerUpdateUI();
    if (_timerLeft <= 0) {
      timerStop();
      timerDone();
    }
  }, 1000);
  timerUpdateUI();
}

function timerStop() {
  _timerRunning = false;
  if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
  const btn = document.getElementById('timer-play-btn');
  if (btn) { btn.textContent = '▶'; btn.classList.replace('pause','play'); }
  // Remove done state if manually stopped
  const el = document.getElementById('tv-timer');
  if (el) el.classList.remove('done');
  timerUpdateUI();
}

function timerReset() {
  timerStop();
  _timerLeft = _timerTotal;
  timerUpdateUI();
}

function timerDone() {
  const el = document.getElementById('tv-timer');
  if (el) { el.classList.add('done'); el.classList.remove('running','danger'); }
  // Alarm sound: descending beeps
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[880,0],[880,0.18],[880,0.36],[440,0.55]].forEach(([f,d]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(f, ctx.currentTime + d);
      gain.gain.setValueAtTime(0.18, ctx.currentTime + d);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + 0.15);
      osc.start(ctx.currentTime + d);
      osc.stop(ctx.currentTime + d + 0.16);
    });
  } catch(e) {}
}

function timerUpdateUI() {
  const display = document.getElementById('timer-display');
  const ring    = document.getElementById('timer-ring');
  const el      = document.getElementById('tv-timer');
  if (!display || !ring || !el) return;

  display.textContent = _timerTotal > 0 ? timerFmt(_timerLeft) : '--:--';

  // Arc progress
  const pct = _timerTotal > 0 ? (_timerLeft / _timerTotal) : 1;
  const offset = CIRCUMFERENCE * (1 - pct);
  ring.style.strokeDashoffset = offset;

  // Color: green → gold → red
  const isRunning = _timerRunning;
  const isDanger  = _timerTotal > 0 && _timerLeft <= 30 && _timerLeft > 0;
  const isDone    = _timerTotal > 0 && _timerLeft <= 0;

  el.classList.toggle('running', isRunning && !isDanger && !isDone);
  el.classList.toggle('danger',  isRunning && isDanger);
  // done is set by timerDone()

  const strokeColor = isDone ? 'var(--danger)' : isDanger ? 'var(--danger)' : isRunning ? 'var(--success)' : 'var(--border2)';
  ring.style.stroke = strokeColor;
}

// Init display
timerUpdateUI();

// ---- Data seeded from parent at open time, refreshed from localStorage ----
const PLAYERS_INIT = ${playersJson};
const TEAMS_INIT   = ${teamsJson};
const F1_FIXTURE   = ${f1Fix};

// Apply single-phase layout immediately
(function applyPhaseLayout() {
